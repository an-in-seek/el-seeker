server:
  port: 8080

spring:
  application:
    name: el-seeker
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
        format_sql: false

springdoc:
  api-docs:
    enabled: true
    groups:
      enabled: false
  swagger-ui:
    enabled: true
    groups-order: ASC
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  cache:
    disabled: true
  model-and-view-allowed: true

api:
  el-seeker:
    url: ${EL_SEEKER_API_BASE_URL:http://localhost:8080}
    api-key: ${EL_SEEKER_API_KEY:TEST_API_KEY}