server:
  port: 8080

spring:
  application:
    name: el_seeker
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create  # ✅ JPA가 테이블을 먼저 생성
    properties:
      hibernate:
        show_sql: false
        format_sql: false
    defer-datasource-initialization: true  # ✅ JPA 실행 후 sql 실행
  sql:
    init:
      mode: always # ✅ 항상 SQL 스크립트 실행
      data-locations:
        - classpath:data/bible_quiz.sql
        - classpath:data/dictionary.sql
        - classpath:data/bible_translation.sql
        - classpath:data/bible_book_description_ko.sql
        - classpath:data/bible_book_description_en.sql
        # KRV
        - classpath:data/krv/bible_krv_book.sql
        - classpath:data/krv/bible_krv_01_genesis.sql
        - classpath:data/krv/bible_krv_02_exodus.sql
        - classpath:data/krv/bible_krv_03_leviticus.sql
        - classpath:data/krv/bible_krv_04_numbers.sql
