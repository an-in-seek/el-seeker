springdoc:
  api-docs:
    enabled: true
    groups:
      enabled: false
  swagger-ui:
    enabled: true
    groups-order: ASC
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  cache:
    disabled: true
  model-and-view-allowed: true

api:
  the-bible:
    url: http://localhost:8080
    api-key: TEST_API_KEY
