server:
  port: 8080

spring:
  application:
    name: the_bible
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create  # ✅ JPA가 테이블을 먼저 생성
    properties:
      hibernate:
        show_sql: false
        format_sql: false
    defer-datasource-initialization: true  # ✅ JPA 실행 후 sql 실행
  sql:
    init:
      mode: always # ✅ 항상 SQL 스크립트 실행
      data-locations:
        - classpath:data/bible_translation.sql
        - classpath:data/bible_book.sql
        - classpath:data/bible_krv_01_genesis.sql
        - classpath:data/bible_krv_02_exodus.sql
        - classpath:data/bible_krv_03_leviticus.sql
        - classpath:data/bible_krv_04_numbers.sql
        - classpath:data/bible_krv_05_deuteronomy.sql
        - classpath:data/bible_krv_06_joshua.sql
        - classpath:data/bible_krv_07_judges.sql
        - classpath:data/bible_krv_08_ruth.sql
        - classpath:data/bible_krv_09_1samuel.sql
        - classpath:data/bible_krv_10_2samuel.sql
        - classpath:data/bible_krv_11_1kings.sql
        - classpath:data/bible_krv_12_2kings.sql
        - classpath:data/bible_krv_13_1chronicles.sql
        - classpath:data/bible_krv_14_2chronicles.sql
        - classpath:data/bible_krv_15_ezra.sql
        - classpath:data/bible_krv_16_nehemiah.sql
        - classpath:data/bible_krv_17_esther.sql
        - classpath:data/bible_krv_18_job.sql
        - classpath:data/bible_krv_19_psalms.sql
        - classpath:data/bible_krv_20_proverbs.sql
        - classpath:data/bible_krv_21_ecclesiastes.sql
        - classpath:data/bible_krv_22_song_of_songs.sql
        - classpath:data/bible_krv_23_isaiah.sql
        - classpath:data/bible_krv_24_jeremiah.sql
        - classpath:data/bible_krv_25_lamentations.sql
        - classpath:data/bible_krv_26_ezekiel.sql
        - classpath:data/bible_krv_27_daniel.sql
        - classpath:data/bible_krv_28_hosea.sql
        - classpath:data/bible_krv_29_joel.sql
        - classpath:data/bible_krv_30_amos.sql
        - classpath:data/bible_krv_31_obadiah.sql
        - classpath:data/bible_krv_32_jonah.sql
        - classpath:data/bible_krv_33_micah.sql
        - classpath:data/bible_krv_34_nahum.sql
        - classpath:data/bible_krv_35_habakkuk.sql

springdoc:
  api-docs:
    groups:
      enabled: false
  swagger-ui:
    enabled: true
    groups-order: ASC
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  cache:
    disabled: true
  model-and-view-allowed: true

api:
  the-bible:
    url: http://localhost:8080
    api-key: TEST_API_KEY