<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
  <defs>
    <style>
      .person { stroke: #fff; stroke-width: 2px; paint-order: stroke; }
    </style>
  </defs>
  
  <!-- Back Row (2 people) -->
  <g transform="translate(0, 0)">
    <!-- Left Back -->
    <circle cx="6" cy="7" r="2.5" class="person"/>
    <path d="M2 11c0-1.5 1-2.5 3-2.5h2c2 0 3 1 3 2.5v4h-8z" class="person"/>
    
    <!-- Right Back -->
    <circle cx="18" cy="7" r="2.5" class="person"/>
    <path d="M14 11c0-1.5 1-2.5 3-2.5h2c2 0 3 1 3 2.5v4h-8z" class="person"/>
  </g>

  <!-- Front Row (1 person) -->
  <g transform="translate(0, 2)">
    <!-- Center Front -->
    <circle cx="12" cy="10" r="3.5" class="person"/>
    <path d="M6 16c0-2.5 2-4 5-4h2c3 0 5 1.5 5 4v6H6z" class="person"/>
  </g>
</svg>
