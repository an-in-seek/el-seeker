<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Book Description | 책 개요', true, null)}"></head>
<body class="has-fixed-nav">
<header th:replace="~{fragments/header :: header}"></header>
<main class="container content-wrapper">
    <div>
        <p>
            <strong id="summaryLabel"></strong><br>
            <span id="summary"></span>
        </p>
        <hr/>
        <p>
            <strong id="authorLabel"></strong><br>
            <span id="author"></span>
        </p>
        <p>
            <strong id="writtenYearLabel"></strong><br>
            <span id="writtenYear"></span>
        </p>
        <p>
            <strong id="historicalPeriodLabel"></strong><br>
            <span id="historicalPeriod"></span>
        </p>
        <p>
            <strong id="backgroundLabel"></strong><br>
            <span id="background"></span>
        </p>
        <p>
            <strong id="contentLabel"></strong><br>
            <span id="content"></span>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
    <div class="nav-container">
        <!-- 이전 책 버튼 -->
        <button id="prevBookBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                aria-label="이전 책으로 이동">
            <span aria-hidden="true">⬅</span>
            <span class="d-none d-md-inline ms-2">이전 책</span>
        </button>

        <!-- 장 선택 -->
        <a id="bookSelectLink"
           href="/web/bible/chapter"
           class="btn btn-lg btn-primary"
           aria-label="장 선택">
            <span aria-hidden="true">📖</span>
            <span id="chapterSelectLinkLabel" class="ms-2"></span>
        </a>

        <!-- 다음 책 버튼 -->
        <button id="nextBookBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                aria-label="다음 책으로 이동">
            <span class="d-none d-md-inline me-2">다음 책</span>
            <span aria-hidden="true">➡</span>
        </button>
    </div>
</div>

<script src="/js/storage-util.js?v=1.0"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const navDOM = {
            translationLink: document.getElementById("topNavTranslationLink"),
            searchLink: document.getElementById("topNavSearchLink"),
            translationTypeLabel: document.getElementById("translationTypeLabel"),
            bookName: document.getElementById("bookName"),
        };
        const urlParams = new URLSearchParams(window.location.search);
        const translationIdParam = parseInt(urlParams.get("translationId"), 10);
        const bookOrderParam = parseInt(urlParams.get("bookOrder"), 10);
        const storedTranslationId = TranslationStore.getCurrentTranslationId();
        const storedBookOrder = BookStore.getCurrentBookOrder();
        const translationId = Number.isNaN(translationIdParam)
            ? storedTranslationId
            : translationIdParam;
        let bookOrder = Number.isNaN(bookOrderParam) ? storedBookOrder : bookOrderParam;
        if (Number.isNaN(bookOrderParam)
            && !Number.isNaN(translationIdParam)
            && storedTranslationId
            && translationIdParam !== storedTranslationId) {
            bookOrder = null;
        }

        if (navDOM.translationLink) {
            navDOM.translationLink.classList.remove("d-none");
            navDOM.translationLink.addEventListener("click", () => {
                const returnUrl = new URL("/web/bible/book/description", window.location.origin);
                if (translationId) {
                    returnUrl.searchParams.set("translationId", translationId);
                }
                if (bookOrder) {
                    returnUrl.searchParams.set("bookOrder", bookOrder);
                }
                TranslationStore.saveTranslationReturnPath(`${returnUrl.pathname}${returnUrl.search}`);
            });
        }
        if (navDOM.searchLink) {
            navDOM.searchLink.classList.remove("d-none");
        }
        if (navDOM.bookName) {
            navDOM.bookName.classList.remove("d-none");
        }

        if (!translationId) {
            window.location.href = "/web/bible/translation";
            return;
        }

        function getStoredTranslation() {
            return {
                id: TranslationStore.getCurrentTranslationId(),
                type: TranslationStore.getCurrentTranslationType(),
                name: TranslationStore.getCurrentTranslationName(),
                language: TranslationStore.getCurrentTranslationLanguage(),
            };
        }

        function hasCompleteTranslation(stored, targetId) {
            return stored.id === targetId && stored.type && stored.name && stored.language;
        }

        async function ensureTranslationInfo(targetId) {
            const stored = getStoredTranslation();
            if (hasCompleteTranslation(stored, targetId)) {
                return stored;
            }
            try {
                const response = await fetch("/api/v1/bibles/translations");
                if (!response.ok) {
                    throw new Error("번역본 정보를 불러오는 중 오류가 발생했습니다.");
                }
                const translations = await response.json();
                const match = translations.find(item => item.translationId === targetId);
                if (match) {
                    const translation = {
                        id: match.translationId,
                        name: match.translationName,
                        type: match.translationType,
                        language: match.translationLanguage,
                    };
                    TranslationStore.saveCurrentTranslation(translation);
                    return translation;
                }
            } catch (error) {
                console.warn(error.message);
            }
            return stored;
        }

        async function ensureBookList(targetTranslationId) {
            const cached = BookStore.getListForTranslation(targetTranslationId);
            if (cached && cached.length > 0) {
                return cached;
            }
            try {
                const response = await fetch(`/api/v1/bibles/translations/${targetTranslationId}/books`);
                if (!response.ok) {
                    throw new Error("데이터를 불러오는 중 오류가 발생했습니다.");
                }
                const data = await response.json();
                BookStore.saveListForTranslation(targetTranslationId, data);
                return data;
            } catch (error) {
                console.warn(error.message);
            }
            return null;
        }

        function buildDescriptionUrl() {
            const targetUrl = new URL("/web/bible/book/description", window.location.origin);
            targetUrl.searchParams.set("translationId", translationId);
            if (bookOrder) {
                targetUrl.searchParams.set("bookOrder", bookOrder);
            }
            return `${targetUrl.pathname}${targetUrl.search}`;
        }

        function updateDescriptionUrl(currentBookOrder) {
            const targetUrl = new URL("/web/bible/book/description", window.location.origin);
            targetUrl.searchParams.set("translationId", translationId);
            targetUrl.searchParams.set("bookOrder", currentBookOrder);
            history.replaceState(null, "", `${targetUrl.pathname}${targetUrl.search}`);
        }

        const translationInfo = await ensureTranslationInfo(translationId);
        const translationType = translationInfo.type;
        const translationLanguage = translationInfo.language;

        if (!bookOrder) {
            const bookUrl = new URL("/web/bible/book", window.location.origin);
            bookUrl.searchParams.set("translationId", translationId);
            window.location.href = `${bookUrl.pathname}${bookUrl.search}`;
            return;
        }

        const books = await ensureBookList(translationId);
        let bookName = BookStore.getBookName(translationId, bookOrder);
        if (!bookName && books) {
            const currentBook = books.find(book => book.bookOrder === bookOrder);
            if (currentBook) {
                BookStore.saveCurrentBook(currentBook);
                bookName = currentBook.bookName;
            }
        }
        if (!bookName) {
            const bookUrl = new URL("/web/bible/book", window.location.origin);
            bookUrl.searchParams.set("translationId", translationId);
            window.location.href = `${bookUrl.pathname}${bookUrl.search}`;
            return;
        }

        const DOM = {
            translationTypeLabel: navDOM.translationTypeLabel,
            bookName: navDOM.bookName,
            summaryLabel: document.getElementById("summaryLabel"),
            summary: document.getElementById("summary"),
            authorLabel: document.getElementById("authorLabel"),
            author: document.getElementById("author"),
            writtenYearLabel: document.getElementById("writtenYearLabel"),
            writtenYear: document.getElementById("writtenYear"),
            historicalPeriodLabel: document.getElementById("historicalPeriodLabel"),
            historicalPeriod: document.getElementById("historicalPeriod"),
            backgroundLabel: document.getElementById("backgroundLabel"),
            background: document.getElementById("background"),
            contentLabel: document.getElementById("contentLabel"),
            content: document.getElementById("content"),
            prevBtn: document.getElementById("prevBookBtn"),
            nextBtn: document.getElementById("nextBookBtn"),
            chapterSelectLinkLabel: document.getElementById("chapterSelectLinkLabel"),
            chapterSelectLink: document.getElementById("bookSelectLink"),
        }

        // 번역본 타입 기준으로 label 수정
        if (DOM.translationTypeLabel) {
            DOM.translationTypeLabel.textContent = translationType;
        }

        // 현재 책 이름 표시
        DOM.chapterSelectLinkLabel.textContent = bookName;
        if (DOM.chapterSelectLink) {
            DOM.chapterSelectLink.href = `/web/bible/chapter?translationId=${translationId}&bookOrder=${bookOrder}`;
        }
        updateDescriptionUrl(bookOrder);

        // 번역본 언어 기준으로 label 수정
        switch (translationLanguage) {
            case "ko":
                DOM.summaryLabel.textContent = "요약";
                DOM.authorLabel.textContent = "저자";
                DOM.writtenYearLabel.textContent = "년도";
                DOM.historicalPeriodLabel.textContent = "시대";
                DOM.backgroundLabel.textContent = "배경";
                DOM.contentLabel.textContent = "내용";
                break;
            case "en":
                DOM.summaryLabel.textContent = "Summary";
                DOM.authorLabel.textContent = "Author";
                DOM.writtenYearLabel.textContent = "Written Year";
                DOM.historicalPeriodLabel.textContent = "Historical Period";
                DOM.backgroundLabel.textContent = "Background";
                DOM.contentLabel.textContent = "Content";
                break;
        }

        // 책 리스트 가져오기 (sessionStorage 활용)
        if (!books || books.length === 0) {
            return;
        }
        const currentIndex = books.findIndex(book => book.bookOrder === bookOrder);

        // 이전/다음 버튼 제어
        DOM.prevBtn.disabled = currentIndex <= 0;
        DOM.nextBtn.disabled = currentIndex >= books.length - 1;

        DOM.prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) {
                const prevBook = books[currentIndex - 1];
                BookStore.saveCurrentBook(prevBook);
                updateDescriptionUrl(prevBook.bookOrder);
                if (DOM.chapterSelectLink) {
                    DOM.chapterSelectLink.href = `/web/bible/chapter?translationId=${translationId}&bookOrder=${prevBook.bookOrder}`;
                }
                window.location.reload();
            }
        });

        DOM.nextBtn.addEventListener("click", () => {
            if (currentIndex < books.length - 1) {
                const nextBook = books[currentIndex + 1];
                BookStore.saveCurrentBook(nextBook);
                updateDescriptionUrl(nextBook.bookOrder);
                if (DOM.chapterSelectLink) {
                    DOM.chapterSelectLink.href = `/web/bible/chapter?translationId=${translationId}&bookOrder=${nextBook.bookOrder}`;
                }
                window.location.reload();
            }
        });

        // ✅ 분리된 함수 호출
        await loadBookDetail(translationId, bookOrder, DOM);
    });

    async function loadBookDetail(translationId, bookOrder, DOM) {
        try {
            const response = await fetch(`/api/v1/bibles/translations/${translationId}/books/${bookOrder}`);
            if (!response.ok) {
                throw new Error("책 정보를 불러오는 데 실패했습니다.");
            }
            const data = await response.json();
            DOM.bookName.textContent = data.bookName;
            DOM.summary.textContent = data.description.summary;
            DOM.author.textContent = data.description.author;
            DOM.writtenYear.textContent = data.description.writtenYear;
            DOM.historicalPeriod.textContent = data.description.historicalPeriod;
            DOM.background.textContent = data.description.background;
            DOM.content.innerHTML = data.description.content;
            DOM.chapterSelectLinkLabel.textContent = data.bookName;
        } catch (error) {
            alert("에러: " + error.message);
        }
    }
</script>

</body>
</html>
