<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('TheBible - Bible Books | 성경책 목록', true, null)}"></head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper pt-3">
  <div id="bookList" class="book-grid"></div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const navDOM = {
            translationLink: document.getElementById("topNavTranslationLink"),
            searchLink: document.getElementById("topNavSearchLink"),
            translationTypeLabel: document.getElementById("translationTypeLabel"),
            translationNameLabel: document.getElementById("translationNameLabel"),
        };
        if (navDOM.translationLink) {
            navDOM.translationLink.classList.remove("d-none");
            navDOM.translationLink.addEventListener("click", () => {
                TranslationStore.saveTranslationReturnPath("/web/bible/book");
            });
        }
        if (navDOM.searchLink) {
            navDOM.searchLink.classList.remove("d-none");
        }
        if (navDOM.translationNameLabel) {
            navDOM.translationNameLabel.classList.remove("d-none");
        }

        const translationId = TranslationStore.getCurrentTranslationId();
        const translationType = TranslationStore.getCurrentTranslationType();
        const translationName = TranslationStore.getCurrentTranslationName();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }
        if (navDOM.translationTypeLabel) {
            navDOM.translationTypeLabel.textContent = translationType;
        }
        if (navDOM.translationNameLabel) {
            navDOM.translationNameLabel.textContent = translationName;
        }

        // 📌 sessionStorage에서 데이터 확인 후 즉시 렌더링 (API 요청 최소화)
        function renderFromSessionStorage() {
            const books = BookStore.getListForTranslation(translationId);
            if (books) {
                renderBooks(books);
                return true;
            }
            return false;
        }

        // 📌 화면 업데이트 함수
        function renderBooks(books) {
            const bookList = document.getElementById("bookList");
            bookList.innerHTML = "";
            books.forEach(book => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "book-tile";
                button.textContent = book.bookName;
                button.dataset.bookId = book.bookId;
                button.dataset.bookName = book.bookName;
                button.addEventListener("click", () => {
                    BookStore.saveCurrentBook(book);
                    window.location.href = "/web/bible/chapter";
                });
                bookList.appendChild(button);
            });
            BookStore.saveListForTranslation(translationId, books);
        }

        // 📌 API에서 데이터 가져오기 (sessionStorage에 없을 경우)
        async function fetchBooksFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books`);
                if (!response.ok) {
                    throw new Error("데이터를 불러오는 중 오류가 발생했습니다.");
                }
                const data = await response.json();
                renderBooks(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // 📌 최초 데이터 로드 (sessionStorage 우선, 없으면 API 호출)
        if (!renderFromSessionStorage()) {
            await fetchBooksFromAPI();
        }
    });
</script>
</body>
</html>
