<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Bible Verses | 성경 구절 목록', true, null)}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper mb-70">
    <table class="table table-striped table-sm">
        <tbody id="verseTableBody"></tbody>
    </table>
</main>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
    <div class="nav-container">
        <!-- 이전 장 버튼 -->
        <button id="prevChapterBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                disabled
                aria-label="이전 장으로 이동">
            <!-- 이모지는 스크린리더에서 읽히지 않도록 aria-hidden 사용 -->
            <span aria-hidden="true">⬅</span>
            <span class="d-none d-md-inline ms-2">이전</span>
        </button>

        <!-- 장 선택 (페이지 이동) -->
        <a id="chapterSelectLink"
           href="/web/bible/chapter"
           class="btn btn-lg btn-primary"
           aria-label="장 선택">
            <span aria-hidden="true">📖</span>
            <span id="chapterSelectLinkLabel" class="ms-2"></span>
        </a>

        <!-- 다음 장 버튼 -->
        <button id="nextChapterBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                disabled
                aria-label="다음 장으로 이동">
            <span class="d-none d-md-inline me-2">다음</span>
            <span aria-hidden="true">➡</span>
        </button>
    </div>
</div>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const DOM = {
            translationLink: document.getElementById("topNavTranslationLink"),
            searchLink: document.getElementById("topNavSearchLink"),
            translationTypeLabel: document.getElementById("translationTypeLabel"),
            bookLabel: document.getElementById("bookLabel"),
            chapterLabel: document.getElementById("chapterLabel"),
            verseTable: document.getElementById("verseTableBody"),
            prevBtn: document.getElementById("prevChapterBtn"),
            chapterSelectLinkLabel: document.getElementById("chapterSelectLinkLabel"),
            nextBtn: document.getElementById("nextChapterBtn"),
        };

        const RETURN_PATH = "/web/bible/verse";
        const state = {
            translationId: TranslationStore.getCurrentTranslationId(),
            translationType: TranslationStore.getCurrentTranslationType(),
            bookOrder: BookStore.getCurrentBookOrder(),
            bookName: null,
            chapterNumber: ChapterStore.getNumber(),
        };

        if (!state.translationId || !state.translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        state.bookName = BookStore.getBookName(state.translationId, state.bookOrder);
        if (!state.bookOrder || !state.bookName) {
            window.location.href = "/web/bible/book";
            return;
        }

        if (!state.chapterNumber) {
            window.location.href = "/web/bible/chapter";
            return;
        }

        initNav();
        updateLabels(state.chapterNumber);

        DOM.prevBtn.addEventListener("click", () => loadChapter("PREV"));
        DOM.nextBtn.addEventListener("click", () => loadChapter("NEXT"));
        DOM.verseTable.addEventListener("click", handleVerseClick);

        await loadChapter("CURRENT");

        function initNav() {
            if (DOM.translationLink) {
                DOM.translationLink.classList.remove("d-none");
                DOM.translationLink.addEventListener("click", () => {
                    TranslationStore.saveTranslationReturnPath(RETURN_PATH);
                });
            }
            if (DOM.searchLink) {
                DOM.searchLink.classList.remove("d-none");
            }
            if (DOM.bookLabel) {
                DOM.bookLabel.classList.remove("d-none");
            }
            if (DOM.chapterLabel) {
                DOM.chapterLabel.classList.remove("d-none");
            }
        }

        function updateLabels(chapterNum) {
            if (DOM.translationTypeLabel) {
                DOM.translationTypeLabel.textContent = state.translationType;
            }
            if (DOM.bookLabel) {
                DOM.bookLabel.textContent = state.bookName;
                DOM.bookLabel.href = "/web/bible/book";
            }
            if (DOM.chapterLabel) {
                DOM.chapterLabel.textContent = chapterNum;
            }
            DOM.chapterSelectLinkLabel.textContent = `${state.bookName} ${chapterNum}`;
        }

        function handleVerseClick(e) {
            const verseEl = e.target.closest("[data-verse]");
            if (!verseEl) {
                return;
            }
            const verseNum = verseEl.getAttribute("data-verse");
            if (e.target.classList.contains("memo-save-btn")) {
                saveMemo(verseNum);
                return;
            }
            if (e.target.classList.contains("memo-delete-btn")) {
                deleteMemo(verseNum);
                return;
            }
            toggleMemo(verseNum);
            applyVerseHighlight(verseNum);
        }

        async function loadChapter(direction) {
            try {
                const url = buildChapterUrl(direction);
                const response = await fetch(url);
                if (!response.ok) throw new Error("데이터 로딩 실패");
                const data = await response.json();
                state.bookOrder = data.book.bookOrder;
                state.bookName = data.book.bookName;
                state.chapterNumber = data.book.chapter.chapterNumber;
                BookStore.saveCurrentBook({
                    bookOrder: state.bookOrder,
                    bookName: state.bookName
                });
                ChapterStore.saveNumber(state.chapterNumber);
                renderChapter(data);
            } catch (e) {
                showAlert("장 정보를 불러오지 못했습니다.", "danger");
                console.error(e);
            }
        }

        function buildChapterUrl(direction) {
            const base = `/api/bibles/translations/${state.translationId}/books/${state.bookOrder}/chapters/${state.chapterNumber}`;
            if (direction === "CURRENT") {
                return `${base}/verses`;
            }
            return `${base}/navigate?direction=${direction}`;
        }

        function renderChapter(data) {
            const chapter = data.book.chapter;
            updateLabels(chapter.chapterNumber);
            DOM.verseTable.innerHTML = chapter.verses.map(renderVerseRow).join("");
            DOM.prevBtn.disabled = data.isFirst;
            DOM.nextBtn.disabled = data.isLast;
            const verseNumber = VerseStore.consumeVerseNumber();
            if (verseNumber) {
                highlightVerse(verseNumber);
            } else {
                window.scrollTo(0, 0);
            }
        }

        function highlightVerse(verseNumber) {
            setTimeout(() => {
                const targetVerse = document.querySelector(`.verse-text[data-verse="${verseNumber}"]`);
                if (!targetVerse) return;
                targetVerse.classList.add("highlighted-verse");
                targetVerse.scrollIntoView({behavior: "smooth", block: "center"});
                setTimeout(() => {
                    targetVerse.classList.remove("highlighted-verse");
                }, 5000);
            }, 100);
        }

        function renderVerseRow(verse) {
            const v = verse.verseNumber;
            const memoKey = buildMemoKey(v);
            const hasMemo = !!localStorage.getItem(memoKey);
            const verseClass = hasMemo ? "verse-text text-body verse-has-memo" : "verse-text text-body";
            return `
            <tr>
              <td>${v}</td>
              <td>
                <div class="${verseClass}" id="verse-text-${v}" data-verse="${v}">${verse.text}</div>
                <div class="memo-container d-none mt-3" id="memo-${v}">
                  <div class="form-group">
                    <textarea class="form-control mb-2" rows="3" placeholder="메모를 입력하세요..." id="memo-input-${v}"></textarea>
                    <div class="text-end">
                      <button class="btn btn-sm btn-primary memo-save-btn" data-verse="${v}">💾 저장</button>
                      <button class="btn btn-sm btn-danger memo-delete-btn" data-verse="${v}">🗑️ 삭제</button>
                    </div>
                  </div>
                </div>
              </td>
            </tr>
          `;
        }

        function toggleMemo(verseNum) {
            document.querySelectorAll(".memo-container").forEach(el => {
                const isTarget = el.id === `memo-${verseNum}`;
                if (isTarget) {
                    el.classList.toggle("d-none"); // 열려있으면 닫고, 닫혀있으면 염
                } else {
                    el.classList.add("d-none"); // 나머지는 모두 닫기
                }
            });

            const textarea = document.getElementById(`memo-input-${verseNum}`);
            if (textarea) {
                const key = buildMemoKey(verseNum);
                textarea.value = localStorage.getItem(key) || "";
            }
        }

        function applyVerseHighlight(verseNum) {
            document.querySelectorAll(".verse-text").forEach(el => {
                const isTarget = el.id === `verse-text-${verseNum}`;
                if (isTarget) {
                    el.classList.toggle("active");
                } else {
                    el.classList.remove("active");
                }
            });
        }

        function saveMemo(verseNum) {
            const textarea = document.getElementById(`memo-input-${verseNum}`);
            if (!textarea) {
                showAlert("메모 입력란을 찾을 수 없습니다", "danger");
                return;
            }
            const value = textarea?.value.trim();
            if (!value) {
                return;
            }
            const key = buildMemoKey(verseNum);
            localStorage.setItem(key, value);
            const verseTextEl = document.querySelector(`.verse-text[data-verse="${verseNum}"]`);
            verseTextEl?.classList.add("verse-has-memo");
            toggleMemo(verseNum);
            applyVerseHighlight(verseNum);
        }

        function deleteMemo(verseNum) {
            const key = buildMemoKey(verseNum);
            localStorage.removeItem(key);
            const verseTextEl = document.querySelector(`.verse-text[data-verse="${verseNum}"]`);
            verseTextEl?.classList.remove("verse-has-memo");
            toggleMemo(verseNum);
            applyVerseHighlight(verseNum);
        }

        function buildMemoKey(verseNum) {
            return `memo_${state.translationId}_${state.bookOrder}_${state.chapterNumber}_${verseNum}`;
        }

        function showAlert(message, type = "success") {
            alert(`${type}: ` + message);
        }
    });
</script>
</body>
</html>
