  <link rel="canonical" href="https://elseeker.com/">

  <!-- 📘 Open Graph for SNS (Facebook, KakaoTalk 등) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="📖 TheBible - 온라인 성경 검색 사이트">
  <meta property="og:description"
        content="다양한 성경 번역본, 빠른 성경 구절 검색, 쉽고 편리한 성경을 제공하는 온라인 성경 검색 사이트 TheBible입니다. 개인 성경 공부, 설교 준비, 큐티 및 묵상에 필요한 최적의 도구를 무료로 만나보세요">
  <meta property="og:image" content="https://elseeker.com/images/thebible.png">
  <meta property="og:url" content="https://elseeker.com/">

  <!-- 🐦 Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="📖 TheBible - 온라인 성경 검색 사이트">
  <meta name="twitter:description" content="개역한글, KRV, 킹제임스, KJV 등 다양한 번역본 제공. 모바일에서도 편리하게 검색하고 읽으세요.">
  <meta name="twitter:image" content="https://elseeker.com/images/thebible.png">

  <!-- 🔗 Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- 💅 Styles -->

  <link href="/css/common.css?v7" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper pt-3">
  <div class="top-nav">
    <!-- 번역본 선택 -->
    <a href="/web/bible/translation"
       onclick="TranslationStore.saveTranslationReturnPath('/web/bible/verse')"
       class="top-nav-translation-button btn btn-outline-secondary dropdown-toggle"
       role="button"
       aria-label="번역본 선택"
       title="번역본 선택 페이지로 이동">
      <span id="translationTypeLabel"></span>
    </a>

    <!-- 현재책 현재장 표시 -->
    <div class="top-nav-title">
      <strong id="bookLabel"></strong>&nbsp;<span id="chapterLabel"></span>
    </div>

    <!-- 검색 -->
    <a href="/web/bible/search"
       class="top-nav-search-button btn btn-outline-secondary"
       role="button"
       aria-label="본문 검색"
       title="본문 검색">
      🔍
    </a>
  </div>
  <table class="table table-striped table-sm">
    <tbody id="verseTableBody"></tbody>
  </table>
</div>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
  <div class="nav-container">
    <!-- 이전 장 버튼 -->
    <button id="prevChapterBtn"
            class="btn btn-lg btn-outline-primary prev-next"
            type="button"
            disabled
            aria-label="이전 장으로 이동">
      <!-- 이모지는 스크린리더에서 읽히지 않도록 aria-hidden 사용 -->
      <span aria-hidden="true">⬅</span>
      <span class="d-none d-md-inline ms-2">이전</span>
    </button>

    <!-- 장 선택 (페이지 이동) -->
    <a id="chapterSelectLink"
       href="/web/bible/chapter"
       class="btn btn-lg btn-primary"
       aria-label="장 선택">
      <span aria-hidden="true">📖</span>
      <span id="chapterSelectLinkLabel" class="ms-2"></span>
    </a>

    <!-- 다음 장 버튼 -->
    <button id="nextChapterBtn"
            class="btn btn-lg btn-outline-primary prev-next"
            type="button"
            disabled
            aria-label="다음 장으로 이동">
      <span class="d-none d-md-inline me-2">다음</span>
      <span aria-hidden="true">➡</span>
    </button>
  </div>
</div>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const translationId = TranslationStore.getCurrentTranslationId();
        const translationType = TranslationStore.getCurrentTranslationType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        let bookOrder = BookStore.getCurrentBookOrder();
        let bookName = BookStore.getBookName(translationId, bookOrder);
        if (!bookOrder || !bookName) {
            window.location.href = "/web/bible/book";
            return;
        }

        let chapterNumber = ChapterStore.getNumber();
        if (!chapterNumber) {
            window.location.href = "/web/bible/chapter";
            return;
        }

        const DOM = {
            translationTypeLabel: document.getElementById("translationTypeLabel"),
            bookLabel: document.getElementById("bookLabel"),
            chapterLabel: document.getElementById("chapterLabel"),
            verseTable: document.getElementById("verseTableBody"),
            prevBtn: document.getElementById("prevChapterBtn"),
            chapterSelectLinkLabel: document.getElementById("chapterSelectLinkLabel"),
            nextBtn: document.getElementById("nextChapterBtn"),
        };

        DOM.translationTypeLabel.textContent = translationType;
        DOM.bookLabel.textContent = bookName;
        DOM.chapterLabel.textContent = chapterNumber;
        DOM.chapterSelectLinkLabel.textContent = `${bookName} ${chapterNumber}`;

        DOM.prevBtn.addEventListener("click", () => loadChapter("PREV"));
        DOM.nextBtn.addEventListener("click", () => loadChapter("NEXT"));
        DOM.verseTable.addEventListener("click", e => {
            const verseEl = e.target.closest("[data-verse]");
            if (!verseEl) {
                return;
            }
            const verseNum = verseEl.getAttribute("data-verse");
            if (e.target.classList.contains("memo-save-btn")) {
                saveMemo(verseNum);
            } else if (e.target.classList.contains("memo-delete-btn")) {
                deleteMemo(verseNum)
            } else {
                toggleMemo(verseNum);
                applyVerseHighlight(verseNum);
            }
        });

        await loadChapter("CURRENT");

        async function loadChapter(direction) {
            try {
                let url;
                if (direction === "CURRENT") {
                    url = `/api/bibles/translations/${translationId}/books/${bookOrder}/chapters/${chapterNumber}/verses`;
                } else {
                    url = `/api/bibles/translations/${translationId}/books/${bookOrder}/chapters/${chapterNumber}/navigate?direction=${direction}`;
                }

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error("데이터 로딩 실패");
                }
                const data = await response.json();
                bookOrder = data.book.bookOrder;
                bookName = data.book.bookName;
                chapterNumber = data.book.chapter.chapterNumber;

                BookStore.saveCurrentBook({
                    bookOrder: bookOrder,
                    bookName: bookName
                });
                ChapterStore.saveNumber(chapterNumber);
                renderChapter(data);
            } catch (e) {
                showAlert("장 정보를 불러오지 못했습니다.", "danger");
                console.error(e);
            }
        }

        function renderChapter(data) {
            const chapter = data.book.chapter;
            DOM.translationTypeLabel.textContent = translationType;
            DOM.bookLabel.textContent = bookName;
            DOM.chapterLabel.textContent = chapter.chapterNumber;
            DOM.chapterSelectLinkLabel.textContent = `${bookName} ${chapter.chapterNumber}`;
            DOM.verseTable.innerHTML = chapter.verses.map(renderVerseRow).join("");
            DOM.prevBtn.disabled = data.isFirst;
            DOM.nextBtn.disabled = data.isLast;
            const verseNumber = VerseStore.consumeVerseNumber();
            if (verseNumber) {
                setTimeout(() => {
                    const targetVerse = document.querySelector(`.verse-text[data-verse="${verseNumber}"]`);
                    if (targetVerse) {
                        targetVerse.classList.add("highlighted-verse");
                        targetVerse.scrollIntoView({behavior: "smooth", block: "center"});
                        setTimeout(() => {
                            targetVerse.classList.remove("highlighted-verse");
                        }, 5000);
                    }
                }, 100);
            } else {
                window.scrollTo({top: 0, behavior: "smooth"});
            }
        }

        function renderVerseRow(verse) {
            const v = verse.verseNumber;
            const memoKey = buildMemoKey(v);
            const hasMemo = !!localStorage.getItem(memoKey);
            const verseClass = hasMemo ? "verse-text text-body verse-has-memo" : "verse-text text-body";
            return `
            <tr>
              <td>${v}</td>
              <td>
                <div class="${verseClass}" id="verse-text-${v}" data-verse="${v}">${verse.text}</div>
                <div class="memo-container d-none mt-3" id="memo-${v}">
                  <div class="form-group">
                    <textarea class="form-control mb-2" rows="3" placeholder="메모를 입력하세요..." id="memo-input-${v}"></textarea>
                    <div class="text-end">
                      <button class="btn btn-sm btn-primary memo-save-btn" data-verse="${v}">💾 저장</button>
                      <button class="btn btn-sm btn-danger memo-delete-btn" data-verse="${v}">🗑️ 삭제</button>
                    </div>
                  </div>
                </div>
              </td>
            </tr>
          `;
        }

        function toggleMemo(verseNum) {
            document.querySelectorAll(".memo-container").forEach(el => {
                const isTarget = el.id === `memo-${verseNum}`;
                if (isTarget) {
                    el.classList.toggle("d-none"); // 열려있으면 닫고, 닫혀있으면 염
                } else {
                    el.classList.add("d-none"); // 나머지는 모두 닫기
                }
            });

            const textarea = document.getElementById(`memo-input-${verseNum}`);
            if (textarea) {
                const key = buildMemoKey(verseNum);
                textarea.value = localStorage.getItem(key) || "";
            }
        }

        function applyVerseHighlight(verseNum) {
            document.querySelectorAll(".verse-text").forEach(el => {
                const isTarget = el.id === `verse-text-${verseNum}`;
                if (isTarget) {
                    el.classList.toggle("active");
                } else {
                    el.classList.remove("active");
                }
            });
        }

        function saveMemo(verseNum) {
            const textarea = document.getElementById(`memo-input-${verseNum}`);
            if (!textarea) {
                showAlert("메모 입력란을 찾을 수 없습니다", "danger");
                return;
            }
            const value = textarea?.value.trim();
            if (!value) {
                return;
            }
            const key = buildMemoKey(verseNum);
            localStorage.setItem(key, value);
            const verseTextEl = document.querySelector(`.verse-text[data-verse="${verseNum}"]`);
            verseTextEl?.classList.add("verse-has-memo");
            toggleMemo(verseNum);
            applyVerseHighlight(verseNum);
        }

        function deleteMemo(verseNum) {
            const key = buildMemoKey(verseNum);
            localStorage.removeItem(key);
            const verseTextEl = document.querySelector(`.verse-text[data-verse="${verseNum}"]`);
            verseTextEl?.classList.remove("verse-has-memo");
            toggleMemo(verseNum);
            applyVerseHighlight(verseNum);
        }

        function buildMemoKey(verseNum) {
            return `memo_${translationId}_${bookOrder}_${chapterNumber}_${verseNum}`;
        }

        function showAlert(message, type = "success") {
            alert(`${type}: ` + message);
        }
    });
</script>
</body>
</html>
