<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('ElSeeker | 마이페이지', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/member/mypage.css?v=2.2')}"></head>
<body class="has-fixed-nav mypage-page">
<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper mypage-shell">
    <section class="page-hero mypage-hero" aria-labelledby="mypageTitle">
        <div class="page-hero-content mypage-hero-content">
            <div class="mypage-avatar">
                <img id="mypageAvatar" src="/images/user.png" alt="프로필 이미지" loading="lazy">
            </div>
            <div class="mypage-intro">
                <p class="mypage-eyebrow">오늘의 말씀과 함께</p>
                <h1 id="mypageTitle" class="mypage-title">계정을 불러오는 중입니다</h1>
                <p id="mypageEmail" class="mypage-email">잠시만 기다려 주세요.</p>
                <div class="mypage-badges">
                    <span id="mypageRole" class="badge mypage-badge role">회원</span>
                    <span id="mypageProvider" class="badge mypage-badge provider">연동 확인 중</span>
                </div>
            </div>
        </div>
    </section>

    <div class="row g-3">
        <div class="col-12 col-lg-7">
            <article class="card card-panel card-soft mypage-info-card h-100 border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="h5 fw-bold mb-0">계정 정보</h2>
                        <span class="mypage-status-pill">보안 유지 중</span>
                    </div>
                    <dl class="mypage-info-list">
                        <div class="mypage-info-item">
                            <dt>닉네임</dt>
                            <dd id="mypageNicknameDetail">-</dd>
                        </div>
                        <div class="mypage-info-item">
                            <dt>이메일</dt>
                            <dd id="mypageEmailDetail">-</dd>
                        </div>
                        <div class="mypage-info-item">
                            <dt>권한</dt>
                            <dd id="mypageRoleDetail">-</dd>
                        </div>
                        <div class="mypage-info-item">
                            <dt>연동 계정</dt>
                            <dd id="mypageProviderDetail">-</dd>
                        </div>
                    </dl>
                    <div class="mypage-divider"></div>
                    <form id="mypageEditForm" class="mypage-edit-form">
                        <h3 class="h6 fw-bold mb-3">회원 정보 수정</h3>
                        <div class="mb-3">
                            <label class="form-label" for="mypageNicknameInput">닉네임</label>
                            <input id="mypageNicknameInput" class="form-control" type="text" autocomplete="nickname" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button id="mypageSaveButton" class="btn btn-primary" type="submit">저장하기</button>
                            <button id="mypageResetButton" class="btn btn-outline-secondary" type="button">초기화</button>
                        </div>
                    </form>
                    <div id="mypageSuccessMessage" class="alert alert-success mt-3 d-none" role="alert"></div>
                    <div id="mypageErrorMessage" class="alert alert-warning mt-3 d-none" role="alert"></div>
                </div>
            </article>
        </div>
        <div class="col-12 col-lg-5">
            <article class="card card-panel card-soft mypage-action-card h-100 border-0 shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 fw-bold mb-3">빠른 이동</h2>
                    <p class="text-muted small mb-4">말씀 읽기부터 퀴즈까지 자주 쓰는 메뉴를 모았습니다.</p>
                    <div class="mypage-action-grid">
                        <a class="btn btn-outline-secondary" href="/web/bible/translation">성경 읽기</a>
                        <a class="btn btn-outline-secondary" href="/web/game">성경 퀴즈</a>
                        <a class="btn btn-outline-secondary" href="/web/study/dictionary">성경 사전</a>
                        <a class="btn btn-outline-danger" href="/web/member/withdraw">회원탈퇴</a>
                    </div>
                    <div class="mypage-tips mt-4">
                        <h3 class="h6 fw-bold mb-2">오늘의 묵상</h3>
                        <p id="dailyVerseText" class="mypage-daily-verse-text">오늘의 묵상을 불러오는 중입니다.</p>
                        <p id="dailyVerseRef" class="mypage-daily-verse-ref mb-0">개역한글(KRV)</p>
                    </div>
                </div>
            </article>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module" src="/js/member/mypage.js?v=2.1"></script>
</body>
</html>
