<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('회원탈퇴 완료 | ElSeeker', true, '/css/hero.css?v=5.1,/css/card.css?v=5.0,/css/member/withdraw.css?v=5.0')}"
      th:with="robotsContent='noindex'"></head>
<body class="has-fixed-nav">
<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper withdraw-page">
    <section class="page-hero withdraw-hero" aria-labelledby="withdrawCompleteTitle">
        <div class="page-hero-content">
            <h2 id="withdrawCompleteTitle" class="page-hero-title">그동안 함께 해주셔서 감사합니다.</h2>
            <p class="page-hero-lead">편하실 때 언제든 다시 들려주세요 😊</p>
            <p class="page-hero-lead">하나님의 은혜와 평강이 늘 가득하시기를 기도합니다 🙏</p>
        </div>
    </section>

    <article class="card card-panel card-soft">
        <div class="card-body">
            <div class="withdraw-actions">
                <a class="btn btn-outline-secondary" href="/">홈으로</a>
                <a class="btn btn-primary" href="/web/auth/login">다시 로그인</a>
            </div>
        </div>
    </article>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module">
    document.addEventListener("DOMContentLoaded", () => {
        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "회원탈퇴 완료";
            pageTitleLabel.classList.remove("d-none");
        }
    });
</script>
</body>
</html>
