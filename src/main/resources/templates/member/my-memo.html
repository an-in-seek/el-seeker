<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('나의 성경 메모 | ElSeeker', true, '/css/search.css?v=2.2,/css/card.css?v=2.3,/css/member/my-memo.css?v=5.0')}"
        th:with="robotsContent='noindex'">
</head>

<body class="has-fixed-nav my-memo-page">
<header th:replace="~{fragments/header :: header(hideTopNavAccount=true)}"></header>

<main class="container content-wrapper my-memo-shell">
    <div id="myMemoTabsSentinel" class="my-memo-tabs-sentinel" aria-hidden="true"></div>
    <nav id="myMemoTabs" class="my-memo-tabs" role="tablist" aria-label="메모 종류">
        <button id="myMemoTabBook" class="my-memo-tab" role="tab" type="button"
                data-tab="book" aria-selected="false">
            책 메모<span id="myMemoTabBookBadge" class="my-memo-tab-badge d-none"></span>
        </button>
        <button id="myMemoTabChapter" class="my-memo-tab" role="tab" type="button"
                data-tab="chapter" aria-selected="false">
            장 메모<span id="myMemoTabChapterBadge" class="my-memo-tab-badge d-none"></span>
        </button>
        <button id="myMemoTabVerse" class="my-memo-tab active" role="tab" type="button"
                data-tab="verse" aria-selected="true">
            절 메모<span id="myMemoTabVerseBadge" class="my-memo-tab-badge d-none"></span>
        </button>
    </nav>

    <div id="myMemoFilter" class="my-memo-filter d-none">
        <div class="row g-2">
            <div class="col-12 col-sm-6">
                <label class="form-label" for="myMemoTranslationFilter">번역본</label>
                <select id="myMemoTranslationFilter" class="form-select">
                    <option value="">전체 번역본</option>
                </select>
            </div>
            <div class="col-12 col-sm-6">
                <label class="form-label" for="myMemoBookFilter">성경책</label>
                <select id="myMemoBookFilter" class="form-select" disabled>
                    <option value="">전체 성경책</option>
                </select>
            </div>
        </div>
    </div>

    <article class="card card-panel card-soft my-memo-info-card border-0 shadow-sm">
        <div class="card-body p-4">

            <div id="myMemoSkeleton" class="my-memo-skeleton-group">
                <div class="skeleton skeleton-memo-card"></div>
                <div class="skeleton skeleton-memo-card"></div>
                <div class="skeleton skeleton-memo-card"></div>
            </div>

            <div id="myMemoList" class="my-memo-list" role="tabpanel"></div>

            <div id="myMemoEmpty" class="my-memo-empty d-none">
                <div class="my-memo-empty-icon" aria-hidden="true">📝</div>
                <p id="myMemoEmptyTitle" class="my-memo-empty-title">아직 작성한 메모가 없습니다</p>
                <p id="myMemoEmptyDesc" class="my-memo-empty-desc">성경 본문에서 마음에 와닿은 구절에 메모를 남겨보세요.</p>
                <a id="myMemoEmptyCta" href="/web/bible/translation" class="btn btn-primary">성경 읽으러 가기</a>
            </div>

            <div id="myMemoLoader" class="my-memo-loader" hidden>
                <div class="spinner-container">
                    <div class="custom-spinner" aria-hidden="true"></div>
                    <p class="loader-text">메모를 불러오는 중입니다...</p>
                </div>
            </div>
            <div id="myMemoSentinel" class="my-memo-sentinel" aria-hidden="true"></div>
        </div>
    </article>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">↑</button>

<script type="module" src="/js/member/my-memo.js?v=2.5"></script>
</body>

</html>
