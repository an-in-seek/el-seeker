<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('로그인 | ElSeeker', true, '/css/login.css?v=2.2')}"></head>
<body class="login-page">
<main class="content-wrapper login-shell">
    <section class="login-grid" aria-labelledby="loginTitle">
        <div class="login-hero">
            <a class="login-brand" href="/" aria-label="El-Seeker 홈으로">
                <img class="login-brand-logo" src="/images/elseeker_login.png" alt="El-Seeker">
            </a>
            <h1 id="loginTitle" class="login-title">나만의 성경<br>여정을 시작하세요</h1>
        </div>

        <div class="login-card">
            <h2 class="login-card-title">간편 로그인</h2>
            <div id="authErrorMessage" class="alert alert-warning d-none" role="alert"></div>
            <div class="social-login-grid">
                <a class="social-login-button kakao" href="/oauth2/authorization/kakao" aria-label="Kakao 계정으로 로그인">
                    <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3C5.373 3 0 6.668 0 11.193C0 14.06 2.167 16.616 5.438 18.067L4.356 21.998C4.269 22.314 4.636 22.57 4.918 22.382L9.63 19.25C10.395 19.354 11.186 19.408 12 19.408C18.627 19.408 24 15.74 24 11.215C24 6.69 18.627 3 12 3Z"/>
                    </svg>
                    <span>Kakao로 계속하기</span>
                </a>
                <a class="social-login-button naver" href="/oauth2/authorization/naver" aria-label="Naver 계정으로 로그인">
                    <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16.41 24H24V0H16.41L7.59 12.64V0H0V24H7.59L16.41 11.36V24Z"/>
                    </svg>
                    <span>Naver로 계속하기</span>
                </a>
                <a class="social-login-button google" href="/oauth2/authorization/google" aria-label="Google 계정으로 로그인">
                    <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4"
                              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853"
                              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05"
                              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335"
                              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Google로 계속하기</span>
                </a>
            </div>
            <p class="login-meta">
                로그인 시 <a href="/web/legal/terms" aria-label="서비스 이용약관">이용약관</a> 및 <a href="/web/legal/privacy" aria-label="개인정보처리방침">개인정보처리방침</a>에
                동의하게 됩니다.
            </p>
            <a class="login-skip" href="/" aria-label="로그인 없이 둘러보기">
                <span>지금은 둘러보기</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </section>
</main>
<script type="module">
    import {checkAuthStatus, showAuthError} from "/js/auth/auth-check.js";

    document.addEventListener("DOMContentLoaded", () => {
        const authErrorMessage = document.getElementById("authErrorMessage");
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get("returnUrl");
        const safeReturnUrl =
            returnUrl && returnUrl.startsWith("/") && !returnUrl.startsWith("//") ? returnUrl : null;
        const fallbackUrl = "/web/game";

        const socialLoginLinks = document.querySelectorAll(".social-login-button[href^='/oauth2/authorization/']");
        if (safeReturnUrl) {
            socialLoginLinks.forEach((link) => {
                const url = new URL(link.getAttribute("href"), window.location.origin);
                url.searchParams.set("returnUrl", safeReturnUrl);
                link.setAttribute("href", `${url.pathname}${url.search}`);
            });
        }

        // 로그인 페이지 접근 시 이미 인증된 사용자는 바로 이동합니다.
        checkAuthStatus({
            onAuthenticated: () => {
                window.location.replace(safeReturnUrl || fallbackUrl);
            },
            onUnauthenticated: () => {
                // 로그인 UI는 비로그인 사용자에게만 노출됩니다.
            },
            onError: () => showAuthError(authErrorMessage, "네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요."),
        });
    });
</script>
</body>
</html>
