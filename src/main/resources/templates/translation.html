<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TheBible - Bible Translations | 성경 번역본</title>

  <!-- 🔍 SEO 최적화 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="다양한 성경 번역본, 빠른 성경 구절 검색, 쉽고 편리한 성경을 제공하는 온라인 성경 검색 사이트 TheBible입니다. 개인 성경 공부, 설교 준비, 큐티 및 묵상에 필요한 최적의 도구를 무료로 만나보세요">
  <meta name="keywords" content="성경, Bible, 번역본, 개역한글, KRV, 킹제임스, KJV, 장, 절, 성경 검색, 성경 읽기, 성경 말씀">
  <meta name="author" content="InSeek">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://elseeker.com/">

  <!-- 📘 Open Graph for SNS (Facebook, KakaoTalk 등) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="📖 TheBible - 온라인 성경 검색 사이트">
  <meta property="og:description"
        content="다양한 성경 번역본, 빠른 성경 구절 검색, 쉽고 편리한 성경을 제공하는 온라인 성경 검색 사이트 TheBible입니다. 개인 성경 공부, 설교 준비, 큐티 및 묵상에 필요한 최적의 도구를 무료로 만나보세요">
  <meta property="og:image" content="https://elseeker.com/images/thebible.png">
  <meta property="og:url" content="https://elseeker.com/">

  <!-- 🐦 Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="📖 TheBible - 온라인 성경 검색 사이트">
  <meta name="twitter:description" content="개역한글, KRV, 킹제임스, KJV 등 다양한 번역본 제공. 모바일에서도 편리하게 검색하고 읽으세요.">
  <meta name="twitter:image" content="https://elseeker.com/images/thebible.png">

  <!-- 🔗 Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- 💅 Styles -->
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v7" rel="stylesheet">
  <style>
    .list-group-item {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
  </style>
</head>
<body>

<div class="container content-wrapper mt-3">
  <div class="list-group" id="translationList">
    <button type="button"
            class="list-group-item list-group-item-action text-start"
            th:each="translation : ${translations}"
            th:data-translation-id="${translation.translationId}"
            th:data-translation-name="${translation.translationName}"
            th:data-translation-type="${translation.translationType}">
      <div class="fw-semibold" th:text="${translation.translationName}"></div>
      <div class="small text-muted" th:text="${translation.translationType}"></div>
    </button>
  </div>
</div>

<script src="/js/storage-util.js?v4"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const returnPath = TranslationStore.consumeTranslationReturnPath();
        document.querySelectorAll("#translationList button").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.getAttribute("data-translation-id");
                const name = btn.getAttribute("data-translation-name");
                const type = btn.getAttribute("data-translation-type");
                TranslationStore.saveCurrentTranslation({id, name, type});
                window.location.href = returnPath;
            });
        });
    });
</script>
</body>
</html>
