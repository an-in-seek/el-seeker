<header th:fragment="header" class="site-header">
    <nav class="top-nav" aria-label="Primary Navigation">
        <div class="top-nav-row">
            <div class="top-nav-row-inner container">
                <div class="top-nav-left">
                    <button id="topNavBackButton"
                            type="button"
                            class="top-nav-back-button top-nav-btn btn btn-outline-secondary d-none"
                            aria-label="뒤로가기"
                            title="뒤로가기">
                        ⬅
                    </button>
                    <a href="/"
                       class="top-nav-home-button top-nav-btn btn btn-outline-secondary"
                       role="button"
                       aria-label="홈으로 이동"
                       title="홈으로 이동"
                       th:if="${hideHomeButton != true}">
                        🏠
                    </a>
                    <a id="topNavTranslationLink"
                       href="/web/bible/translation"
                       class="top-nav-translation-button top-nav-btn btn btn-outline-secondary dropdown-toggle d-none"
                       role="button"
                       aria-label="번역본 선택"
                       title="번역본 선택 페이지로 이동">
                        <span id="translationTypeLabel"></span>
                    </a>
                </div>

                <div class="top-nav-right">
                    <a id="topNavSearchLink"
                       href="/web/bible/search"
                       class="top-nav-search-button top-nav-btn btn btn-outline-secondary d-none"
                       role="button"
                       aria-label="본문 검색"
                       title="본문 검색">
                        🔍
                    </a>
                    <button id="topNavNotificationButton"
                            type="button"
                            class="top-nav-notification-button top-nav-btn btn btn-outline-secondary d-none"
                            aria-label="알림"
                            title="알림"
                            disabled
                            th:data-show-notification="${showNotificationButton == true}">
                        🔔
                        <span id="topNavNotificationBadge" class="top-nav-notification-badge d-none"></span>
                    </button>
                    <div class="top-nav-account">
                        <button id="topNavAccountButton"
                                type="button"
                                class="top-nav-account-button top-nav-btn btn btn-outline-secondary"
                                aria-label="계정 메뉴"
                                aria-haspopup="true"
                                aria-expanded="false">
                            👤
                        </button>
                        <div id="topNavAccountMenu"
                             class="top-nav-account-menu d-none"
                             role="menu"
                             aria-label="계정 메뉴">
                            <a id="topNavLoginLink"
                               href="/web/auth/login"
                               class="top-nav-account-item d-none"
                               role="menuitem">
                                로그인
                            </a>
                            <a id="topNavMyPageLink"
                               href="/web/member/mypage"
                               class="top-nav-account-item d-none"
                               role="menuitem">
                                마이페이지
                            </a>
                            <a id="topNavMyMemoLink"
                               href="/web/member/my-memo"
                               class="top-nav-account-item d-none"
                               role="menuitem">
                                나의 성경 메모
                            </a>
                            <div id="topNavAccountDivider"
                                 class="top-nav-account-divider d-none"
                                 role="separator"
                                 aria-orientation="horizontal"></div>
                            <a id="topNavLogoutLink"
                               href="/web/auth/logout"
                               class="top-nav-account-item d-none"
                               role="menuitem">
                                로그아웃
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="top-nav-title">
            <div class="top-nav-title-inner container">
                <h1 id="pageTitleLabel"
                    class="page-title"
                    th:text="${#strings.isEmpty(pageTitle) ? '' : pageTitle}"
                    th:classappend="${(pageTitleVisible != null ? pageTitleVisible : !#strings.isEmpty(pageTitle)) ? '' : ' d-none'}"></h1>
            </div>
        </div>
    </nav>
    <script type="module">
        import {buildLoginRedirectUrl, checkAuthStatus} from "/js/auth/auth-check.js";

        document.addEventListener("DOMContentLoaded", () => {
            const loginLink = document.getElementById("topNavLoginLink");
            const logoutLink = document.getElementById("topNavLogoutLink");
            const myPageLink = document.getElementById("topNavMyPageLink");
            const myMemoLink = document.getElementById("topNavMyMemoLink");
            const accountDivider = document.getElementById("topNavAccountDivider");
            const accountButton = document.getElementById("topNavAccountButton");
            const accountMenu = document.getElementById("topNavAccountMenu");
            if (!loginLink || !logoutLink || !myPageLink || !myMemoLink || !accountDivider || !accountButton || !accountMenu) {
                return;
            }
            const returnUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;
            loginLink.href = buildLoginRedirectUrl(returnUrl);
            logoutLink.href = `/web/auth/logout?returnUrl=${encodeURIComponent(returnUrl)}`;

            const notificationButton = document.getElementById("topNavNotificationButton");

            checkAuthStatus({
                onAuthenticated: () => {
                    logoutLink.classList.remove("d-none");
                    myPageLink.classList.remove("d-none");
                    myMemoLink.classList.remove("d-none");
                    accountDivider.classList.remove("d-none");
                    if (notificationButton && notificationButton.dataset.showNotification === "true") {
                        notificationButton.classList.remove("d-none");
                    }
                },
                onUnauthenticated: () => {
                    loginLink.classList.remove("d-none");
                },
            });

            const closeAccountMenu = () => {
                accountMenu.classList.add("d-none");
                accountButton.setAttribute("aria-expanded", "false");
            };

            const openAccountMenu = () => {
                accountMenu.classList.remove("d-none");
                accountButton.setAttribute("aria-expanded", "true");
            };

            accountButton.addEventListener("click", () => {
                if (accountMenu.classList.contains("d-none")) {
                    openAccountMenu();
                } else {
                    closeAccountMenu();
                }
            });

            accountButton.addEventListener("keydown", (event) => {
                if (event.key === "ArrowDown") {
                    event.preventDefault();
                    openAccountMenu();
                    const firstItem = accountMenu.querySelector(".top-nav-account-item:not(.d-none)");
                    if (firstItem) {
                        firstItem.focus();
                    }
                }
            });

            accountMenu.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    event.preventDefault();
                    closeAccountMenu();
                    accountButton.focus();
                }
            });

            document.addEventListener("click", (event) => {
                if (!accountMenu.classList.contains("d-none") &&
                    !accountMenu.contains(event.target) &&
                    !accountButton.contains(event.target)) {
                    closeAccountMenu();
                }
            });
        });
    </script>
</header>
