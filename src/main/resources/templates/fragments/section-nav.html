<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="section-nav"
     class="section-nav"
     aria-label="섹션 탐색 메뉴"
     th:with="currentPath=${#httpServletRequest != null ? #httpServletRequest.requestURI : ''}">

    <!-- 성경 -->
    <a href="/web/bible/translation"
       class="section-nav-item"
       th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/web/bible')} ? 'active'"
       th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath, '/web/bible')} ? 'page'">
        <span class="section-nav-icon-wrap">
            <svg class="section-nav-icon section-nav-icon--outline" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="section-nav-icon section-nav-icon--filled" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M6.5 2A2.5 2.5 0 0 0 4 4.5v15A2.5 2.5 0 0 0 6.5 22H20V2H6.5z" fill="currentColor"/>
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
        <span class="section-nav-label">성경</span>
    </a>

    <!-- 학습 -->
    <a href="/web/study"
       class="section-nav-item"
       th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/web/study')} ? 'active'"
       th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath, '/web/study')} ? 'page'">
        <span class="section-nav-icon-wrap">
            <svg class="section-nav-icon section-nav-icon--outline" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="section-nav-icon section-nav-icon--filled" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
        <span class="section-nav-label">학습</span>
    </a>

    <!-- 홈 -->
    <a href="/"
       class="section-nav-item section-nav-item--home"
       th:classappend="${currentPath == '/'} ? 'active'"
       th:attr="aria-current=${currentPath == '/'} ? 'page'">
        <span class="section-nav-icon-wrap">
            <svg class="section-nav-icon section-nav-icon--outline" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="section-nav-icon section-nav-icon--filled" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M12 2L3 9v11a2 2 0 0 0 2 2h4v-8h6v8h4a2 2 0 0 0 2-2V9l-9-7z" fill="currentColor"/>
            </svg>
        </span>
        <span class="section-nav-label">홈</span>
    </a>

    <!-- 게임 -->
    <a href="/web/game"
       class="section-nav-item"
       th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/web/game')} ? 'active'"
       th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath, '/web/game')} ? 'page'">
        <span class="section-nav-icon-wrap">
            <svg class="section-nav-icon section-nav-icon--outline" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <rect x="2" y="6" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M6 12h4M8 10v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="15" cy="11" r="1" fill="currentColor"/>
                <circle cx="18" cy="13" r="1" fill="currentColor"/>
            </svg>
            <svg class="section-nav-icon section-nav-icon--filled" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <rect x="2" y="6" width="20" height="12" rx="2" fill="currentColor"/>
                <path d="M6 12h4M8 10v4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                <circle cx="15" cy="11" r="1" fill="#fff"/>
                <circle cx="18" cy="13" r="1" fill="#fff"/>
            </svg>
        </span>
        <span class="section-nav-label">게임</span>
    </a>

    <!-- 커뮤니티 -->
    <a href="/web/community"
       class="section-nav-item"
       th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/web/community')} ? 'active'"
       th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath, '/web/community')} ? 'page'">
        <span class="section-nav-icon-wrap">
            <svg class="section-nav-icon section-nav-icon--outline" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="section-nav-icon section-nav-icon--filled" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor"/>
            </svg>
        </span>
        <span class="section-nav-label">커뮤니티</span>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.section-nav-item').forEach(function (item) {
                item.addEventListener('click', function (e) {
                    if (this.classList.contains('active')) {
                        e.preventDefault();
                    }
                });
            });
        });
    </script>

</nav>
</body>
</html>
