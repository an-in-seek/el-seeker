<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:fragment="head(title, useCommonCss, extraCss)">
    <meta charset="UTF-8">
    <title th:text="${title}">ElSeeker</title>

    <!-- SEO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="성경을 통해 하나님을 알아가는 여정을 돕는 ElSeeker입니다. 다양한 성경 번역본, 빠른 성경 구절 검색, 성경 퀴즈와 스터디 콘텐츠를 제공합니다.">
    <meta name="keywords" content="ElSeeker, 성경, Bible, 온라인 성경, 성경 검색, 성경 읽기, 성경 말씀, 성경 구절, 성경 장, 성경 절, 성경 퀴즈, 성경 사전, 성경 역사, 성경 공부, 말씀 묵상, 개역한글, KRV, 킹제임스, KJV, 번역본, 성경 번역">
    <meta name="author" content="InSeek">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://elseeker.com/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ElSeeker - 온라인 성경 플랫폼">
    <meta property="og:description"
          content="성경을 통해 하나님을 알아가는 여정을 돕는 ElSeeker. 다양한 성경 번역본, 빠른 성경 구절 검색, 성경 퀴즈와 스터디 콘텐츠를 제공합니다.">
    <meta property="og:image" content="https://elseeker.com/images/elseeker.png">
    <meta property="og:url" content="https://elseeker.com/">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ElSeeker - 온라인 성경 플랫폼">
    <meta name="twitter:description" content="성경을 통해 하나님을 알아가는 여정을 돕는 플랫폼. 다양한 번역본, 빠른 검색, 퀴즈와 스터디 콘텐츠 제공.">
    <meta name="twitter:image" content="https://elseeker.com/images/elseeker.png">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <!-- Styles -->
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link th:if="${useCommonCss}" href="/css/common.css?v=2.2" rel="stylesheet">
    <link th:if="${useCommonCss}" href="/css/footer.css?v=2.2" rel="stylesheet">
    <link th:if="${useCommonCss}" href="/css/top-nav.css?v=2.2" rel="stylesheet">
    <th:block th:if="${extraCss != null}">
        <link th:each="cssPath : ${#strings.arraySplit(extraCss, ',')}"
              th:href="${cssPath}"
              rel="stylesheet">
    </th:block>
</head>
</html>
