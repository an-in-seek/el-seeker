<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Search</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v5" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper pt-3">
  <div class="d-flex flex-wrap flex-md-nowrap align-items-center justify-content-between gap-2 mb-3">
    <a href="/web/bible/translation"
       onclick="TranslationStore.saveTranslationReturnPath('/web/bible/search')"
       class="btn btn-outline-secondary dropdown-toggle flex-fill text-truncate"
       role="button"
       aria-label="번역본 선택"
       title="번역본 선택 페이지로 이동">
      <span id="translationTypeLabel"></span>
    </a>
  </div>
  <div class="input-group my-3">
    <input type="search" id="keywordInput" class="form-control" placeholder="검색할 단어를 입력하세요">
    <button id="searchBtn" class="btn btn-outline-primary">🔍</button>
  </div>
  <table class="table table-striped">
    <caption id="resultCount" class="text-start text-muted caption-top"></caption>
    <tbody id="searchResultBody"></tbody>
  </table>
</div>

<div class="fixed-bottom-nav">
  <div class="nav-container">
    <a id="backBtn"
       class="btn btn-lg btn-primary"
       href="#"
       aria-label="번역본 선택">
      <span aria-hidden="true">⬅️</span>
      <span class="ms-2">뒤로가기</span>
    </a>
  </div>
</div>

<script src="/js/storage-util.js?v3"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const translationId = TranslationStore.getCurrentTranslationId();
        const translationType = TranslationStore.getCurrentTranslationType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        const translationTypeLabel = document.getElementById("translationTypeLabel");
        const keywordInput = document.getElementById("keywordInput");
        const searchBtn = document.getElementById("searchBtn");
        const resultCount = document.getElementById("resultCount");
        const searchResultBody = document.getElementById("searchResultBody");
        const backBtn = document.getElementById("backBtn");

        translationTypeLabel.textContent = translationType;

        keywordInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                searchBtn.click();
            }
        });
        keywordInput.focus();

        searchBtn.addEventListener("click", async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                alert("검색어를 입력하세요.");
                return;
            }
            resultCount.textContent = "검색 중...";
            searchResultBody.innerHTML = "";
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/search?keyword=${encodeURIComponent(keyword)}`);
                if (!response.ok) {
                    throw new Error("검색 실패");
                }
                const data = await response.json();
                if (data.length === 0) {
                    resultCount.textContent = `"${keyword}"에 대한 결과가 없습니다.`;
                    return;
                }
                resultCount.textContent = `"${keyword}"에 대한 결과 ${data.length}건`;
                data.forEach(item => {
                    const row = document.createElement("tr");

                    // 정규식으로 키워드 부분을 강조 처리
                    const highlightedText = item.text.replace(
                        new RegExp(`(${keyword})`, 'gi'), // 대소문자 구분 없이 일치
                        '<span class="highlight-keyword">$1</span>'
                    );

                    row.innerHTML = `
                      <td class="verse-link" style="cursor:pointer"
                          data-book-id="${item.bookId}"
                          data-book-order="${item.bookOrder}"
                          data-book-name="${item.bookName}"
                          data-chapter-id="${item.chapterId}"
                          data-chapter-number="${item.chapterNumber}"
                          data-verse-id="${item.verseId}"
                          data-verse-number="${item.verseNumber}">
                          ${highlightedText} (${item.bookName} ${item.chapterNumber}:${item.verseNumber})
                      </td>
                    `;
                    searchResultBody.appendChild(row);
                });
            } catch (e) {
                resultCount.textContent = "검색 중 오류가 발생했습니다.";
                console.error(e);
            }
        });

        searchResultBody.addEventListener("click", e => {
            const td = e.target.closest(".verse-link");
            if (!td) {
                return;
            }
            BookStore.saveCurrentBook({
                bookOrder: parseInt(td.dataset.bookOrder),
                bookName: td.dataset.bookName,
            });
            ChapterStore.saveNumber(td.dataset.chapterNumber);
            VerseStore.saveNumber(td.dataset.verseNumber);
            window.location.href = "/web/bible/verse";
        });

        backBtn.addEventListener("click", (e) => {
            e.preventDefault();
            history.back();
        });
    });
</script>
</body>
</html>
