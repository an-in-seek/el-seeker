<!DOCTYPE html>
<html lang="ko">
<head>
  <title>검색</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v2" rel="stylesheet">
</head>
<body>
<div class="container content-wrapper">
  <h1 id="searchTitle" class="mt-2"></h1>
  <div class="input-group my-3">
    <input type="text" id="keywordInput" class="form-control" placeholder="검색할 단어를 입력하세요">
    <button id="searchBtn" class="btn btn-outline-primary">🔍</button>
  </div>
  <table class="table table-striped">
    <caption id="resultCount" class="text-start text-muted caption-top"></caption>
    <tbody id="searchResultBody"></tbody>
  </table>
</div>

<div class="fixed-bottom-nav">
  <div class="nav-container">
    <a id="backBtn"
       class="btn btn-lg btn-primary"
       href="#"
       aria-label="번역본 선택">
      <span aria-hidden="true">⬅️</span>
      <span class="ms-2">뒤로가기</span>
    </a>
  </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const searchTitle = document.getElementById("searchTitle");
        const translationId = localStorage.getItem("translationId");
        const translationName = localStorage.getItem("translationName");
        const keywordInput = document.getElementById("keywordInput");
        const searchBtn = document.getElementById("searchBtn");
        const resultCount = document.getElementById("resultCount");
        const searchResultBody = document.getElementById("searchResultBody");
        const backBtn = document.getElementById("backBtn");

        searchTitle.textContent = `${translationName} > 검색`;

        keywordInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                searchBtn.click();
            }
        });
        keywordInput.focus();

        searchBtn.addEventListener("click", async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                alert("검색어를 입력하세요.");
                return;
            }
            resultCount.textContent = "검색 중...";
            searchResultBody.innerHTML = "";
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/search?keyword=${encodeURIComponent(keyword)}`);
                if (!response.ok) {
                    throw new Error("검색 실패");
                }
                const data = await response.json();
                if (data.length === 0) {
                    resultCount.textContent = `"${keyword}"에 대한 결과가 없습니다.`;
                    return;
                }
                resultCount.textContent = `"${keyword}"에 대한 결과 ${data.length}건`;
                data.forEach(item => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                      <td>${item.text} (${item.bookName} ${item.chapterNumber}:${item.verseNumber})</td>
                    `;
                    searchResultBody.appendChild(row);
                });
            } catch (e) {
                resultCount.textContent = "검색 중 오류가 발생했습니다.";
                console.error(e);
            }
        });

        backBtn.addEventListener("click", (e) => {
            e.preventDefault();
            history.back();
        });
    });
</script>
</body>
</html>
