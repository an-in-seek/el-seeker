<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Bible Search | 성경 검색', true, null)}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container search-page content-wrapper">
    <div class="search-controls">
        <form id="searchForm" role="search" class="mb-2">
            <div class="input-group">
                <a id="backBtn"
                   class="btn btn-outline-secondary back-btn-inline"
                   href="#"
                   aria-label="뒤로가기">
                    ⬅️
                </a>
                <input type="search"
                       id="keywordInput"
                       class="form-control"
                       placeholder="검색할 단어를 입력하세요"
                       th:value="${keyword}"
                       autocomplete="off"
                       inputmode="search">
                <button id="clearBtn" type="button" class="btn btn-outline-secondary">지우기</button>
                <button id="searchBtn" type="submit" class="btn btn-outline-primary">🔍</button>
            </div>
        </form>
        <div id="resultCount" class="search-result-meta text-muted small" role="status" aria-live="polite"></div>
        <div id="searchEmptyState" class="text-muted small">검색어를 입력하고 검색을 시작하세요.</div>
    </div>

    <div id="searchResultTable" class="table-responsive mt-2 d-none search-results-scroll">
        <table class="table table-striped table-hover table-sm">
            <tbody id="searchResultBody"></tbody>
        </table>
    </div>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">
    ↑
</button>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const translationId = TranslationStore.getCurrentTranslationId();
        const translationType = TranslationStore.getCurrentTranslationType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        const navDOM = {
            translationLink: document.getElementById("topNavTranslationLink"),
            translationTypeLabel: document.getElementById("translationTypeLabel"),
            pageTitleLabel: document.getElementById("pageTitleLabel"),
            searchLink: document.getElementById("topNavSearchLink"),
        };
        if (navDOM.translationLink) {
            navDOM.translationLink.classList.remove("d-none");
            navDOM.translationLink.classList.add("nav-placeholder");
            navDOM.translationLink.setAttribute("aria-hidden", "true");
            navDOM.translationLink.setAttribute("tabindex", "-1");
        }
        if (navDOM.searchLink) {
            navDOM.searchLink.classList.remove("d-none");
            navDOM.searchLink.classList.add("nav-placeholder");
        }
        if (navDOM.pageTitleLabel) {
            navDOM.pageTitleLabel.textContent = "성경 검색";
            navDOM.pageTitleLabel.classList.remove("d-none");
        }

        const translationTypeLabel = navDOM.translationTypeLabel;
        const keywordInput = document.getElementById("keywordInput");
        const searchForm = document.getElementById("searchForm");
        const clearBtn = document.getElementById("clearBtn");
        const searchBtn = document.getElementById("searchBtn");
        const resultCount = document.getElementById("resultCount");
        const emptyState = document.getElementById("searchEmptyState");
        const searchResultTable = document.getElementById("searchResultTable");
        const searchResultBody = document.getElementById("searchResultBody");
        const backBtn = document.getElementById("backBtn");
        const scrollToTopBtn = document.getElementById("scrollToTopBtn");
        const scrollThreshold = 300;
        const pageSize = 50;
        const scrollLoadOffset = 200;
        const urlParams = new URLSearchParams(window.location.search);
        const initialKeyword = urlParams.get("keyword") ?? "";
        let currentPage = 0;
        let hasNext = false;
        let isLoading = false;
        let totalCount = null;
        let activeKeyword = "";

        if (translationTypeLabel) {
            translationTypeLabel.textContent = translationType;
        }

        function setEmptyState(message) {
            emptyState.textContent = message;
            emptyState.classList.remove("d-none");
            searchResultTable.classList.add("d-none");
        }

        function setResultsVisible() {
            emptyState.classList.add("d-none");
            searchResultTable.classList.remove("d-none");
        }

        function hideEmptyState() {
            emptyState.classList.add("d-none");
        }

        function setLoading(isLoading) {
            searchBtn.disabled = isLoading;
            keywordInput.disabled = isLoading;
            clearBtn.disabled = isLoading;
        }

        function setLoadingState(message) {
            if (!resultCount) {
                return;
            }
            hideEmptyState();
            resultCount.innerHTML = `
                <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                ${message}
            `;
        }

        function resetSearchState() {
            currentPage = 0;
            hasNext = false;
            totalCount = null;
            activeKeyword = "";
            isLoading = false;
        }

        function updateUrl() {
            const params = new URLSearchParams();
            if (activeKeyword) {
                params.set("keyword", activeKeyword);
            }
            const queryString = params.toString();
            const newUrl = queryString ? `${window.location.pathname}?${queryString}` : window.location.pathname;
            history.replaceState(null, "", newUrl);
        }

        function updateResultCount() {
            if (totalCount !== null && activeKeyword) {
                resultCount.textContent = `"${activeKeyword}"에 대한 결과 ${totalCount}건`;
            }
        }

        function appendResults(items) {
            items.forEach(item => {
                const row = document.createElement("tr");

                // 정규식으로 키워드 부분을 강조 처리
                const highlightedText = item.text.replace(
                    new RegExp(`(${activeKeyword})`, "gi"), // 대소문자 구분 없이 일치
                    "<span class=\"highlight-keyword\">$1</span>"
                );

                row.innerHTML = `
                  <td class="verse-link" style="cursor:pointer"
                      data-book-id="${item.bookId}"
                      data-book-order="${item.bookOrder}"
                      data-book-name="${item.bookName}"
                      data-chapter-id="${item.chapterId}"
                      data-chapter-number="${item.chapterNumber}"
                      data-verse-id="${item.verseId}"
                      data-verse-number="${item.verseNumber}">
                      ${highlightedText} (${item.bookName} ${item.chapterNumber}:${item.verseNumber})
                  </td>
                `;
                searchResultBody.appendChild(row);
            });
        }

        async function fetchSearchPage(page) {
            if (!activeKeyword || isLoading || !hasNext) {
                return;
            }
            isLoading = true;
            if (page === 0) {
                setLoading(true);
                hideEmptyState();
                setLoadingState("검색 중...");
            }
            try {
                const response = await fetch(`/api/v1/bibles/translations/${translationId}/search?keyword=${encodeURIComponent(activeKeyword)}&page=${page}&size=${pageSize}`);
                if (!response.ok) {
                    throw new Error("검색 실패");
                }
                const data = await response.json();
                if (page === 0) {
                    totalCount = data.totalCount ?? null;
                    if (totalCount === 0) {
                        setEmptyState("다른 검색어로 다시 시도해 보세요.");
                        hasNext = false;
                    }
                    updateResultCount();
                }

                if (!data.content || data.content.length === 0) {
                    if (page === 0) {
                        setEmptyState("다른 검색어로 다시 시도해 보세요.");
                    }
                    hasNext = false;
                    return;
                }

                setResultsVisible();
                appendResults(data.content);
                hasNext = data.hasNext === true;
            } catch (e) {
                if (page === 0) {
                    resultCount.textContent = "검색 중 오류가 발생했습니다.";
                    setEmptyState("잠시 후 다시 시도해 주세요.");
                }
                console.error(e);
            } finally {
                isLoading = false;
                if (page === 0) {
                    setLoading(false);
                }
            }
        }

        async function startSearch(keyword) {
            const normalizedKeyword = keyword.trim();
            searchResultBody.innerHTML = "";
            resultCount.textContent = "";
            resetSearchState();
            if (!normalizedKeyword) {
                setEmptyState("검색어를 입력하고 검색을 시작하세요.");
                updateUrl();
                return;
            }
            hideEmptyState();
            activeKeyword = normalizedKeyword;
            hasNext = true;
            currentPage = 0;
            updateUrl();
            await fetchSearchPage(0);
            maybeLoadNextPage();
        }

        function maybeLoadNextPage() {
            if (!hasNext || isLoading) {
                return;
            }
            const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - scrollLoadOffset;
            if (nearBottom) {
                currentPage += 1;
                fetchSearchPage(currentPage);
            }
        }

        clearBtn.addEventListener("click", () => {
            keywordInput.value = "";
            keywordInput.focus();
            searchResultBody.innerHTML = "";
            resultCount.textContent = "";
            setEmptyState("검색어를 입력하고 검색을 시작하세요.");
            resetSearchState();
            updateUrl();
        });

        keywordInput.addEventListener("input", () => {
            clearBtn.disabled = keywordInput.value.trim().length === 0;
        });
        keywordInput.focus();
        clearBtn.disabled = keywordInput.value.trim().length === 0;

        searchForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            await startSearch(keywordInput.value);
        });

        searchResultBody.addEventListener("click", e => {
            const td = e.target.closest(".verse-link");
            if (!td) {
                return;
            }
            BookStore.saveCurrentBook({
                bookOrder: parseInt(td.dataset.bookOrder),
                bookName: td.dataset.bookName,
            });
            ChapterStore.saveNumber(td.dataset.chapterNumber);
            VerseStore.saveNumber(td.dataset.verseNumber);
            window.location.href = "/web/bible/verse";
        });

        backBtn.addEventListener("click", (e) => {
            e.preventDefault();
            history.back();
        });

        if (scrollToTopBtn) {
            const updateScrollToTopVisibility = () => {
                if (window.scrollY >= scrollThreshold) {
                    scrollToTopBtn.classList.add("is-visible");
                } else {
                    scrollToTopBtn.classList.remove("is-visible");
                }
            };

            scrollToTopBtn.addEventListener("click", () => {
                window.scrollTo({top: 0, behavior: "smooth"});
            });

            window.addEventListener("scroll", updateScrollToTopVisibility, {passive: true});
            updateScrollToTopVisibility();
        }

        window.addEventListener("scroll", maybeLoadNextPage, {passive: true});

        if (initialKeyword) {
            keywordInput.value = initialKeyword;
            startSearch(initialKeyword);
        }

    });
</script>
</body>
</html>
