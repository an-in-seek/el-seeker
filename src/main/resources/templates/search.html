<!DOCTYPE html>
<html lang="ko">
<head>
  <title>검색</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v1" rel="stylesheet">
</head>
<body>
<div class="container content-wrapper">
  <h1 class="mt-3">검색</h1>
  <div class="input-group my-3">
    <input type="text" class="form-control" id="keywordInput" placeholder="검색할 단어를 입력하세요">
    <button class="btn btn-outline-primary" id="searchBtn">🔍</button>
  </div>
  <div class="mt-2" id="resultCount"></div>
  <table class="table table-bordered mt-2" id="resultTable">
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const translationId = localStorage.getItem("translationId");
        const keywordInput = document.getElementById("keywordInput");
        const searchBtn = document.getElementById("searchBtn");
        const resultCount = document.getElementById("resultCount");
        const resultBody = document.getElementById("resultBody");
        searchBtn.addEventListener("click", async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                alert("검색어를 입력하세요.");
                return;
            }
            resultCount.textContent = "검색 중...";
            resultBody.innerHTML = "";
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/verses/search?keyword=${encodeURIComponent(keyword)}`);
                if (!response.ok) {
                    throw new Error("검색 실패");
                }
                const data = await response.json();
                if (data.length === 0) {
                    resultCount.textContent = `"${keyword}"에 대한 결과가 없습니다.`;
                    return;
                }
                resultCount.textContent = `"${keyword}"에 대한 결과 ${data.length}건`;
                data.forEach(item => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                      <td>${item.bookName} ${item.chapterNumber} ${item.verseNumber}</td>
                      <td>${item.text}</td>
                    `;
                    resultBody.appendChild(row);
                });
            } catch (e) {
                resultCount.textContent = "검색 중 오류가 발생했습니다.";
                console.error(e);
            }
        });
    });
</script>
</body>
</html>
