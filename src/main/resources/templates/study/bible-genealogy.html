<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 족보 | ElSeeker', true, '/css/hero.css?v=2.2,/css/card.css?v=2.2,/css/search.css?v=2.2,/css/study/bible-genealogy.css?v=1.0')}"
      th:with="pageDescription='아담부터 예수님까지 성경 족보의 주요 인물과 계보를 시각적으로 탐색할 수 있는 학습 페이지입니다.'"></head>
<body class="has-fixed-nav has-dual-bottom-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- 로딩 상태 -->
    <div id="genealogyLoading" class="genealogy-loading text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">로딩 중...</span>
        </div>
        <p class="mt-3 text-muted">족보를 불러오는 중입니다...</p>
    </div>

    <!-- 족보 콘텐츠 -->
    <div id="genealogyContent" class="d-none">
        <div class="genealogy-tabs" role="tablist" aria-label="족보 선택">
            <button class="genealogy-tab is-active" role="tab" aria-selected="true"
                    data-tab="matthew" id="tabMatthew" aria-controls="genealogySections">마태복음 족보
            </button>
            <button class="genealogy-tab" role="tab" aria-selected="false"
                    data-tab="luke" id="tabLuke" aria-controls="genealogySections">누가복음 족보
            </button>
        </div>
        <div id="genealogySections" role="tabpanel" aria-labelledby="tabMatthew"></div>
    </div>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">↑</button>

<script type="module" src="/js/study/bible-genealogy.js?v=1.0"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>
</html>
