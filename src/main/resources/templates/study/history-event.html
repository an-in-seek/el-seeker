<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('ElSeeker | 사건 상세', true, null)}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <section class="mb-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h2 class="h4 fw-semibold mb-2" th:text="${detail.title}"></h2>
                <p class="text-muted small mb-3" th:text="${detail.eraLabel}"></p>
                <div class="row g-2">
                    <div class="col-12 col-md-4">
                        <div class="text-muted small">연대</div>
                        <div class="fw-semibold" th:text="${detail.timeline}"></div>
                    </div>
                    <div class="col-12 col-md-8">
                        <div class="text-muted small">한 문장 요약</div>
                        <div th:text="${detail.summary}"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="mb-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h3 class="h6 fw-semibold mb-2">역사적 배경</h3>
                <p class="text-muted mb-0" th:text="${detail.background}"></p>
            </div>
        </div>
    </section>

    <section class="mb-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h3 class="h6 fw-semibold mb-2">관련 성경 본문</h3>
                <div th:if="${#lists.isEmpty(detail.references)}" class="text-muted small">
                    준비중
                </div>
                <div class="d-flex flex-column gap-2" th:if="${!#lists.isEmpty(detail.references)}">
                    <a th:each="reference : ${detail.references}"
                       th:href="${reference.url}"
                       class="text-decoration-none text-primary"
                       th:text="${reference.label}">
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section>
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h3 class="h6 fw-semibold mb-3">연관 학습</h3>
                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-primary btn-sm" href="/web/study/dictionary">성경 사전</a>
                    <button class="btn btn-outline-secondary btn-sm" type="button" disabled>성경 지도</button>
                    <button class="btn btn-outline-secondary btn-sm" type="button" disabled>성경 주석</button>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module" src="/js/study/history-event.js?v=2.1"></script>
</body>
</html>
