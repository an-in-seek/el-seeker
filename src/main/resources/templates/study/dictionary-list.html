<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('ElSeeker | 성경 사전', true, '/css/search.css?v=2.1')}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <div class="search-controls">
        <form id="dictionarySearchForm" class="mb-2" method="get" th:action="@{/web/study/dictionary}" role="search">
            <div class="input-group">
                <input type="search"
                       id="dictionaryKeywordInput"
                       class="form-control"
                       name="keyword"
                       placeholder="찾고 싶은 성경 용어를 입력하세요"
                       th:value="${keyword}"
                       autocomplete="off"
                       inputmode="search"
                       aria-label="성경 용어 검색">
                <button id="dictionaryClearBtn" class="btn btn-outline-secondary" type="button">지우기</button>
                <button id="dictionarySearchBtn" class="btn btn-outline-primary" type="submit">🔍</button>
            </div>
        </form>
        <div id="dictionaryResultCount" class="text-muted small" role="status" aria-live="polite"></div>
        <div id="dictionaryEmptyState" class="text-muted small">
            <p class="mb-1">검색어를 입력하고 사전 검색을 시작하세요.</p>
            <p class="small mb-0">정확한 용어를 모르더라도 일부만 입력해 보세요.</p>
        </div>
    </div>
    <div id="dictionaryList" class="list-group mt-2"></div>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">↑</button>

<script type="module" src="/js/study/dictionary-list.js?v=2.1"></script>
</body>
</html>
