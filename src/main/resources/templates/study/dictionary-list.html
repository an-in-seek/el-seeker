<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head th:replace="~{fragments/head :: head('성경 사전 - 단어·용어 검색 | ElSeeker', true, '/css/search.css?v=2.2,/css/popular-search.css?v=1.2')}"
      th:with="pageDescription='성경에 등장하는 단어와 용어를 검색하고 정의, 원어, 관련 구절을 확인할 수 있는 성경 사전입니다.',
               pageKeywords='성경 사전,성경 단어,성경 용어,히브리어,헬라어,성경 원어,성경 뜻'"></head>

<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <div class="search-controls">
        <form id="dictionarySearchForm" class="mb-2" method="get" th:action="@{/web/study/dictionary}"
              role="search">
            <div class="input-group">
                <input type="search" id="dictionaryKeywordInput" class="form-control" name="keyword"
                       placeholder="찾고 싶은 성경 용어를 입력하세요" th:value="${keyword}" autocomplete="off" inputmode="search"
                       aria-label="성경 용어 검색">
                <button id="dictionaryClearBtn" class="btn btn-outline-secondary" type="button">지우기</button>
                <button id="dictionarySearchBtn" class="btn btn-outline-primary" type="submit">🔍</button>
            </div>
        </form>
        <div id="dictionaryResultCount" class="search-result-meta text-muted small" role="status"
             aria-live="polite"></div>
        <div id="dictionaryEmptyState" class="text-muted small d-none"></div>
    </div>

    <section id="dictionaryKeywordRankingSection" class="mt-3 d-none" aria-labelledby="dictionaryKeywordRankingTitle">
        <article class="popular-search-card">
            <header class="popular-search-card-header">
                <h2 id="dictionaryKeywordRankingTitle" class="popular-search-title">인기 검색어</h2>
                <button type="button" class="popular-search-more"
                        data-ranking-more="dictionary"
                        aria-label="성경 사전 인기 검색어 전체 보기">더보기</button>
            </header>
            <ol id="dictionaryKeywordRankingList" class="popular-search-list"></ol>
        </article>
    </section>

    <div th:replace="~{fragments/popular-search-dialog :: popularSearchDialog}"></div>

    <div id="dictionaryLoading" class="text-center py-5 d-none">
        <div class="spinner-container">
            <div class="custom-spinner"></div>
            <p class="mt-3 text-muted fw-medium">사전 데이터를 불러오는 중입니다...</p>
        </div>
    </div>
    <div id="dictionaryList" class="list-group mt-2"></div>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">↑</button>

<script type="module" src="/js/study/dictionary-list.js?v=2.6"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>

</html>
