<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('성경 O/X 퀴즈 | ElSeeker', true, '/css/hero.css?v=2.2,/css/card.css?v=2.2,/css/game/bible-ox-quiz.css?v=2.0')}">
</head>

<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- 에러 메시지 영역 -->
    <div id="oxQuizError" class="alert alert-danger d-none" role="alert"></div>

    <!-- 로딩 상태 -->
    <div id="oxQuizLoading" class="ox-quiz-loading text-center py-5">
        <div class="spinner-container">
            <div class="custom-spinner"></div>
            <p class="mt-3 text-muted fw-medium">퀴즈를 불러오는 중입니다...</p>
        </div>
    </div>

    <!-- 퀴즈 게임 화면 (stage 파라미터 있을 때) -->
    <section id="oxQuizGame" class="d-none">
        <section class="ox-quiz-hero page-hero" aria-labelledby="oxQuizTitle">
            <div class="ox-quiz-hero-content page-hero-content">
                <p class="ox-quiz-stage-label" id="oxQuizStageLabel">STAGE 1</p>
                <h2 id="oxQuizTitle" class="ox-quiz-hero-title page-hero-title mb-2">창세기</h2>
            </div>
        </section>

        <section class="ox-quiz-card card card-panel card-soft" id="oxQuizPanel" aria-busy="false">
            <div class="card-body">
                <div class="ox-quiz-progress">
                    <div class="ox-quiz-progress-block">
                        <span class="ox-quiz-progress-label">문제</span>
                        <progress class="ox-quiz-progress-bar" id="oxQuizProgressBar" value="1" max="10"
                                  aria-valuemin="1" aria-valuemax="10" aria-valuenow="1"></progress>
                        <span class="ox-quiz-progress-item" id="oxQuizProgress">1 / 10</span>
                    </div>
                </div>

                <div class="ox-quiz-score-bar mb-3">
                        <span class="ox-quiz-score-item">
                            <span class="ox-quiz-score-label">정답</span>
                            <strong class="ox-quiz-score-value text-success" id="oxQuizCorrectCount">0</strong>
                        </span>
                    <span class="ox-quiz-score-item">
                            <span class="ox-quiz-score-label">오답</span>
                            <strong class="ox-quiz-score-value text-danger" id="oxQuizWrongCount">0</strong>
                        </span>
                </div>

                <h3 class="ox-quiz-question h5 fw-semibold mb-4" id="oxQuizQuestion">문제를 불러오는 중입니다...</h3>

                <div class="ox-quiz-options" id="oxQuizOptions">
                    <button type="button" class="ox-quiz-option ox-quiz-option-o" id="oxQuizOptionO" role="button"
                            aria-label="참(O) 선택">
                        <span class="ox-quiz-option-icon" aria-hidden="true">O</span>
                        <span class="ox-quiz-option-label">참</span>
                    </button>
                    <button type="button" class="ox-quiz-option ox-quiz-option-x" id="oxQuizOptionX" role="button"
                            aria-label="거짓(X) 선택">
                        <span class="ox-quiz-option-icon" aria-hidden="true">X</span>
                        <span class="ox-quiz-option-label">거짓</span>
                    </button>
                </div>

                <p class="ox-quiz-feedback text-center" id="oxQuizFeedback" role="status" aria-live="polite"></p>

                <button class="btn btn-primary ox-quiz-next" id="oxQuizNext" type="button" disabled>다음 문제</button>
            </div>
        </section>

        <section class="ox-quiz-complete card card-panel card-soft d-none" id="oxQuizComplete">
            <div class="card-body text-center">
                <div class="ox-quiz-complete-icon" aria-hidden="true" id="oxQuizCompleteIcon">🎉</div>
                <h3 class="h5 fw-semibold mb-2" id="oxQuizCompleteTitle">퀴즈를 완료했어요!</h3>
                <p class="ox-quiz-result-text text-muted small mb-3" id="oxQuizResultText"></p>
                <div class="ox-quiz-stat-grid" id="oxQuizSummary">
                    <div class="ox-quiz-stat">
                        <span class="ox-quiz-stat-label">정답</span>
                        <span class="ox-quiz-stat-value text-success" id="summaryCorrect">-</span>
                    </div>
                    <div class="ox-quiz-stat">
                        <span class="ox-quiz-stat-label">오답</span>
                        <span class="ox-quiz-stat-value text-danger" id="summaryWrong">-</span>
                    </div>
                    <div class="ox-quiz-stat">
                        <span class="ox-quiz-stat-label">정답률</span>
                        <span class="ox-quiz-stat-value" id="summaryAccuracy">-</span>
                    </div>
                </div>
                <div class="ox-quiz-action-group mt-4">
                    <button type="button" class="btn btn-primary" id="oxQuizNextStageBtn">다음 스테이지로</button>
                    <a class="btn btn-outline-secondary" href="/web/game/bible-ox-quiz/map">스테이지 목록으로</a>
                </div>
            </div>
        </section>
    </section>
</main>

<script type="module" src="/js/game/bible-ox-quiz.js?v=2.0"></script>
</body>

</html>
