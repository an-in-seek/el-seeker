<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 타자 | ElSeeker', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/game/bible-typing.css?v=1.5')}"></head>
<body class="has-fixed-nav typing-page">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- Main Workspace: 중앙 집중형 1단 레이아웃 -->
    <div class="row justify-content-center">
        <div class="col-12">

            <!-- 1. Selection Bar: 옵션 선택 -->
            <div class="typing-selection-bar mb-4">
                <div class="row g-2 align-items-center">
                    <div class="col-12 col-md-4">
                        <select id="typingTranslationSelect" class="form-select form-select-sm" aria-label="번역본"></select>
                    </div>
                    <div class="col-12 col-md-4">
                        <select id="typingBookSelect" class="form-select form-select-sm" aria-label="책"></select>
                    </div>
                    <div class="col-12 col-md-4">
                        <select id="typingChapterSelect" class="form-select form-select-sm" aria-label="장"></select>
                    </div>
                </div>
            </div>

            <!-- 3. Action Buttons -->
            <div class="typing-action-bar mb-3">
                <button type="button" class="btn btn-dark px-4 rounded-pill d-none" id="typingStartBtn">시작</button>
                <button type="button" class="btn btn-outline-secondary px-4 rounded-pill d-none" id="typingResetBtn">초기화</button>
            </div>

            <!-- 3. Status Bar: 실시간 지표 통합 -->
            <div class="typing-status-bar mb-3">
                <div class="d-flex align-items-center justify-content-between w-100">
                    <!-- 왼쪽: 진행률 -->
                    <div class="d-flex align-items-center gap-3 flex-grow-1 me-4">
                        <div class="d-flex flex-column">
                            <span class="status-label">진행률</span>
                            <strong class="status-value" id="typingProgressText">0%</strong>
                        </div>
                        <div class="progress flex-grow-1" style="height: 6px;">
                            <div id="typingProgressBar" class="progress-bar bg-teal" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- 오른쪽: 핵심 지표 -->
                    <div class="d-flex align-items-center gap-4">
                        <div class="status-item">
                            <span class="status-label">속도</span>
                            <strong class="status-value"><span id="typingCpm">0</span> <small class="text-muted fw-normal">CPM</small></strong>
                        </div>
                        <div class="status-item">
                            <span class="status-label">정확도</span>
                            <strong class="status-value"><span id="typingAccuracy">0</span>%</strong>
                        </div>
                        <div class="status-item">
                            <span class="status-label">시간</span>
                            <strong class="status-value" id="typingElapsedTime">00:00</strong>
                        </div>
                    </div>
                </div>
            </div>

            <div id="typingMessage" class="alert alert-warning d-none mb-3" role="alert"></div>

            <!-- 3. Verse Card: 입력 영역 -->
            <div class="typing-card typing-verse-card">
                <div class="typing-card-head border-bottom pb-3 mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="h5 fw-bold mb-0" id="typingVerseHeader"></h3>
                        <span class="badge bg-light text-dark border" id="typingVerseStatus">대기</span>
                    </div>
                </div>

                <div id="typingVerseList" class="typing-verse-list"></div>
            </div>

            <!-- Session Summary (Hidden by default) -->
            <div id="typingSessionSummary" class="alert alert-success mt-4 d-none text-center" role="alert">
                <h4 class="alert-heading h6 fw-bold">세션 기록 저장 완료</h4>
                <p class="mb-0 small" id="typingSessionSummaryText">오늘의 기록이 저장되었습니다.</p>
            </div>

        </div>
    </div>

</main>

<script type="module" src="/js/game/bible-typing.js?v=1.3"></script>
</body>
</html>
