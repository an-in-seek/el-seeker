<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 게임 - 퀴즈, 타자, 단어 퍼즐 | ElSeeker', true, '/css/hero.css?v=2.2,/css/card.css?v=2.2,/css/game/game.css?v=2.2')}"
      th:with="pageDescription='성경 O/X 퀴즈, 객관식 퀴즈, 성경 타자, 단어 퍼즐 등 재미있는 게임으로 말씀을 학습합니다.',
               pageKeywords='성경 퀴즈,성경 게임,성경 OX퀴즈,성경 타자,성경 단어 퍼즐,성경 학습 게임'"></head>
<body class="has-fixed-nav">
<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='게임', pageTitleVisible=true"></header>

<main class="container content-wrapper">
    <div id="authErrorMessage" class="alert alert-warning d-none" role="alert"></div>

    <div class="row g-4 game-list">

        <!-- 성경 O/X 퀴즈 (Active) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-clickable h-100 border-0 shadow-sm" data-game-key="bible-ox-quiz"
                     data-game-route="/web/game/bible-ox-quiz/map" tabindex="0" role="button" aria-label="성경 O/X 퀴즈 게임 시작하기">
                <div class="card-body d-flex flex-column p-4">
                    <div class="game-card-header mb-3">
                        <div class="game-card-icon" aria-hidden="true">
                            <img src="/images/icon/ox.svg" alt="O/X 퀴즈 아이콘" width="24" height="24" loading="lazy" decoding="async">
                        </div>
                        <h2 class="h5 fw-bold text-dark mb-0">성경 O/X 퀴즈</h2>
                    </div>
                    <div class="mb-3">
                        <p class="text-muted small mb-0">참과 거짓을 빠르게 판단하는 O/X 퀴즈에 도전하세요.</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">성경책별</span>
                        <span class="badge rounded-pill">O/X</span>
                        <span class="badge rounded-pill">퀴즈</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 성경 객관식 퀴즈 (Active) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-clickable h-100 border-0 shadow-sm" data-game-key="bible-quiz"
                     data-game-route="/web/game/bible-quiz/map" tabindex="0" role="button" aria-label="성경 객관식 퀴즈 게임 시작하기">
                <div class="card-body d-flex flex-column p-4">
                    <div class="game-card-header mb-3">
                        <div class="game-card-icon text-primary" aria-hidden="true">❓</div>
                        <h2 class="h5 fw-bold text-dark mb-0">성경 객관식 퀴즈</h2>
                    </div>
                    <div class="mb-3">
                        <p class="text-muted small mb-0">4지선다로 풀어보는 스테이지별 성경 퀴즈</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">스테이지</span>
                        <span class="badge rounded-pill">4지선다</span>
                        <span class="badge rounded-pill">퀴즈</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 성경 단어 퍼즐 (Active) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-clickable h-100 border-0 shadow-sm" data-game-key="bible-word-puzzle"
                     data-game-route="/web/game/bible-word-puzzle" tabindex="0" role="button" aria-label="성경 단어 퍼즐 게임 시작하기">
                <div class="card-body d-flex flex-column p-4">
                    <div class="game-card-header mb-3">
                        <div class="game-card-icon" aria-hidden="true">🧩</div>
                        <h2 class="h5 fw-bold text-dark mb-0">성경 단어 퍼즐</h2>
                    </div>
                    <div class="mb-3">
                        <p class="text-muted small mb-0">말씀의 핵심 단어를 연결하며 재미있게 복습합니다.</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">퍼즐</span>
                        <span class="badge rounded-pill">가로·세로</span>
                        <span class="badge rounded-pill">어휘</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 성경 타자 (Active) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-clickable h-100 border-0 shadow-sm" data-game-key="bible-typing"
                     data-game-route="/web/game/bible-typing" tabindex="0" role="button" aria-label="성경 타자 게임 화면으로 이동">
                <div class="card-body d-flex flex-column p-4">
                    <div class="game-card-header mb-3">
                        <div class="game-card-icon" aria-hidden="true">⌨️</div>
                        <h2 class="h5 fw-bold text-dark mb-0">성경 타자</h2>
                    </div>
                    <div class="mb-3">
                        <p class="text-muted small mb-0">말씀을 타이핑하며 암송과 집중력을 함께 높입니다.</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">성경책별</span>
                        <span class="badge rounded-pill">타자</span>
                        <span class="badge rounded-pill">필사</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 제비뽑기 (Active) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-clickable h-100 border-0 shadow-sm" data-game-key="bible-casting-lots"
                     data-game-route="/web/game/bible-casting-lots" tabindex="0" role="button" aria-label="제비뽑기 시작하기">
                <div class="card-body d-flex flex-column p-4">
                    <div class="game-card-header mb-3">
                        <div class="game-card-icon" aria-hidden="true">
                            <img src="/images/icon/folded-paper.svg" alt="제비뽑기 아이콘" width="24" height="24" loading="lazy" decoding="async">
                        </div>
                        <h2 class="h5 fw-bold text-dark mb-0">제비뽑기</h2>
                    </div>
                    <div class="mb-3">
                        <p class="text-muted small mb-0">역할을 뽑을 때 성경적 방법으로 제비를 뽑아보세요.</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">랜덤</span>
                        <span class="badge rounded-pill">추첨</span>
                        <span class="badge rounded-pill">나눔</span>
                    </div>
                </div>
            </article>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script type="module" src="/js/game/game.js?v=2.3"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>
</html>
