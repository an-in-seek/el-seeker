<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('ElSeeker | 게임', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/game/game.css?v=2.1')}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <div id="authErrorMessage" class="alert alert-warning d-none" role="alert"></div>
    <section class="game-hero page-hero" aria-labelledby="gameListTitle">
        <div class="game-hero-content page-hero-content">
            <p class="game-hero-eyebrow page-hero-eyebrow">즐겁게 배우는 성경</p>
            <h2 id="gameListTitle" class="game-hero-title page-hero-title">성경 기반 게임을 한눈에</h2>
            <p class="game-hero-lead page-hero-lead">퀴즈부터 퍼즐, 타자까지 다양한 게임을 준비했습니다.</p>
        </div>
    </section>

    <div class="row g-3 game-list">
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-soft card-lift card-clickable" data-game-key="bible-quiz" data-game-route="/web/game/bible-quiz/map">
                <div class="card-body d-flex flex-column">
                    <div class="game-card-icon" aria-hidden="true">🧠</div>
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h3 class="h6 fw-semibold mb-2">성경 퀴즈</h3>
                    </div>
                    <p class="text-muted small mb-3">스테이지를 골라 진행하는 성경 퀴즈</p>
                    <div class="mt-auto game-card-meta">
                        <span class="badge text-bg-light">스테이지</span>
                        <span class="badge text-bg-light">퀴즈</span>
                        <span class="badge text-bg-light">진행</span>
                    </div>
                </div>
            </article>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-soft card-lift coming-soon" data-game-key="bible-word-puzzle"
                     data-game-route="/web/game/bible-word-puzzle">
                <div class="card-body d-flex flex-column">
                    <div class="game-card-icon" aria-hidden="true">🧩</div>
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h3 class="h6 fw-semibold mb-0">성경 단어 퍼즐(가로·세로 낱말 맞추기)</h3>
                        <span class="badge text-bg-warning text-uppercase small">준비중</span>
                    </div>
                    <p class="text-muted small mb-3">말씀의 핵심 단어를 연결하며 재미있게 복습합니다.</p>
                    <div class="mt-auto game-card-meta">
                        <span class="badge text-bg-light">퍼즐</span>
                        <span class="badge text-bg-light">가로·세로</span>
                        <span class="badge text-bg-light">힌트</span>
                    </div>
                </div>
            </article>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-soft card-lift coming-soon" data-game-key="bible-typing" data-game-route="/web/game/bible-typing">
                <div class="card-body d-flex flex-column">
                    <div class="game-card-icon" aria-hidden="true">⌨️</div>
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h3 class="h6 fw-semibold mb-0">성경 타자</h3>
                        <span class="badge text-bg-warning text-uppercase small">준비중</span>
                    </div>
                    <p class="text-muted small mb-3">말씀을 타이핑하며 암송과 집중력을 함께 높입니다.</p>
                    <div class="mt-auto game-card-meta">
                        <span class="badge text-bg-light">타자</span>
                        <span class="badge text-bg-light">기록</span>
                        <span class="badge text-bg-light">연습</span>
                    </div>
                </div>
            </article>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module">
    import {buildLoginRedirectUrl, checkAuthStatus, showAuthError} from "/js/auth/auth-check.js";

    document.addEventListener("DOMContentLoaded", () => {
        const authErrorMessage = document.getElementById("authErrorMessage");

        const redirectToLogin = (returnUrl) => {
            window.location.replace(buildLoginRedirectUrl(returnUrl));
        };

        const ensureAuthenticated = async (returnUrl, onAuthenticated) => {
            await checkAuthStatus({
                onAuthenticated,
                onUnauthenticated: () => redirectToLogin(returnUrl),
                onError: () => showAuthError(authErrorMessage, "네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요."),
            });
        };

        const gameList = document.querySelector(".game-list");
        if (gameList) {
            gameList.addEventListener("click", (event) => {
                const card = event.target.closest(".card");
                if (!card) {
                    return;
                }
                if (card.classList.contains("coming-soon")) {
                    event.preventDefault();
                    return;
                }
                if (card.dataset.gameKey === "bible-quiz" && card.dataset.gameRoute) {
                    const gameRoute = card.dataset.gameRoute;
                    event.preventDefault();
                    // 메뉴 클릭 시에도 서버 인증을 확인합니다.
                    ensureAuthenticated(gameRoute, () => {
                        window.location.href = gameRoute;
                    });
                }
            });
        }
        const comingSoonCards = document.querySelectorAll(".coming-soon");
        comingSoonCards.forEach((card) => {
            card.addEventListener("click", (event) => {
                event.preventDefault();
            });
        });
        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "게임";
            pageTitleLabel.classList.remove("d-none");
        }
    });
</script>
</body>
</html>
