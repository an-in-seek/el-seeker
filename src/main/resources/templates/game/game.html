<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('ElSeeker | 게임', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/game/game.css?v=2.2')}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper py-4">
    <div id="authErrorMessage" class="alert alert-warning d-none" role="alert"></div>

    <section class="game-hero mb-5" aria-labelledby="gameListTitle">
        <div class="game-hero-content">
            <p class="game-hero-eyebrow">즐겁게 배우는 성경</p>
            <h1 id="gameListTitle" class="game-hero-title display-5">성경 기반 게임</h1>
            <p class="game-hero-lead">퀴즈부터 퍼즐, 타자까지 다양한 게임을 준비했습니다.<br class="d-none d-md-inline">말씀을 더 가까이, 더 재미있게 경험해보세요.</p>
        </div>
    </section>

    <div class="row g-4 game-list">
        <!-- 성경 퀴즈 (Active) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel card-clickable h-100 border-0 shadow-sm"
                     data-game-key="bible-quiz"
                     data-game-route="/web/game/bible-quiz/map"
                     tabindex="0"
                     role="button"
                     aria-label="성경 퀴즈 게임 시작하기">
                <div class="card-body d-flex flex-column p-4">
                    <div class="game-card-icon text-primary" aria-hidden="true">🧠</div>
                    <div class="mb-3">
                        <h2 class="h5 fw-bold text-dark mb-2">성경 퀴즈</h2>
                        <p class="text-muted small mb-0">스테이지별로 진행되는 흥미진진한 성경 퀴즈 여행</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">스테이지</span>
                        <span class="badge rounded-pill">퀴즈</span>
                        <span class="badge rounded-pill">학습</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 성경 타자 (Coming Soon) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel coming-soon h-100 border-0"
                     data-game-key="bible-typing"
                     aria-label="성경 타자 (준비중)">
                <div class="card-body d-flex flex-column p-4">
                    <div class="d-flex justify-content-between align-items-start w-100">
                        <div class="game-card-icon" aria-hidden="true">⌨️</div>
                        <span class="badge bg-warning text-dark text-uppercase small fw-bold">준비중</span>
                    </div>
                    <div class="mb-3">
                        <h2 class="h5 fw-bold text-secondary mb-2">성경 타자</h2>
                        <p class="text-muted small mb-0">말씀을 타이핑하며 암송과 집중력을 함께 높입니다.</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">타자</span>
                        <span class="badge rounded-pill">필사</span>
                        <span class="badge rounded-pill">집중력</span>
                    </div>
                </div>
            </article>
        </div>

        <!-- 성경 단어 퍼즐 (Coming Soon) -->
        <div class="col-12 col-md-6 col-lg-4">
            <article class="card card-panel coming-soon h-100 border-0"
                     data-game-key="bible-word-puzzle"
                     aria-label="성경 단어 퍼즐 (준비중)">
                <div class="card-body d-flex flex-column p-4">
                    <div class="d-flex justify-content-between align-items-start w-100">
                        <div class="game-card-icon" aria-hidden="true">🧩</div>
                        <span class="badge bg-warning text-dark text-uppercase small fw-bold">준비중</span>
                    </div>
                    <div class="mb-3">
                        <h2 class="h5 fw-bold text-secondary mb-2">성경 단어 퍼즐</h2>
                        <p class="text-muted small mb-0">말씀의 핵심 단어를 연결하며 재미있게 복습합니다.</p>
                    </div>
                    <div class="game-card-meta mt-auto">
                        <span class="badge rounded-pill">퍼즐</span>
                        <span class="badge rounded-pill">가로·세로</span>
                        <span class="badge rounded-pill">어휘</span>
                    </div>
                </div>
            </article>
        </div>


    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module" src="/js/game/game.js?v=2.1"></script>
</body>
</html>
