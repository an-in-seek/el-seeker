<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Bible Quiz | 성경 퀴즈', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/game/bible-quiz.css?v=2.1')}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <section class="quiz-hero page-hero" aria-labelledby="quizTitle">
        <div class="quiz-hero-content page-hero-content">
            <h2 id="quizTitle" class="quiz-hero-title page-hero-title mb-2">Quiz</h2>
            <span class="quiz-mode-label" id="quizModeLabel" aria-live="polite"></span>
            <p class="quiz-hero-lead page-hero-lead d-none text-danger" id="quizHeroLead"></p>
        </div>
    </section>

    <section class="quiz-mode card card-panel card-soft d-none" id="quizReviewSelect" aria-live="polite">
        <div class="card-body text-center">
            <h3 class="h5 fw-semibold mb-2">복습 방식을 선택하세요</h3>
            <p class="text-muted small mb-3" id="quizReviewNote">복습 모드는 기록과 랭킹에 반영되지 않습니다.</p>
            <div class="flex-wrap quiz-action-group">
                <button class="btn btn-primary btn-sm" id="quizReviewFullButton" type="button">복습</button>
            </div>
        </div>
    </section>

    <section class="quiz-card card card-panel card-soft" id="quizPanel" aria-busy="true">
        <div class="card-body">
            <div class="quiz-progress">
                <div class="quiz-progress-block">
                    <span class="quiz-progress-label">스테이지</span>
                    <progress class="quiz-progress-bar" id="quizStageProgress" value="1" max="10" aria-valuemin="1" aria-valuemax="10"
                              aria-valuenow="1"></progress>
                    <span class="quiz-progress-item" id="quizStage">1 / 10</span>
                </div>
                <div class="quiz-progress-block">
                    <span class="quiz-progress-label">문제</span>
                    <progress class="quiz-progress-bar" id="quizQuestionProgressBar" value="1" max="5" aria-valuemin="1" aria-valuemax="5"
                              aria-valuenow="1"></progress>
                    <span class="quiz-progress-item" id="quizQuestionProgress">1 / 5</span>
                </div>
            </div>
            <h3 class="quiz-question h5 fw-semibold mb-3" id="quizQuestion">문제를 불러오는 중입니다…</h3>
            <div class="quiz-options" id="quizOptions">문제를 불러오는 중입니다…</div>
            <p class="quiz-feedback text-center" id="quizFeedback" role="status" aria-live="polite"></p>
            <button class="btn btn-primary quiz-next" id="quizNext" type="button" disabled>다음 문제</button>
        </div>
    </section>

    <section class="quiz-complete card card-panel card-soft d-none" id="quizComplete">
        <div class="card-body text-center">
            <div class="quiz-complete-icon" aria-hidden="true">✅</div>
            <h3 class="h5 fw-semibold mb-2" id="quizCompleteTitle">스테이지를 완료했어요</h3>
            <p class="quiz-score text-muted small mb-1" id="quizScore"></p>
            <div class="quiz-stat-grid" id="quizSummary">
                <div class="quiz-stat">
                    <span class="quiz-stat-label">정답률</span>
                    <span class="quiz-stat-value" id="summaryAccuracy">-</span>
                </div>
                <div class="quiz-stat">
                    <span class="quiz-stat-label">복습 횟수</span>
                    <span class="quiz-stat-value" id="summaryCount">-</span>
                </div>
                <div class="quiz-stat">
                    <span class="quiz-stat-label">숙련도</span>
                    <span class="quiz-stat-value quiz-stat-badge" id="summaryMastery">-</span>
                </div>
            </div>
            <p class="text-muted small mb-0">다음 스테이지가 바로 이어집니다.</p>
            <div class="flex-wrap quiz-action-group mt-3">
                <a class="btn btn-outline-secondary btn-sm" href="/web/game/bible-quiz/map">스테이지 보기</a>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module" src="/js/game/bible-quiz.js?v=2.1"></script>
</body>
</html>
