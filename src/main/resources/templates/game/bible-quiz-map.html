<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Bible Quiz Map | 성경 퀴즈', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/game/bible-quiz-map.css?v=2.1')}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <section class="quiz-map-hero page-hero" aria-labelledby="quizMapTitle">
        <div class="quiz-map-hero-content page-hero-content">
            <p class="quiz-map-eyebrow page-hero-eyebrow">성경 퀴즈 진행 현황</p>
            <h2 id="quizMapTitle" class="quiz-map-title page-hero-title">스테이지를 한눈에 확인하세요</h2>
            <p class="quiz-map-lead page-hero-lead">완료한 스테이지는 복습할 수 있습니다.</p>
            <a class="btn btn-primary btn-pill mt-2" href="/web/game/bible-quiz">오늘의 퀴즈 계속하기</a>
        </div>
    </section>

    <section class="quiz-map-card card card-panel card-soft" aria-live="polite">
        <div class="card-body">
            <div class="quiz-map-summary">
                <span class="quiz-map-total">총 10 스테이지</span>
                <span class="quiz-map-date" id="quizMapDate"></span>
            </div>
            <div class="quiz-map-legend">
                <span class="legend-item legend-complete">완료</span>
                <span class="legend-item legend-current">현재</span>
                <span class="legend-item legend-locked">진행 전</span>
            </div>
            <div class="stage-grid" id="stageList"></div>
            <p class="quiz-map-note text-muted small mb-0" id="quizMapNote"></p>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="/js/storage-util.js?v=2.1"></script>
<script src="/js/common.js?v=2.1"></script>
<script src="/js/game/bible-quiz-map.js?v=2.1"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const backButton = document.getElementById("topNavBackButton");
        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "성경 퀴즈";
            pageTitleLabel.classList.remove("d-none");
        }
        if (backButton) {
            backButton.classList.remove("d-none");
            backButton.addEventListener("click", () => {
                window.location.href = "/web/game/bible-quiz";
            });
        }
    });
</script>
</body>
</html>
