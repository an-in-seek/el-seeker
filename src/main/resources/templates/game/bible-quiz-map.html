<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 퀴즈 맵 | ElSeeker', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/game/bible-quiz-map.css?v=2.1')}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- 에러 메시지 영역 -->
    <div id="quizMapError" class="alert alert-danger d-none" role="alert"></div>

    <!-- 로딩 상태 -->
    <div id="quizMapLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">로딩 중...</span>
        </div>
        <p class="mt-3 text-muted">퀴즈를 불러오는 중입니다...</p>
    </div>

    <section id="quizMapContent" class="quiz-map-card card card-panel card-soft d-none" aria-live="polite">
        <div class="card-body">
            <div class="quiz-map-summary">
                <div class="quiz-map-summary-main">
                    <div class="quiz-map-summary-meta">
                        <span class="quiz-map-total" id="quizMapTotal">총 10 스테이지</span>
                        <span class="quiz-map-progress" id="quizMapProgress">진행 0 / 10 (0%)</span>
                    </div>
                    <div class="quiz-map-progress-bar" id="quizMapProgressBar" role="progressbar" aria-label="진행률" aria-valuenow="0" aria-valuemin="0"
                         aria-valuemax="100">
                        <span class="quiz-map-progress-fill" id="quizMapProgressFill" style="width: 0%"></span>
                    </div>
                </div>
            </div>
            <div class="quiz-map-actions">
                <button class="btn btn-outline-warning btn-sm quiz-map-reset d-none" id="resetProgressButton" type="button">초기화</button>
            </div>
            <p class="quiz-map-note text-muted small mb-0" id="quizMapNote"></p>
            <div class="stage-grid" id="stageList" data-snake-columns="2"></div>
        </div>
    </section>
</main>

<script type="module" src="/js/game/bible-quiz-map.js?v=2.1"></script>
</body>
</html>
