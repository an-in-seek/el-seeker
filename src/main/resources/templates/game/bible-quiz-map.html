<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('성경 퀴즈 맵 | ElSeeker', true, '/css/card.css?v=5.0,/css/game/bible-quiz-map.css?v=5.0')}"
        th:with="robotsContent='noindex'">
</head>

<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper mb-5">
    <!-- 에러 메시지 영역 -->
    <div id="quizMapError" class="alert alert-danger d-none" role="alert"></div>

    <!-- 로딩 상태 -->
    <div id="quizMapLoading" class="text-center py-5">
        <div class="spinner-container">
            <div class="custom-spinner"></div>
            <p class="mt-3 text-muted fw-medium">퀴즈를 불러오는 중입니다...</p>
        </div>
    </div>

    <section id="quizMapContent" class="quiz-map-card d-none" aria-live="polite">
        <!-- Hero: Progress Summary -->
        <div class="quiz-map-hero">
            <p class="quiz-map-hero-sub" id="quizMapHeroSub">스테이지를 클리어하며 성경 지식을 넓혀보세요</p>

            <div class="quiz-map-ring-wrap">
                <div class="quiz-map-ring">
                    <svg viewBox="0 0 80 80" aria-hidden="true">
                        <circle class="quiz-map-ring-bg" cx="40" cy="40" r="34"></circle>
                        <circle class="quiz-map-ring-fill" id="quizMapRingFill"
                                cx="40" cy="40" r="34"
                                stroke-dasharray="213.6"
                                stroke-dashoffset="213.6"></circle>
                    </svg>
                    <span class="quiz-map-ring-text" id="quizMapRingText">0%</span>
                </div>
                <div class="quiz-map-stats">
                    <span class="quiz-map-stat-line" id="quizMapStatCompleted">
                        완료 <strong>0</strong> / <strong>0</strong> 스테이지
                    </span>
                    <span class="quiz-map-stat-line" id="quizMapStatCurrent">
                        현재 <strong>1</strong> 스테이지 도전 가능
                    </span>
                </div>
            </div>

            <div class="d-flex justify-content-center gap-2 mt-2">
                <button class="quiz-map-reset d-none" id="resetProgressButton" type="button"
                        aria-label="진행 상황 초기화">
                    🗑️ 초기화
                </button>
                <a href="/web/game/ranking?gameType=MULTIPLE_CHOICE" class="quiz-map-ranking">🏆 랭킹</a>
            </div>
        </div>

        <!-- Note -->
        <p class="quiz-map-note">이전 스테이지를 클리어하면 다음 스테이지가 열립니다</p>

        <!-- Stage Grid -->
        <div class="stage-grid" id="stageList" data-snake-columns="2"></div>
    </section>
</main>

<script type="module" src="/js/game/bible-quiz-map.js?v=3.0"></script>
</body>

</html>
