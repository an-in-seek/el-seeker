<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head th:replace="~{fragments/head :: head('제비뽑기 | ElSeeker', true, '/css/game/bible-casting-lots.css?v=5.0')}"
      th:with="robotsContent='noindex'">
</head>

<body class="has-fixed-nav" data-back-link="/web/game"
      th:with="pageTitle='제비뽑기', pageTitleVisible=true">
<header th:replace="~{fragments/header :: header}"></header>

<main class="game-container">
    <!-- Setup Phase -->
    <section id="setupSection" class="game-phase setup-phase">
        <div class="glass-panel intro-panel">
            <div class="input-configuration">
                <div class="input-group-header">
                    <label for="castingLotsCount">개수</label>
                    <div class="stepper-control">
                        <button type="button" class="stepper-btn" id="btnDecrease" aria-label="감소">-</button>
                        <input type="number" id="castingLotsCount" min="2" max="12" value="2" readonly/>
                        <button type="button" class="stepper-btn" id="btnIncrease" aria-label="증가">+</button>
                    </div>
                </div>

                <div id="lotInputList" class="lot-inputs-scroll-area">
                    <!-- Inputs injected by JS -->
                </div>
            </div>

            <div class="action-area">
                <button type="button" id="foldLotsButton" class="btn-primary-glass">
                    <span class="btn-text">봉인 및 섞기</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
            <div id="castingLotsError" class="error-toast d-none"></div>
        </div>
    </section>

    <!-- Game Phase (Shuffle & Draw) -->
    <section id="gameSection" class="game-phase game-phase-hidden">
        <div class="glass-panel game-board">
            <div class="game-status-bar">
                <span class="status-badge">남은 제비 <strong id="remainingLots">0</strong></span>
                <p id="gameInstruction" class="status-message">제비를 섞고 있습니다...</p>
            </div>

            <div class="card-arena" id="cardArena">
                <!-- Cards injected by JS -->
            </div>
        </div>
    </section>

    <!-- Result Phase -->
    <section id="resultSection" class="game-phase result-phase-hidden">
        <div class="glass-panel result-panel">
            <div class="result-header">
                <h2>결과</h2>
                <p>모든 제비가 확인되었습니다</p>
            </div>
            <div class="result-actions">
                <button type="button" id="resetLotsButton" class="btn-secondary-glass">
                    다시 하기
                </button>
            </div>
        </div>
    </section>
</main>

<script type="module" src="/js/game/bible-casting-lots.js?v=3.1"></script>
</body>

</html>
