<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('성경 단어 퍼즐 | ElSeeker', true, '/css/game/bible-word-puzzle.css?v=5.1')}"
        th:with="robotsContent='noindex'">
</head>

<body class="has-fixed-nav" data-back-link="/web/game">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- 에러 메시지 영역 -->
    <div id="wpError" class="alert alert-danger d-none" role="alert"></div>

    <!-- ── 퍼즐 목록 화면 ── -->
    <section id="wpListSection">
        <!-- Filter Bar -->
        <div class="wp-filter-bar mb-4">
            <select id="wpDifficultyFilter" class="form-select form-select-sm wp-filter-select">
                <option value="">전체 난이도</option>
                <option value="EASY">쉬움</option>
                <option value="NORMAL">보통</option>
                <option value="HARD">어려움</option>
            </select>
            <a href="/web/game/ranking?gameType=WORD_PUZZLE" class="btn btn-outline-secondary btn-sm ms-auto">🏆 랭킹</a>
        </div>

        <!-- 로딩 -->
        <div id="wpListLoading" class="text-center py-5">
            <div class="spinner-container">
                <div class="custom-spinner"></div>
                <p class="mt-3 text-muted fw-medium">퍼즐 목록을 불러오는 중입니다...</p>
            </div>
        </div>

        <!-- 빈 목록 -->
        <div id="wpListEmpty" class="text-center py-5 d-none">
            <p class="text-muted">게시된 퍼즐이 없습니다.</p>
        </div>

        <!-- 퍼즐 카드 목록 -->
        <div id="wpListCards" class="row g-3 d-none"></div>

        <!-- 페이지네이션 -->
        <nav id="wpPagination" class="d-none mt-4" aria-label="퍼즐 목록 페이지네이션">
            <ul class="pagination justify-content-center"></ul>
        </nav>
    </section>
</main>

<script type="module" src="/js/game/bible-word-puzzle.js?v=2.0"></script>
</body>

</html>
