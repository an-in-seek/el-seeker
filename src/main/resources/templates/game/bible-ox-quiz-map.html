<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('성경 O/X 퀴즈 | ElSeeker', true, '/css/card.css?v=2.3,/css/game/bible-ox-quiz-map.css?v=3.0')}"
        th:with="robotsContent='noindex'">
</head>

<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- 에러 메시지 영역 -->
    <div id="oxQuizError" class="alert alert-danger d-none" role="alert"></div>

    <!-- 로딩 상태 -->
    <div id="oxQuizLoading" class="ox-quiz-loading text-center py-5">
        <div class="spinner-container">
            <div class="custom-spinner"></div>
            <p class="mt-3 text-muted fw-medium">퀴즈를 불러오는 중입니다...</p>
        </div>
    </div>

    <!-- 스테이지 목록 -->
    <section id="oxStageList" class="d-none" aria-live="polite">
        <!-- Hero -->
        <div class="ox-quiz-hero">
            <p class="ox-quiz-hero-sub">성경 본문을 읽고 O/X 퀴즈를 풀어보세요</p>
            <div class="d-flex justify-content-center gap-2 mt-2">
                <a href="/web/game/ranking?gameType=OX_QUIZ" class="ox-quiz-ranking">🏆 랭킹</a>
            </div>
        </div>

        <!-- Stage Grid -->
        <div class="ox-stage-grid" id="oxStageGrid">
            <!-- 스테이지 카드들이 동적으로 생성됩니다 -->
        </div>
    </section>
</main>

<script type="module" src="/js/game/bible-ox-quiz-map.js?v=2.0"></script>
</body>

</html>
