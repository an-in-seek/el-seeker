<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('성경 O/X 퀴즈 | ElSeeker', true, '/css/card.css?v=5.0,/css/book-search.css?v=5.0,/css/game/bible-ox-quiz-map.css?v=5.1')}"
        th:with="robotsContent='noindex'">
</head>

<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <!-- 에러 메시지 영역 -->
    <div id="oxQuizError" class="alert alert-danger d-none" role="alert"></div>

    <!-- 로딩 상태 -->
    <div id="oxQuizLoading" class="ox-quiz-loading text-center py-5">
        <div class="spinner-container">
            <div class="custom-spinner"></div>
            <p class="mt-3 text-muted fw-medium">퀴즈를 불러오는 중입니다...</p>
        </div>
    </div>

    <!-- 스테이지 목록 -->
    <section id="oxStageList" class="d-none" aria-live="polite">
        <!-- Hero -->
        <div class="ox-quiz-hero">
            <p class="ox-quiz-hero-sub">성경 본문을 읽고 O/X 퀴즈를 풀어보세요</p>
            <div class="d-flex justify-content-center gap-2 mt-2">
                <a href="/web/game/ranking?gameType=OX_QUIZ" class="ox-quiz-ranking">🏆 랭킹</a>
            </div>
        </div>

        <!-- 책 검색 -->
        <div class="book-search-wrapper">
            <div class="book-search-inner">
                <div class="book-search-input-group">
                    <svg class="book-search-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
                    </svg>
                    <input type="search" id="bookSearchInput" class="book-search-input"
                           placeholder="책 이름 검색 (예: 창세기, 마태)" autocomplete="off" inputmode="search">
                    <button type="button" id="bookSearchClear" class="book-search-clear d-none" aria-label="검색어 지우기">
                        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
                        </svg>
                    </button>
                </div>
                <div id="bookSearchEmpty" class="book-search-empty d-none">검색 결과가 없습니다.</div>
            </div>
        </div>

        <!-- Stage Grid -->
        <div class="ox-stage-grid" id="oxStageGrid">
            <!-- 스테이지 카드들이 동적으로 생성됩니다 -->
        </div>
    </section>
</main>

<script type="module" src="/js/book-search-sticky.js?v=1.0"></script>
<script type="module" src="/js/game/bible-ox-quiz-map.js?v=2.4"></script>
</body>

</html>
