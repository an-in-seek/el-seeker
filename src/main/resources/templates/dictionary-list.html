<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Bible Dictionary | 성경 사전', true, null)}"></head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <div class="search-controls">
        <form id="dictionarySearchForm" class="mb-2" method="get" th:action="@{/web/study/dictionary}" role="search">
            <div class="input-group">
                <a id="backBtn"
                   class="btn btn-outline-secondary back-btn-inline"
                   href="#"
                   aria-label="뒤로가기">
                    ⬅️
                </a>
                <input type="search"
                       id="dictionaryKeywordInput"
                       class="form-control"
                       name="keyword"
                       placeholder="찾고 싶은 성경 용어를 입력하세요"
                       th:value="${keyword}"
                       autocomplete="off"
                       inputmode="search"
                       aria-label="성경 용어 검색">
                <input type="hidden" name="size" th:value="${dictionaryPage.size}">
                <button id="dictionaryClearBtn" class="btn btn-outline-secondary" type="button">지우기</button>
                <button id="dictionarySearchBtn" class="btn btn-outline-primary" type="submit">🔍</button>
            </div>
        </form>
        <div id="dictionaryResultCount" class="text-muted small" role="status" aria-live="polite"></div>
        <div id="dictionaryEmptyState" class="text-muted small">
            <p class="mb-1">검색어를 입력하고 사전 검색을 시작하세요.</p>
            <p class="small mb-0">정확한 용어를 모르더라도 일부만 입력해 보세요.</p>
        </div>
    </div>

    <div id="dictionaryList" class="list-group mt-2"></div>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">
    ↑
</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "성경 사전";
            pageTitleLabel.classList.remove("d-none");
        }

        const keywordInput = document.getElementById("dictionaryKeywordInput");
        const searchForm = document.getElementById("dictionarySearchForm");
        const searchBtn = document.getElementById("dictionarySearchBtn");
        const clearBtn = document.getElementById("dictionaryClearBtn");
        const resultCount = document.getElementById("dictionaryResultCount");
        const emptyState = document.getElementById("dictionaryEmptyState");
        const listContainer = document.getElementById("dictionaryList");
        const sizeInput = document.querySelector("input[name=\"size\"]");
        const scrollToTopBtn = document.getElementById("scrollToTopBtn");
        const scrollThreshold = 300;
        const scrollLoadOffset = 200;
        const urlParams = new URLSearchParams(window.location.search);
        const initialKeyword = urlParams.get("keyword") ?? "";
        const pageSize = parseInt(sizeInput?.value ?? "10", 10) || 10;
        let currentPage = 0;
        let hasNext = false;
        let isLoading = false;
        let activeKeyword = "";
        let totalCount = null;

        if (keywordInput) {
            if (initialKeyword) {
                keywordInput.value = initialKeyword;
            }
            keywordInput.focus();
        }

        function setEmptyState(message, detail) {
            if (emptyState) {
                emptyState.innerHTML = "";
                const title = document.createElement("p");
                title.className = detail ? "mb-1" : "mb-0";
                title.textContent = message;
                emptyState.appendChild(title);
                if (detail) {
                    const body = document.createElement("p");
                    body.className = "small mb-0";
                    body.textContent = detail;
                    emptyState.appendChild(body);
                }
                emptyState.classList.remove("d-none");
            }
            if (listContainer) {
                listContainer.classList.add("d-none");
            }
        }

        function setResultsVisible() {
            if (emptyState) {
                emptyState.classList.add("d-none");
            }
            if (listContainer) {
                listContainer.classList.remove("d-none");
            }
        }

        function setLoading(loading) {
            if (searchBtn) {
                searchBtn.disabled = loading;
            }
            if (keywordInput) {
                keywordInput.disabled = loading;
            }
            if (clearBtn) {
                clearBtn.disabled = loading;
            }
        }

        function hideEmptyState() {
            if (emptyState) {
                emptyState.classList.add("d-none");
            }
        }

        function setLoadingState(message) {
            if (!resultCount) {
                return;
            }
            hideEmptyState();
            resultCount.innerHTML = `
                <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                ${message}
            `;
        }

        function resetSearchState() {
            currentPage = 0;
            hasNext = false;
            isLoading = false;
            activeKeyword = "";
            totalCount = null;
        }

        function updateResultCount() {
            if (!resultCount) {
                return;
            }
            if (totalCount === null) {
                resultCount.textContent = "";
                return;
            }
            if (activeKeyword) {
                resultCount.textContent = `"${activeKeyword}"에 대한 결과 ${totalCount}건`;
            } else {
                resultCount.textContent = `성경 사전 ${totalCount}건`;
            }
        }

        function createSummary(description) {
            const normalized = (description ?? "").trim();
            if (!normalized) {
                return "설명이 등록되지 않았습니다.";
            }
            if (normalized.length <= 120) {
                return normalized;
            }
            return `${normalized.substring(0, 120).trimEnd()}...`;
        }

        function buildDetailLink(id) {
            const params = new URLSearchParams();
            if (activeKeyword) {
                params.set("keyword", activeKeyword);
            }
            const queryString = params.toString();
            return queryString ? `/web/study/dictionary/${id}?${queryString}` : `/web/study/dictionary/${id}`;
        }

        function appendResults(items, page) {
            if (!listContainer) {
                return;
            }
            items.forEach(item => {
                const link = document.createElement("a");
                link.className = "list-group-item list-group-item-action";
                link.href = buildDetailLink(item.id);

                const header = document.createElement("div");
                header.className = "d-flex justify-content-between align-items-center";

                const title = document.createElement("h2");
                title.className = "h6 fw-semibold mb-1";
                title.textContent = item.term ?? "";

                const badge = document.createElement("span");
                badge.className = "badge bg-light text-secondary";
                badge.textContent = "보기";

                header.appendChild(title);
                header.appendChild(badge);

                const summary = document.createElement("p");
                summary.className = "text-muted small mb-0";
                summary.textContent = createSummary(item.description);

                link.appendChild(header);
                link.appendChild(summary);
                listContainer.appendChild(link);
            });
        }

        function updateUrl() {
            const params = new URLSearchParams();
            if (activeKeyword) {
                params.set("keyword", activeKeyword);
            }
            const queryString = params.toString();
            const newUrl = queryString ? `${window.location.pathname}?${queryString}` : window.location.pathname;
            history.replaceState(null, "", newUrl);
        }

        async function fetchDictionaryPage(page) {
            if (isLoading || !hasNext) {
                return;
            }
            isLoading = true;
            if (page === 0) {
                setLoading(true);
                setLoadingState("검색 중...");
            }
            try {
                const url = new URL("/api/v1/study/dictionaries", window.location.origin);
                if (activeKeyword) {
                    url.searchParams.set("keyword", activeKeyword);
                }
                url.searchParams.set("page", String(page));
                url.searchParams.set("size", String(pageSize));
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error("사전 조회 실패");
                }
                const data = await response.json();
                const items = Array.isArray(data.content) ? data.content : [];
                if (page === 0) {
                    if (typeof data.totalCount === "number") {
                        totalCount = data.totalCount;
                    }
                    if (items.length === 0) {
                        setEmptyState("다른 용어로 다시 시도해 보세요.");
                        updateResultCount();
                        hasNext = false;
                        return;
                    }
                }
                setResultsVisible();
                appendResults(items, page);
                const sliceHasNext = data.hasNext === true;
                const pageHasNext = typeof data.last === "boolean" ? !data.last : false;
                hasNext = sliceHasNext || pageHasNext || items.length === pageSize;
                updateResultCount();
            } catch (e) {
                console.error(e);
                if (page === 0) {
                    if (resultCount) {
                        resultCount.textContent = "검색 중 오류가 발생했습니다.";
                    }
                    setEmptyState("잠시 후 다시 시도해 주세요.");
                }
            } finally {
                isLoading = false;
                if (page === 0) {
                    setLoading(false);
                }
            }
        }

        function maybeLoadNextPage() {
            if (!hasNext || isLoading) {
                return;
            }
            const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - scrollLoadOffset;
            if (nearBottom) {
                currentPage += 1;
                fetchDictionaryPage(currentPage);
            }
        }

        async function startSearch(keyword, targetPage) {
            if (listContainer) {
                listContainer.innerHTML = "";
            }
            resetSearchState();
            activeKeyword = keyword.trim();
            hasNext = true;
            currentPage = 0;
            updateUrl();
            setLoadingState("목록을 불러오는 중입니다.");
            for (let page = 0; page <= targetPage; page += 1) {
                if (!hasNext) {
                    break;
                }
                currentPage = page;
                await fetchDictionaryPage(page);
            }
            maybeLoadNextPage();
        }

        const backBtn = document.getElementById("backBtn");
        if (backBtn) {
            backBtn.addEventListener("click", (e) => {
                e.preventDefault();
                history.back();
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener("click", () => {
                if (keywordInput) {
                    keywordInput.value = "";
                    keywordInput.focus();
                }
                if (listContainer) {
                    listContainer.innerHTML = "";
                }
                if (resultCount) {
                    resultCount.textContent = "";
                }
                setEmptyState("검색어를 입력하고 사전 검색을 시작하세요.", "정확한 용어를 모르더라도 일부만 입력해 보세요.");
                resetSearchState();
                updateUrl();
                if (clearBtn) {
                    clearBtn.disabled = true;
                }
            });
        }

        if (keywordInput) {
            keywordInput.addEventListener("input", () => {
                if (clearBtn) {
                    clearBtn.disabled = keywordInput.value.trim().length === 0;
                }
            });
            if (clearBtn) {
                clearBtn.disabled = keywordInput.value.trim().length === 0;
            }
        }

        if (searchForm) {
            searchForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const keyword = keywordInput?.value ?? "";
                startSearch(keyword, 0);
            });
        }

        if (scrollToTopBtn) {
            const updateScrollToTopVisibility = () => {
                if (window.scrollY >= scrollThreshold) {
                    scrollToTopBtn.classList.add("is-visible");
                } else {
                    scrollToTopBtn.classList.remove("is-visible");
                }
            };

            scrollToTopBtn.addEventListener("click", () => {
                window.scrollTo({top: 0, behavior: "smooth"});
            });

            window.addEventListener("scroll", updateScrollToTopVisibility, {passive: true});
            updateScrollToTopVisibility();
        }

        window.addEventListener("scroll", maybeLoadNextPage, {passive: true});

        startSearch(initialKeyword, 0);
    });
</script>
</body>
</html>
