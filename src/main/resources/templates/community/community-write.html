<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head
        th:replace="~{fragments/head :: head('글쓰기 | ElSeeker', true, '/css/community/community-write.css?v=3.0')}">
</head>

<body class="has-fixed-nav" data-back-link="/web/community">
<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <div class="write-layout">
        <div class="write-main">
            <form id="writeForm" class="write-form" novalidate>
                <!-- Category Select -->
                <div class="form-group">
                    <label for="postType" class="form-label">카테고리</label>
                    <select id="postType" class="form-select" required>
                        <option value="" disabled selected>카테고리를 선택하세요</option>
                        <option value="FREE">자유</option>
                        <option value="QUESTION">질문</option>
                        <option value="PRAY">기도나눔</option>
                    </select>
                    <div class="form-error" id="postTypeError"></div>
                </div>

                <!-- Title -->
                <div class="form-group">
                    <label for="postTitle" class="form-label">제목</label>
                    <input id="postTitle" type="text" class="form-input" placeholder="제목을 입력하세요"
                           maxlength="200" required>
                    <div class="form-meta">
                        <span id="titleCount" class="char-count">0 / 200</span>
                    </div>
                    <div class="form-error" id="postTitleError"></div>
                </div>

                <!-- Content -->
                <div class="form-group">
                    <label for="postContent" class="form-label">내용</label>
                    <textarea id="postContent" class="form-textarea" placeholder="내용을 입력하세요"
                              rows="12" required></textarea>
                    <div class="form-error" id="postContentError"></div>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button type="button" id="btnCancel" class="btn-cancel">취소</button>
                    <button type="submit" id="btnSubmit" class="btn-submit">등록하기</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script type="module" src="/js/community/community-write.js?v=3.0"></script>
</body>

</html>
