<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Books</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v3" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper">
  <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
    <h1 class="mt-2" id="translationTitle"></h1>
    <a href="/web/bibles/search" class="btn btn-outline-secondary" aria-label="검색">🔍</a>
  </div>
  <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-2" id="bookList"></div>
</div>

<div class="fixed-bottom-nav">
  <div class="nav-container">
    <a class="btn btn-lg btn-primary"
       href="/web/bibles/translations"
       aria-label="번역본 선택">
      <span aria-hidden="true">📖</span>
      <span class="ms-2">번역본 선택</span>
    </a>
  </div>
</div>

<script src="/js/storage-util.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const translationId = TranslationStore.getId();
        const translationName = TranslationStore.getName();
        if (!translationId || !translationName) {
            window.location.href = "/web/bibles/translations";
            return;
        }

        const translationTitle = document.getElementById("translationTitle");
        const bookList = document.getElementById("bookList");

        // 📌 sessionStorage에서 데이터 확인 후 즉시 렌더링 (API 요청 최소화)
        function renderFromSessionStorage() {
            const books = BookStore.getListForTranslation(translationId);
            if (books) {
                renderBooks(books);
                return true;
            }
            return false;
        }

        // 📌 화면 업데이트 함수
        function renderBooks(books) {
            translationTitle.textContent = `${translationName}`;
            bookList.innerHTML = "";
            books.forEach(book => {
                const col = document.createElement("div");
                col.className = "col";
                const button = document.createElement("button");
                button.type = "button";
                button.className = "book-tile w-100";
                button.textContent = book.bookName;
                button.dataset.bookId = book.bookId;
                button.dataset.bookName = book.bookName;
                button.addEventListener("click", () => {
                    BookStore.save({
                        id: book.bookId,
                        name: book.bookName
                    });
                    window.location.href = "/web/bibles/chapters";
                });
                col.appendChild(button);
                bookList.appendChild(col);
            });
            BookStore.saveListForTranslation(translationId, books);
        }

        // 📌 API에서 데이터 가져오기 (sessionStorage에 없을 경우)
        async function fetchBooksFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books`);
                if (!response.ok) {
                    throw new Error("데이터를 불러오는 중 오류가 발생했습니다.");
                }
                const data = await response.json();
                renderBooks(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // 📌 최초 데이터 로드 (sessionStorage 우선, 없으면 API 호출)
        if (!renderFromSessionStorage()) {
            await fetchBooksFromAPI();
        }
    });
</script>
</body>
</html>
