<!DOCTYPE html>
<html lang="ko">
<head>
  <title>м„ұкІҪ мұ… лӘ©лЎқ</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v2" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper">
  <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
    <h1 class="mt-2" id="translationTitle"></h1>
    <a href="/web/bibles/search" class="btn btn-outline-secondary" aria-label="кІҖмғү">рҹ”Қ</a>
  </div>
  <table class="table table-striped table-hover">
    <tbody id="bookList"></tbody>
  </table>
</div>

<div class="fixed-bottom-nav">
  <div class="nav-container">
    <a class="btn btn-lg btn-primary"
       href="/web/bibles/translations"
       aria-label="лІҲм—ӯліё м„ нғқ">
      <span aria-hidden="true">рҹ“–</span>
      <span class="ms-2">лІҲм—ӯліё м„ нғқ</span>
    </a>
  </div>
</div>

<script src="/js/storage-util.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const translationId = TranslationStore.getId();
        const translationName = TranslationStore.getName();
        if (!translationId || !translationName) {
            window.location.href = "/web/bibles/translations";
            return;
        }

        const translationTitle = document.getElementById("translationTitle");
        const bookList = document.getElementById("bookList");

        // рҹ“Ң sessionStorageм—җм„ң лҚ°мқҙн„° нҷ•мқё нӣ„ мҰүмӢң л ҢлҚ”л§Ғ (API мҡ”мІӯ мөңмҶҢнҷ”)
        function renderFromSessionStorage() {
            const books = BookStore.getListForTranslation(translationId);
            if (books) {
                renderBooks(books);
                return true;
            }
            return false;
        }

        // рҹ“Ң нҷ”л©ҙ м—…лҚ°мқҙнҠё н•ЁмҲҳ
        function renderBooks(books) {
            translationTitle.textContent = `${translationName}`;
            bookList.innerHTML = "";
            books.forEach(book => {
                const row = document.createElement("tr");
                row.classList.add("clickable-row");
                row.dataset.bookId = book.bookId;
                row.innerHTML = `
                    <td>${book.bookName}</td>
                    <td>${book.testamentType}</td>
                `;
                row.addEventListener("click", () => {
                    BookStore.save({
                        id: book.bookId,
                        name: book.bookName
                    });
                    window.location.href = "/web/bibles/chapters"; // вң… мһҘ лӘ©лЎқ нҷ”л©ҙ URL ліҖкІҪ
                });
                bookList.appendChild(row);
            });
            BookStore.saveListForTranslation(translationId, books);
        }

        // рҹ“Ң APIм—җм„ң лҚ°мқҙн„° к°Җм ёмҳӨкё° (sessionStorageм—җ м—Ҷмқ„ кІҪмҡ°)
        async function fetchBooksFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books`);
                if (!response.ok) {
                    throw new Error("лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
                }
                const data = await response.json();
                renderBooks(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // рҹ“Ң мөңмҙҲ лҚ°мқҙн„° лЎңл“ң (sessionStorage мҡ°м„ , м—Ҷмңјл©ҙ API нҳём¶ң)
        if (!renderFromSessionStorage()) {
            await fetchBooksFromAPI();
        }
    });
</script>
</body>
</html>
