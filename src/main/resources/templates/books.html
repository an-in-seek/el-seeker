<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Books</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v5" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper pt-3">
  <div class="d-flex flex-wrap flex-md-nowrap align-items-center justify-content-between gap-2 mb-3">

    <!-- лІҲм—ӯліё м„ нғқ -->
    <a href="/web/bible/translation"
       onclick="TranslationStore.saveTranslationReturnPath('/web/bible/book')"
       class="btn btn-outline-secondary dropdown-toggle flex-fill text-truncate"
       role="button"
       aria-label="лІҲм—ӯліё м„ нғқ"
       title="лІҲм—ӯліё м„ нғқ нҺҳмқҙм§ҖлЎң мқҙлҸҷ">
      <span id="translationTypeLabel"></span>
    </a>

    <!-- кІҖмғү -->
    <a href="/web/bible/search"
       class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
       role="button"
       aria-label="ліёл¬ё кІҖмғү"
       title="ліёл¬ё кІҖмғү">
      рҹ”Қ
    </a>
  </div>

  <div id="bookList" class="book-grid"></div>
</div>

<script src="/js/storage-util.js?v3"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const translationId = TranslationStore.getCurrentTranslationId();
        const translationType = TranslationStore.getCurrentTranslationType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }
        document.getElementById("translationTypeLabel").textContent = translationType;

        // рҹ“Ң sessionStorageм—җм„ң лҚ°мқҙн„° нҷ•мқё нӣ„ мҰүмӢң л ҢлҚ”л§Ғ (API мҡ”мІӯ мөңмҶҢнҷ”)
        function renderFromSessionStorage() {
            const books = BookStore.getListForTranslation(translationId);
            if (books) {
                renderBooks(books);
                return true;
            }
            return false;
        }

        // рҹ“Ң нҷ”л©ҙ м—…лҚ°мқҙнҠё н•ЁмҲҳ
        function renderBooks(books) {
            const bookList = document.getElementById("bookList");
            bookList.innerHTML = "";
            books.forEach(book => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "book-tile";
                button.textContent = book.bookName;
                button.dataset.bookId = book.bookId;
                button.dataset.bookName = book.bookName;
                button.addEventListener("click", () => {
                    BookStore.saveCurrentBook(book);
                    window.location.href = "/web/bible/chapter";
                });
                bookList.appendChild(button);
            });
            BookStore.saveListForTranslation(translationId, books);
        }

        // рҹ“Ң APIм—җм„ң лҚ°мқҙн„° к°Җм ёмҳӨкё° (sessionStorageм—җ м—Ҷмқ„ кІҪмҡ°)
        async function fetchBooksFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books`);
                if (!response.ok) {
                    throw new Error("лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
                }
                const data = await response.json();
                renderBooks(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // рҹ“Ң мөңмҙҲ лҚ°мқҙн„° лЎңл“ң (sessionStorage мҡ°м„ , м—Ҷмңјл©ҙ API нҳём¶ң)
        if (!renderFromSessionStorage()) {
            await fetchBooksFromAPI();
        }
    });
</script>
</body>
</html>
