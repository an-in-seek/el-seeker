<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Chapters</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v5" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper pt-3">
  <div class="d-flex flex-wrap flex-md-nowrap align-items-center justify-content-between gap-2 mb-3">
    <!-- мұ… м„ нғқ -->
    <a href="/web/bible/book"
       class="btn btn-outline-secondary dropdown-toggle flex-fill text-truncate"
       role="button"
       aria-label="мұ… м„ нғқ"
       title="мұ… м„ нғқ нҺҳмқҙм§ҖлЎң мқҙлҸҷ">
      <span aria-hidden="true">рҹ“–</span>
      <span class="ms-2" id="bookLabel"></span>
    </a>
    <!-- кІҖмғү -->
    <a href="/web/bible/search"
       class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
       role="button"
       aria-label="ліёл¬ё кІҖмғү"
       title="ліёл¬ё кІҖмғү">
      рҹ”Қ
    </a>
  </div>

  <div id="chapterList" class="chapter-grid"></div>
</div>

<script src="/js/storage-util.js?v1"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const translationId = TranslationStore.getId();
        const translationType = TranslationStore.getType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        const bookId = BookStore.getId();
        const bookName = BookStore.getName();
        if (!bookId || !bookName) {
            window.location.href = "/web/bible/book";
            return;
        }
        document.getElementById("bookLabel").textContent = bookName;

        const chapterList = document.getElementById("chapterList");

        // рҹ“Ң sessionStorageм—җм„ң лҚ°мқҙн„° нҷ•мқё нӣ„ мҰүмӢң л ҢлҚ”л§Ғ (API мҡ”мІӯ мөңмҶҢнҷ”)
        function renderFromSessionStorage() {
            const bookData = BookStore.getDetail(bookId);
            if (bookData) {
                renderChapters(bookData);
                return true;
            }
            return false;
        }

        // рҹ“Ң нҷ”л©ҙ м—…лҚ°мқҙнҠё н•ЁмҲҳ (sessionStorage & API нҳём¶ң кіөнҶө)
        function renderChapters(data) {
            chapterList.innerHTML = "";
            data.book.chapters.forEach(chapter => {
                const tile = document.createElement("button");
                tile.type = "button";
                tile.className = "chapter-tile";
                tile.textContent = chapter.chapterNumber;
                tile.addEventListener("click", () => {
                    ChapterStore.saveNumber(chapter.chapterNumber);
                    window.location.href = "/web/bible/verse";
                });
                chapterList.appendChild(tile);
            });
            BookStore.saveDetail(bookId, data);
        }

        // рҹ“Ң APIм—җм„ң лҚ°мқҙн„° к°Җм ёмҳӨкё° (sessionStorageм—җ м—Ҷмқ„ кІҪмҡ°)
        async function fetchChaptersFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books/${bookId}/chapters`);
                if (!response.ok) {
                    throw new Error("лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
                }
                const data = await response.json();
                renderChapters(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // рҹ“Ң мөңмҙҲ лҚ°мқҙн„° лЎңл“ң (sessionStorage мҡ°м„ , м—Ҷмңјл©ҙ API нҳём¶ң)
        if (!renderFromSessionStorage()) {
            await fetchChaptersFromAPI();
        }
    });
</script>
</body>
</html>
