<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Chapters</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v3" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper">
  <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
    <h1 class="mt-2" id="bookTitle"></h1>
    <a href="/web/bibles/search" class="btn btn-outline-secondary" aria-label="кІҖмғү">рҹ”Қ</a>
  </div>
  <div id="chapterList" class="chapter-grid mt-3"></div>
</div>

<!-- н•ҳлӢЁ л„Өл№„кІҢмқҙм…ҳ -->
<div class="fixed-bottom-nav">
  <div class="nav-container">
    <a id="bookSelectLink"
       class="btn btn-lg btn-primary"
       href="#"
       aria-label="мұ… м„ нғқ">
      <span aria-hidden="true">рҹ“–</span>
      <span class="ms-2">мұ… м„ нғқ</span>
    </a>
  </div>
</div>

<script src="/js/storage-util.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const translationId = TranslationStore.getId();
        const translationName = TranslationStore.getName();
        if (!translationId || !translationName) {
            window.location.href = "/web/bibles/translations";
            return;
        }

        const bookId = BookStore.getId();
        const bookName = BookStore.getName();
        if (!bookId || !bookName) {
            window.location.href = "/web/bibles/books";
            return;
        }

        const bookTitle = document.getElementById("bookTitle");
        const chapterList = document.getElementById("chapterList");
        const bookSelectLink = document.getElementById("bookSelectLink");

        // рҹ“Ң sessionStorageм—җм„ң лҚ°мқҙн„° нҷ•мқё нӣ„ мҰүмӢң л ҢлҚ”л§Ғ (API мҡ”мІӯ мөңмҶҢнҷ”)
        function renderFromSessionStorage() {
            const bookData = BookStore.getDetail(bookId);
            if (bookData) {
                renderChapters(bookData);
                return true;
            }
            return false;
        }

        // рҹ“Ң нҷ”л©ҙ м—…лҚ°мқҙнҠё н•ЁмҲҳ (sessionStorage & API нҳём¶ң кіөнҶө)
        function renderChapters(data) {
            bookTitle.textContent = `${translationName} > ${bookName}`;
            chapterList.innerHTML = "";
            data.book.chapters.forEach(chapter => {
                const tile = document.createElement("button"); // вң… div вҶ’ button
                tile.className = "chapter-tile";
                tile.type = "button"; // вң… лӘ…мӢңм ҒмңјлЎң type м„Өм •
                tile.textContent = chapter.chapterNumber;
                tile.addEventListener("click", () => {
                    ChapterStore.saveNumber(chapter.chapterNumber);
                    window.location.href = "/web/bibles/verses";
                });
                chapterList.appendChild(tile);
            });
            BookStore.saveDetail(bookId, data);
            bookSelectLink.href = `/web/bibles/books`;
        }

        // рҹ“Ң APIм—җм„ң лҚ°мқҙн„° к°Җм ёмҳӨкё° (sessionStorageм—җ м—Ҷмқ„ кІҪмҡ°)
        async function fetchChaptersFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books/${bookId}/chapters`);
                if (!response.ok) {
                    throw new Error("лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
                }
                const data = await response.json();
                renderChapters(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // рҹ“Ң мөңмҙҲ лҚ°мқҙн„° лЎңл“ң (sessionStorage мҡ°м„ , м—Ҷмңјл©ҙ API нҳём¶ң)
        if (!renderFromSessionStorage()) {
            await fetchChaptersFromAPI();
        }
    });
</script>
</body>
</html>
