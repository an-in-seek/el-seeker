<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Chapters</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css?v4" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper">
  <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
    <h1 class="mt-2" id="bookTitle"></h1>
    <a href="/web/bible/search" class="btn btn-outline-secondary" aria-label="Í≤ÄžÉČ">ūüĒć</a>
  </div>
  <div id="chapterList" class="chapter-grid"></div>
</div>

<!-- ŪēėŽč® ŽĄ§ŽĻĄÍ≤ĆžĚīžÖė -->
<div class="fixed-bottom-nav">
  <div class="nav-container">
    <a id="bookSelectLink"
       class="btn btn-lg btn-primary"
       href="#"
       aria-label="žĪÖ žĄ†ŪÉĚ">
      <span aria-hidden="true">ūüďĖ</span>
      <span class="ms-2">žĪÖ žĄ†ŪÉĚ</span>
    </a>
  </div>
</div>

<script src="/js/storage-util.js?v1"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const translationId = TranslationStore.getId();
        const translationType = TranslationStore.getType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        const bookId = BookStore.getId();
        const bookName = BookStore.getName();
        if (!bookId || !bookName) {
            window.location.href = "/web/bible/book";
            return;
        }

        const bookTitle = document.getElementById("bookTitle");
        const chapterList = document.getElementById("chapterList");
        const bookSelectLink = document.getElementById("bookSelectLink");

        // ūüďĆ sessionStoragežóźžĄú ŽćįžĚīŪĄį ŪôēžĚł ŪõĄ ž¶Čžčú Ž†ĆŽćĒŽßĀ (API žöĒž≤≠ žĶúžÜĆŪôĒ)
        function renderFromSessionStorage() {
            const bookData = BookStore.getDetail(bookId);
            if (bookData) {
                renderChapters(bookData);
                return true;
            }
            return false;
        }

        // ūüďĆ ŪôĒŽ©ī žóÖŽćįžĚīŪäł Ūē®žąė (sessionStorage & API Ūėłž∂ú Í≥ĶŪÜĶ)
        function renderChapters(data) {
            bookTitle.textContent = `${translationType} > ${bookName}`;
            chapterList.innerHTML = "";
            data.book.chapters.forEach(chapter => {
                const tile = document.createElement("button");
                tile.type = "button";
                tile.className = "chapter-tile";
                tile.textContent = chapter.chapterNumber;
                tile.addEventListener("click", () => {
                    ChapterStore.saveNumber(chapter.chapterNumber);
                    window.location.href = "/web/bible/verse";
                });
                chapterList.appendChild(tile);
            });
            BookStore.saveDetail(bookId, data);
            bookSelectLink.href = `/web/bible/book`;
        }

        // ūüďĆ APIžóźžĄú ŽćįžĚīŪĄį ÍįÄž†łžė§Íłį (sessionStoragežóź žóÜžĚĄ Í≤Ĺžöį)
        async function fetchChaptersFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books/${bookId}/chapters`);
                if (!response.ok) {
                    throw new Error("ŽćįžĚīŪĄįŽ•ľ Ž∂ąŽü¨žė§ŽäĒ ž§Ď žė§Ž•ėÍįÄ ŽįúžÉĚŪĖąžäĶŽčąŽč§.");
                }
                const data = await response.json();
                renderChapters(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // ūüďĆ žĶúžīą ŽćįžĚīŪĄį Ž°úŽďú (sessionStorage žöįžĄ†, žóÜžúľŽ©ī API Ūėłž∂ú)
        if (!renderFromSessionStorage()) {
            await fetchChaptersFromAPI();
        }
    });
</script>
</body>
</html>
