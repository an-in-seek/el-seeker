<!DOCTYPE html>
<html lang="ko">
<head>
  <title>절 목록</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/common.css" rel="stylesheet">
</head>
<body>

<div class="container content-wrapper">
  <h1 class="mt-2" id="chapterTitle"></h1>
  <table class="table table-striped">
    <thead>
    <tr>
      <th>절</th>
      <th>내용</th>
    </tr>
    </thead>
    <tbody id="verseTableBody"></tbody>
  </table>
</div>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
  <div class="nav-container">
    <!-- 이전 장 버튼 -->
    <button id="prevChapterBtn"
            class="btn btn-lg btn-outline-primary prev-next"
            type="button"
            disabled
            aria-label="이전 장으로 이동">
      <!-- 이모지는 스크린리더에서 읽히지 않도록 aria-hidden 사용 -->
      <span aria-hidden="true">⬅</span>
      <span class="d-none d-md-inline ms-2">이전 장</span>
    </button>

    <!-- 장 선택 (페이지 이동) -->
    <a id="chapterSelectLink"
       class="btn btn-lg btn-primary"
       href="#"
       aria-label="장 선택">
      <span aria-hidden="true">📖</span>
      <span class="ms-2">장 선택</span>
    </a>

    <!-- 다음 장 버튼 -->
    <button id="nextChapterBtn"
            class="btn btn-lg btn-outline-primary prev-next"
            type="button"
            disabled
            aria-label="다음 장으로 이동">
      <span class="d-none d-md-inline me-2">다음 장</span>
      <span aria-hidden="true">➡</span>
    </button>
  </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        // localStorage에서 필요한 값들을 불러오고 파싱함
        const translationId = localStorage.getItem("translationId");
        const translationName = localStorage.getItem("translationName");
        let bookId = parseInt(localStorage.getItem("bookId") || "0", 10);
        let bookName = localStorage.getItem("bookName");
        let chapterNumber = parseInt(localStorage.getItem("chapterNumber") || "0", 10);
        const bookList = JSON.parse(sessionStorage.getItem("bookList") || "[]");

        // 필수 데이터가 누락됐을 경우, 번역 선택 페이지로 이동
        if (!isStorageValid(translationId, translationName, bookId, bookName, chapterNumber, bookList)) {
            redirectToTranslations();
            return;
        }

        // DOM 요소 참조
        const prevButton = document.getElementById("prevChapterBtn");
        const nextButton = document.getElementById("nextChapterBtn");
        const chapterTitle = document.getElementById("chapterTitle");
        const verseTableBody = document.getElementById("verseTableBody");
        const chapterSelectLink = document.getElementById("chapterSelectLink");

        // 이전/다음 장 버튼 클릭 이벤트 설정
        prevButton.addEventListener("click", onPrevChapterClick);
        nextButton.addEventListener("click", onNextChapterClick);

        // 현재 장 데이터 초기 로딩
        await loadChapter(chapterNumber);

        /**
         * localStorage에서 모든 필수 값이 유효한지 확인
         */
        function isStorageValid(translationId, translationName, bookId, bookName, chapterNumber, bookList) {
            return (
                translationId &&
                translationName &&
                bookId &&
                bookName &&
                chapterNumber &&
                Array.isArray(bookList) &&
                bookList.length > 0
            );
        }

        /**
         * 데이터가 유효하지 않을 경우 번역 선택 페이지로 이동
         */
        function redirectToTranslations() {
            window.location.href = "/web/bibles/translations";
        }

        /**
         * 해당 장 데이터를 sessionStorage 또는 API로부터 불러옴
         */
        async function loadChapter(chapterToLoad) {
            if (!renderFromSessionStorage(chapterToLoad)) {
                await fetchChapterFromAPI(chapterToLoad);
            }
        }

        /**
         * sessionStorage에 저장된 장 데이터를 렌더링. 성공 시 true 반환
         */
        function renderFromSessionStorage(chapter) {
            const storedData = sessionStorage.getItem(`bible_book_${bookId}_chapter_${chapter}`);
            if (storedData) {
                const data = JSON.parse(storedData);
                renderChapter(data);
                return true;
            }
            return false;
        }

        /**
         * API를 통해 장 데이터를 불러오고 렌더링
         */
        async function fetchChapterFromAPI(chapterToLoad) {
            try {
                disableNavButtons(true);
                const response = await fetch(`/api/bibles/translations/${translationId}/books/${bookId}/chapters/${chapterToLoad}/verses`);
                if (!response.ok) {
                    throw new Error("데이터를 불러오는 중 오류가 발생했습니다.");
                }
                const data = await response.json();
                renderChapter(data);
            } catch (error) {
                alert(error.message);
            } finally {
                disableNavButtons(false);
            }
        }

        /**
         * 불러온 장 데이터를 화면에 렌더링
         */
        function renderChapter(data) {
            chapterTitle.textContent = `${translationName} > ${bookName} > ${data.chapter.chapterNumber}`;
            verseTableBody.innerHTML = "";

            data.chapter.verses.forEach(verse => {
                const row = document.createElement("tr");
                row.innerHTML = `<td>${verse.verseNumber}</td><td>${verse.text}</td>`;
                verseTableBody.appendChild(row);
            });

            // Update current chapter in memory and in storage
            chapterNumber = data.chapter.chapterNumber;
            localStorage.setItem("chapterNumber", chapterNumber);

            // Cache the chapter data in sessionStorage
            sessionStorage.setItem(
                `bible_book_${bookId}_chapter_${chapterNumber}`,
                JSON.stringify(data)
            );

            // Link to the chapter selection page
            chapterSelectLink.href = `/web/bibles/chapters`;
            updateNavigationButtonState();
            scrollToTop();
        }

        /**
         * 이전 장 버튼 클릭 시 호출되는 함수
         */
        async function onPrevChapterClick() {
            const currentIndex = findCurrentBookIndex();
            if (chapterNumber > 1) {
                await loadChapter(chapterNumber - 1);
            } else if (currentIndex > 0) {
                // Move to the previous book's last chapter
                const prevBook = bookList[currentIndex - 1];
                await loadChapterByIndex(currentIndex - 1, prevBook.chapterCount);
            }
        }

        /**
         * 다음 장 버튼 클릭 시 호출되는 함수
         */
        async function onNextChapterClick() {
            const currentIndex = findCurrentBookIndex();
            const currentBook = bookList[currentIndex];
            if (chapterNumber < currentBook.chapterCount) {
                await loadChapter(chapterNumber + 1);
            } else if (currentIndex < bookList.length - 1) {
                // Move to the next book's first chapter
                await loadChapterByIndex(currentIndex + 1, 1);
            }
        }

        /**
         * 주어진 책 인덱스와 장 번호를 기반으로 장 데이터를 로드
         */
        async function loadChapterByIndex(bookIndex, newChapterNumber) {
            const newBook = bookList[bookIndex];
            bookId = newBook.bookId;
            bookName = newBook.bookName;
            chapterNumber = newChapterNumber;

            localStorage.setItem("bookId", bookId);
            localStorage.setItem("bookName", bookName);
            localStorage.setItem("chapterNumber", chapterNumber);

            await loadChapter(chapterNumber);
        }

        /**
         * 현재 책의 인덱스를 bookList에서 찾음
         */
        function findCurrentBookIndex() {
            return bookList.findIndex(b => b.bookId === bookId);
        }

        /**
         * 현재 위치에 따라 이전/다음 버튼 상태를 업데이트
         */
        function updateNavigationButtonState() {
            const currentIndex = findCurrentBookIndex();
            const currentBook = bookList[currentIndex];
            const isFirstChapter = currentIndex === 0 && chapterNumber === 1;
            const isLastChapter = currentIndex === bookList.length - 1 && chapterNumber === currentBook.chapterCount;

            prevButton.disabled = isFirstChapter;
            nextButton.disabled = isLastChapter;
        }

        /**
         * 버튼 비활성화 여부 설정 (데이터 요청 중일 때)
         */
        function disableNavButtons(disable) {
            prevButton.disabled = disable;
            nextButton.disabled = disable;
        }

        /**
         * 화면을 최상단으로 스크롤
         */
        function scrollToTop() {
            window.scrollTo({top: 0, behavior: "smooth"});
        }
    });
</script>
</body>
</html>
