<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>사전 등록/수정 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <div class="admin-breadcrumb">
            <a href="/web/admin/dictionaries">사전 목록</a> &gt; <span th:text="${dictionary != null} ? '수정' : '등록'">등록</span>
        </div>
        <h2 th:text="${dictionary != null} ? '사전 수정' : '사전 등록'">사전 등록</h2>
        <div class="admin-form mobile-actions">
            <div class="form-group">
                <label for="term">용어</label>
                <input type="text" id="term" th:value="${dictionary?.term}" required>
            </div>
            <div class="form-group">
                <label for="description">설명</label>
                <textarea id="description" th:text="${dictionary?.description}"></textarea>
            </div>
            <div class="admin-form-actions mobile-actions">
                <button type="button" class="btn btn-primary btn-sm" id="saveBtn">저장</button>
                <a href="/web/admin/dictionaries" class="btn btn-outline-secondary btn-sm">취소</a>
            </div>
        </div>

        <div id="referencesSection" class="d-none" style="margin-top: 2rem;">
            <h3>관련 구절 관리</h3>
            <div class="admin-form mobile-actions" style="margin-bottom: 1rem;">
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="refBook">성경책</label>
                        <select id="refBook" style="min-width: 130px;">
                            <option value="">선택</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="refChapter">장</label>
                        <input type="number" id="refChapter" min="1" style="width: 70px;" placeholder="1">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="refVerse">절</label>
                        <input type="number" id="refVerse" min="1" style="width: 70px;" placeholder="1">
                    </div>
                    <button type="button" class="btn btn-outline-primary btn-sm" id="addRefBtn">추가</button>
                </div>
            </div>
            <table class="admin-table" id="referencesTable">
                <thead>
                <tr>
                    <th>순서</th>
                    <th>라벨</th>
                    <th>책</th>
                    <th>장</th>
                    <th>절</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody id="referencesBody"></tbody>
            </table>
            <p id="referencesEmpty" class="text-muted" style="padding: 1rem 0;">등록된 관련 구절이 없습니다.</p>
        </div>
    </main>
</div>
<script th:inline="javascript">
    const editId = /*[[${dictionary?.id}]]*/ null;
</script>
<script type="module">
    import {fetchAdmin, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();

    const savedKeyword = sessionStorage.getItem("adminDictKeyword") || "";
    const listUrl = savedKeyword
        ? `/web/admin/dictionaries?keyword=${encodeURIComponent(savedKeyword)}`
        : "/web/admin/dictionaries";

    // 취소 링크에 키워드 반영
    const cancelLink = document.querySelector(".admin-form-actions a[href='/web/admin/dictionaries']");
    if (cancelLink) cancelLink.href = listUrl;

    // breadcrumb 링크에도 키워드 반영
    const breadcrumbLink = document.querySelector(".admin-breadcrumb a[href='/web/admin/dictionaries']");
    if (breadcrumbLink) breadcrumbLink.href = listUrl;

    // 사전 저장
    document.getElementById("saveBtn").addEventListener("click", async () => {
        const body = {
            term: document.getElementById("term").value,
            description: document.getElementById("description").value || null,
        };
        try {
            if (editId) {
                await fetchAdmin(`/api/v1/admin/dictionaries/${editId}`, {method: "PUT", body: JSON.stringify(body)});
            } else {
                await fetchAdmin("/api/v1/admin/dictionaries", {method: "POST", body: JSON.stringify(body)});
            }
            location.href = listUrl;
        } catch (e) {
            alert(e.message);
        }
    });

    // 관련 구절 관리 (수정 모드에서만)
    if (editId) {
        const section = document.getElementById("referencesSection");
        const tbody = document.getElementById("referencesBody");
        const emptyMsg = document.getElementById("referencesEmpty");
        const addBtn = document.getElementById("addRefBtn");
        const bookSelect = document.getElementById("refBook");
        section.classList.remove("d-none");

        const apiBase = `/api/v1/admin/dictionaries/${editId}/references`;

        // 성경책 목록 로드
        const loadBookOptions = async () => {
            try {
                const translations = await fetchAdmin("/api/v1/bibles/translations");
                if (!translations || translations.length === 0) return;
                const translationId = translations[0].translationId;
                const books = await fetchAdmin(`/api/v1/bibles/translations/${translationId}/books`);
                if (!books) return;
                books.forEach(book => {
                    const option = document.createElement("option");
                    option.value = book.bookOrder;
                    option.textContent = book.bookName;
                    option.dataset.bookName = book.bookName;
                    bookSelect.appendChild(option);
                });
            } catch (e) {
                console.warn("성경책 목록 로드 실패:", e.message);
            }
        };
        loadBookOptions();

        const renderReferences = (refs) => {
            tbody.innerHTML = "";
            if (!refs || refs.length === 0) {
                emptyMsg.classList.remove("d-none");
                document.getElementById("referencesTable").querySelector("thead").classList.add("d-none");
                return;
            }
            emptyMsg.classList.add("d-none");
            document.getElementById("referencesTable").querySelector("thead").classList.remove("d-none");
            refs.forEach((ref, idx) => {
                const tr = document.createElement("tr");
                const cells = [idx + 1, ref.verseLabel, ref.bookOrder, ref.chapterNumber, ref.verseNumber];
                cells.forEach(value => {
                    const td = document.createElement("td");
                    td.textContent = value;
                    tr.appendChild(td);
                });
                const actionTd = document.createElement("td");
                const deleteBtn = document.createElement("button");
                deleteBtn.type = "button";
                deleteBtn.className = "btn btn-outline-danger btn-sm";
                deleteBtn.textContent = "삭제";
                actionTd.appendChild(deleteBtn);
                tr.appendChild(actionTd);
                deleteBtn.addEventListener("click", async () => {
                    if (!confirm(`"${ref.verseLabel}" 구절을 삭제하시겠습니까?`)) return;
                    try {
                        await fetchAdmin(`${apiBase}/${ref.referenceId}`, {method: "DELETE"});
                        await loadReferences();
                    } catch (e) {
                        alert(e.message);
                    }
                });
                tbody.appendChild(tr);
            });
        };

        const loadReferences = async () => {
            try {
                const refs = await fetchAdmin(apiBase);
                renderReferences(refs || []);
            } catch (e) {
                console.warn("관련 구절 로드 실패:", e.message);
            }
        };

        addBtn.addEventListener("click", async () => {
            const selectedOption = bookSelect.options[bookSelect.selectedIndex];
            const bookOrder = parseInt(bookSelect.value, 10);
            const bookName = selectedOption?.dataset?.bookName || "";
            const chapterNumber = parseInt(document.getElementById("refChapter").value, 10);
            const verseNumber = parseInt(document.getElementById("refVerse").value, 10);

            if (!bookOrder || !chapterNumber || !verseNumber) {
                alert("성경책, 장, 절을 모두 입력해 주세요.");
                return;
            }

            const verseLabel = `${bookName} ${chapterNumber}:${verseNumber}`;

            try {
                await fetchAdmin(apiBase, {
                    method: "POST",
                    body: JSON.stringify({bookOrder, chapterNumber, verseNumber, verseLabel})
                });
                bookSelect.value = "";
                document.getElementById("refChapter").value = "";
                document.getElementById("refVerse").value = "";
                await loadReferences();
            } catch (e) {
                alert(e.message);
            }
        });

        loadReferences();
    }
</script>
</body>
</html>
