<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>사전 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <h2>성경 사전 관리</h2>
        <div class="admin-toolbar">
            <form method="get" action="/web/admin/dictionaries" class="d-flex gap-2">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="용어 검색" class="form-control form-control-sm admin-search-input">
                <button type="submit" class="btn btn-outline-secondary btn-sm admin-search-button">검색</button>
            </form>
            <a href="/web/admin/dictionaries/new" class="btn btn-primary btn-sm">등록</a>
        </div>
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>용어</th>
                    <th>설명</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${page.content}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.term}"></td>
                    <td th:text="${#strings.abbreviate(d.description ?: '', 80)}"></td>
                    <td class="admin-actions">
                        <a th:href="@{/web/admin/dictionaries/{id}/edit(id=${d.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                        <button class="btn btn-outline-danger btn-sm" th:data-id="${d.id}" th:data-name="${d.term}" onclick="deleteDictionary(this)">삭제</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(page.content)}">
                    <td colspan="4" class="text-center text-muted">데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="admin-card-list">
            <div class="admin-card" th:each="d : ${page.content}">
                <div class="admin-card-title" th:text="${d.term}">용어</div>
                <div class="admin-card-row">
                    <span class="admin-card-label">ID</span>
                    <span class="admin-card-value" th:text="${d.id}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">설명</span>
                    <span class="admin-card-value" th:text="${#strings.abbreviate(d.description ?: '', 120)}"></span>
                </div>
                <div class="admin-card-actions">
                    <a th:href="@{/web/admin/dictionaries/{id}/edit(id=${d.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                    <button class="btn btn-outline-danger btn-sm" th:data-id="${d.id}" th:data-name="${d.term}" onclick="deleteDictionary(this)">삭제</button>
                </div>
            </div>
            <div class="admin-card text-center text-muted" th:if="${#lists.isEmpty(page.content)}">데이터가 없습니다.</div>
        </div>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}" th:href="@{/web/admin/dictionaries(page=${i},size=${page.size},keyword=${keyword})}" th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script type="module">
    import {handleDelete, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();

    const keyword = new URLSearchParams(location.search).get("keyword") || "";
    sessionStorage.setItem("adminDictKeyword", keyword);

    window.deleteDictionary = (btn) => {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        handleDelete(`/api/v1/admin/dictionaries/${id}`, name);
    };
</script>
</body>
</html>
