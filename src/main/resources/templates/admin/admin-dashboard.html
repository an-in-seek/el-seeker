<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <h2>관리자 대시보드</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">회원</h5>
                        <p class="card-text">회원 정보를 관리합니다.</p>
                        <a href="/web/admin/members" class="btn btn-primary btn-sm">관리</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">성경 사전</h5>
                        <p class="card-text">사전 용어를 관리합니다.</p>
                        <a href="/web/admin/dictionaries" class="btn btn-primary btn-sm">관리</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">번역본</h5>
                        <p class="card-text">성경 번역본을 관리합니다.</p>
                        <a href="/web/admin/bible/translations" class="btn btn-primary btn-sm">관리</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">O/X 퀴즈</h5>
                        <p class="card-text">O/X 퀴즈 스테이지와 문제를 관리합니다.</p>
                        <a href="/web/admin/ox-quiz/stages" class="btn btn-primary btn-sm">관리</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">성경 객관식 퀴즈</h5>
                        <p class="card-text">객관식 퀴즈 스테이지와 문제를 관리합니다.</p>
                        <a href="/web/admin/quiz/stages" class="btn btn-primary btn-sm">관리</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script type="module">
    import {initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
</script>
</body>
</html>
