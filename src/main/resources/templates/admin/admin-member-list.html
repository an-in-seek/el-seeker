<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <h2>회원 관리</h2>
        <div class="admin-toolbar">
            <form method="get" action="/web/admin/members" class="d-flex gap-2">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="이메일/닉네임 검색" class="form-control form-control-sm admin-search-input">
                <button type="submit" class="btn btn-outline-secondary btn-sm admin-search-button">검색</button>
            </form>
            <div></div>
        </div>
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>이메일</th>
                    <th>닉네임</th>
                    <th>권한</th>
                    <th>가입일</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${page.content}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${m.email}"></td>
                    <td th:text="${m.nickname}"></td>
                    <td th:text="${m.memberRole}"></td>
                    <td th:text="${#temporals.format(m.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="admin-actions">
                        <a th:href="@{/web/admin/members/{id}/edit(id=${m.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                        <button class="btn btn-outline-danger btn-sm" th:data-id="${m.id}" th:data-name="${m.email}" onclick="deleteMember(this)">삭제</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(page.content)}">
                    <td colspan="6" class="text-center text-muted">데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="admin-card-list">
            <div class="admin-card" th:each="m : ${page.content}">
                <div class="admin-card-title" th:text="${m.email}">이메일</div>
                <div class="admin-card-row">
                    <span class="admin-card-label">ID</span>
                    <span class="admin-card-value" th:text="${m.id}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">닉네임</span>
                    <span class="admin-card-value" th:text="${m.nickname}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">권한</span>
                    <span class="admin-card-value" th:text="${m.memberRole}"></span>
                </div>
                <div class="admin-card-actions">
                    <a th:href="@{/web/admin/members/{id}/edit(id=${m.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                    <button class="btn btn-outline-danger btn-sm" th:data-id="${m.id}" th:data-name="${m.email}" onclick="deleteMember(this)">삭제</button>
                </div>
            </div>
            <div class="admin-card text-center text-muted" th:if="${#lists.isEmpty(page.content)}">데이터가 없습니다.</div>
        </div>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}" th:href="@{/web/admin/members(page=${i},size=${page.size},keyword=${keyword})}" th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script type="module">
    import {handleDelete, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
    window.deleteMember = (btn) => {
        handleDelete(`/api/v1/admin/members/${btn.dataset.id}`, btn.dataset.name);
    };
</script>
</body>
</html>
