<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원 수정 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <div class="admin-breadcrumb">
            <a href="/web/admin/members">회원 목록</a> &gt; <span>수정</span>
        </div>
        <h2>회원 정보 수정</h2>
        <div class="admin-form mobile-actions">
            <div class="form-group">
                <label>회원 ID</label>
                <input type="text" th:value="${member.id}" readonly>
            </div>
            <div class="form-group">
                <label>회원 UID</label>
                <input type="text" th:value="${member.uid}" readonly>
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="text" th:value="${member.email}" readonly>
            </div>
            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" th:value="${member.nickname}" required>
            </div>
            <div class="form-group">
                <label for="profileImageUrl">프로필 이미지 URL</label>
                <input type="text" id="profileImageUrl" th:value="${member.profileImageUrl}">
            </div>
            <div class="form-group">
                <label for="memberRole">권한</label>
                <select id="memberRole">
                    <option th:each="role : ${T(com.elseeker.member.domain.vo.MemberRole).values()}"
                            th:value="${role}"
                            th:text="${role}"
                            th:selected="${role} == ${member.memberRole}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>가입일</label>
                <input type="text" th:value="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}" readonly>
            </div>
            <div class="form-group">
                <label>수정일</label>
                <input type="text" th:value="${#temporals.format(member.updatedAt, 'yyyy-MM-dd HH:mm')}" readonly>
            </div>
            <div class="form-group" th:if="${!#lists.isEmpty(member.oauthAccounts)}">
                <label>OAuth 계정</label>
                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>Provider</th>
                            <th>Provider User ID</th>
                            <th>Email</th>
                            <th>Nickname</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="account : ${member.oauthAccounts}">
                            <td th:text="${account.provider}"></td>
                            <td th:text="${account.providerUserId}"></td>
                            <td th:text="${account.email}"></td>
                            <td th:text="${account.nickname}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="admin-form-actions mobile-actions">
                <button type="button" class="btn btn-primary btn-sm" id="saveBtn">저장</button>
                <a href="/web/admin/members" class="btn btn-outline-secondary btn-sm">취소</a>
            </div>
        </div>
    </main>
</div>
<script th:inline="javascript">
    const editId = /*[[${member.id}]]*/ null;
</script>
<script type="module">
    import {fetchAdmin, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
    document.getElementById("saveBtn").addEventListener("click", async () => {
        const body = {
            nickname: document.getElementById("nickname").value,
            profileImageUrl: document.getElementById("profileImageUrl").value || null,
            memberRole: document.getElementById("memberRole").value,
        };
        try {
            await fetchAdmin(`/api/v1/admin/members/${editId}`, {method: "PUT", body: JSON.stringify(body)});
            location.href = "/web/admin/members";
        } catch (e) {
            alert(e.message);
        }
    });
</script>
</body>
</html>
