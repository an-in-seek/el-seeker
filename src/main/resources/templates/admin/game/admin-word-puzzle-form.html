<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Puzzle 등록/수정 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <div class="admin-breadcrumb">
            <a href="/web/admin/word-puzzles">퍼즐 목록</a> &gt; <span th:text="${puzzle != null} ? '수정' : '등록'">등록</span>
        </div>
        <h2 th:text="${puzzle != null} ? '퍼즐 수정' : '퍼즐 등록'">퍼즐 등록</h2>
        <div class="admin-form mobile-actions">
            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" th:value="${puzzle?.title}" required>
            </div>
            <div class="form-group">
                <label for="themeCode">테마 코드</label>
                <input type="text" id="themeCode" th:value="${puzzle?.themeCode}" required>
            </div>
            <div class="form-group">
                <label for="difficultyCode">난이도</label>
                <select id="difficultyCode">
                    <option value="EASY" th:selected="${puzzle != null and puzzle.difficultyCode.name() == 'EASY'}">쉬움</option>
                    <option value="NORMAL" th:selected="${puzzle != null and puzzle.difficultyCode.name() == 'NORMAL'}">보통</option>
                    <option value="HARD" th:selected="${puzzle != null and puzzle.difficultyCode.name() == 'HARD'}">어려움</option>
                </select>
            </div>
            <div class="form-group">
                <label for="boardWidth">보드 가로</label>
                <input type="number" id="boardWidth" th:value="${puzzle?.boardWidth}" min="1" required>
            </div>
            <div class="form-group">
                <label for="boardHeight">보드 세로</label>
                <input type="number" id="boardHeight" th:value="${puzzle?.boardHeight}" min="1" required>
            </div>
            <div class="admin-form-actions mobile-actions">
                <button type="button" class="btn btn-primary btn-sm" id="saveBtn">저장</button>
                <a href="/web/admin/word-puzzles" class="btn btn-outline-secondary btn-sm">취소</a>
            </div>
        </div>
    </main>
</div>
<script th:inline="javascript">
    window.editId = /*[[${puzzle?.id}]]*/ null;
</script>
<script type="module">
    import {fetchAdmin, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
    document.getElementById("saveBtn").addEventListener("click", async () => {
        const body = {
            title: document.getElementById("title").value,
            themeCode: document.getElementById("themeCode").value,
            difficultyCode: document.getElementById("difficultyCode").value,
            boardWidth: parseInt(document.getElementById("boardWidth").value),
            boardHeight: parseInt(document.getElementById("boardHeight").value),
        };
        try {
            if (editId) {
                await fetchAdmin(`/api/v1/admin/word-puzzles/${editId}`, {method: "PUT", body: JSON.stringify(body)});
            } else {
                await fetchAdmin("/api/v1/admin/word-puzzles", {method: "POST", body: JSON.stringify(body)});
            }
            location.href = "/web/admin/word-puzzles";
        } catch (e) {
            alert(e.message);
        }
    });
</script>
</body>
</html>
