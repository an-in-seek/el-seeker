<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>O/X 스테이지 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css?v=1.2" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <h2>O/X 퀴즈 스테이지</h2>
        <div class="admin-toolbar">
            <div></div>
            <a href="/web/admin/ox-quiz/stages/new" class="btn btn-primary btn-sm">등록</a>
        </div>
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>스테이지 번호</th>
                    <th>책 이름</th>
                    <th>문제 수</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${page.content}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.stageNumber}"></td>
                    <td th:text="${s.bookName}"></td>
                    <td th:text="${questionCounts[s.stageNumber] ?: 0}"></td>
                    <td class="admin-actions">
                        <a th:href="@{/web/admin/ox-quiz/stages/{id}/questions(id=${s.id})}" class="btn btn-outline-info btn-sm">문제</a>
                        <a th:href="@{/web/admin/ox-quiz/stages/{id}/edit(id=${s.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                        <button class="btn btn-outline-danger btn-sm" th:data-id="${s.id}" th:data-name="${s.bookName}" onclick="deleteStage(this)">삭제</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(page.content)}">
                    <td colspan="5" class="text-center text-muted">데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="admin-card-list">
            <div class="admin-card" th:each="s : ${page.content}">
                <div class="admin-card-title" th:text="${s.bookName}">책</div>
                <div class="admin-card-row">
                    <span class="admin-card-label">스테이지</span>
                    <span class="admin-card-value" th:text="${s.stageNumber}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">문제 수</span>
                    <span class="admin-card-value" th:text="${questionCounts[s.stageNumber] ?: 0}"></span>
                </div>
                <div class="admin-card-actions">
                    <a th:href="@{/web/admin/ox-quiz/stages/{id}/questions(id=${s.id})}" class="btn btn-outline-info btn-sm">문제</a>
                    <a th:href="@{/web/admin/ox-quiz/stages/{id}/edit(id=${s.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                    <button class="btn btn-outline-danger btn-sm" th:data-id="${s.id}" th:data-name="${s.bookName}" onclick="deleteStage(this)">삭제</button>
                </div>
            </div>
            <div class="admin-card text-center text-muted" th:if="${#lists.isEmpty(page.content)}">데이터가 없습니다.</div>
        </div>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}" th:href="@{/web/admin/ox-quiz/stages(page=${i},size=${page.size})}" th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script type="module">
    import {handleDelete, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
    window.deleteStage = (btn) => {
        handleDelete(`/api/v1/admin/ox/stages/${btn.dataset.id}`, btn.dataset.name);
    };
</script>
</body>
</html>
