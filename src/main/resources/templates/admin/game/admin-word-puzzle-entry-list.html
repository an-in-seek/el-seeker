<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>단서 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css?v=1.2" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <div class="admin-breadcrumb">
            <a href="/web/admin/word-puzzles">퍼즐 목록</a> &gt;
            <span th:text="'[' + ${puzzle.id} + '] ' + ${puzzle.title}"></span> &gt; 단서
        </div>
        <h2 th:text="'단서 관리 — ' + ${puzzle.title}">단서 관리</h2>
        <div class="admin-toolbar">
            <div></div>
            <a th:href="@{/web/admin/word-puzzles/{id}/entries/new(id=${puzzle.id})}" class="btn btn-primary btn-sm">등록</a>
        </div>
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>번호</th>
                    <th>방향</th>
                    <th>정답</th>
                    <th>사전 용어</th>
                    <th>위치</th>
                    <th>단서 유형</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${page.content}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.clueNumber}"></td>
                    <td th:text="${e.directionCode}"></td>
                    <td th:text="${e.answerText}"></td>
                    <td th:text="${e.dictionary.term}"></td>
                    <td th:text="'(' + ${e.startRow} + ',' + ${e.startCol} + ')'"></td>
                    <td th:text="${e.clueTypeCode}"></td>
                    <td class="admin-actions">
                        <a th:href="@{/web/admin/word-puzzles/{pid}/entries/{eid}/edit(pid=${puzzle.id},eid=${e.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                        <button class="btn btn-outline-danger btn-sm"
                                th:data-puzzle-id="${puzzle.id}" th:data-id="${e.id}" th:data-name="${e.answerText}"
                                onclick="deleteEntry(this)">삭제</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(page.content)}">
                    <td colspan="8" class="text-center text-muted">데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="admin-card-list">
            <div class="admin-card" th:each="e : ${page.content}">
                <div class="admin-card-title" th:text="${e.clueNumber + '-' + e.directionCode + ': ' + e.answerText}">단서</div>
                <div class="admin-card-row">
                    <span class="admin-card-label">사전 용어</span>
                    <span class="admin-card-value" th:text="${e.dictionary.term}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">위치</span>
                    <span class="admin-card-value" th:text="'(' + ${e.startRow} + ',' + ${e.startCol} + ')'"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">단서 유형</span>
                    <span class="admin-card-value" th:text="${e.clueTypeCode}"></span>
                </div>
                <div class="admin-card-actions">
                    <a th:href="@{/web/admin/word-puzzles/{pid}/entries/{eid}/edit(pid=${puzzle.id},eid=${e.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                    <button class="btn btn-outline-danger btn-sm"
                            th:data-puzzle-id="${puzzle.id}" th:data-id="${e.id}" th:data-name="${e.answerText}"
                            onclick="deleteEntry(this)">삭제</button>
                </div>
            </div>
            <div class="admin-card text-center text-muted" th:if="${#lists.isEmpty(page.content)}">데이터가 없습니다.</div>
        </div>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}" th:href="@{/web/admin/word-puzzles/{id}/entries(id=${puzzle.id},page=${i},size=${page.size})}" th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script th:inline="javascript">
    window.puzzleId = /*[[${puzzle.id}]]*/ null;
</script>
<script type="module">
    import {handleDelete, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
    window.deleteEntry = (btn) => {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        handleDelete(`/api/v1/admin/word-puzzles/${puzzleId}/entries/${id}`, name);
    };
</script>
</body>
</html>
