<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>단서 등록/수정 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
    <style>
        .entry-form-layout {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }
        .entry-form-left { flex: 1; min-width: 0; }
        .entry-form-right {
            flex: 0 0 auto;
            position: sticky;
            top: 1rem;
        }
        .board-preview-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
        }
        .board-preview-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #495057;
            margin-bottom: 0.5rem;
        }
        .board-preview-grid {
            display: inline-grid;
            gap: 1px;
            background: #adb5bd;
            border: 1px solid #adb5bd;
            border-radius: 3px;
            line-height: 1;
        }
        .bp-cell {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            position: relative;
            background: #212529;
            color: transparent;
        }
        .bp-cell.bp-active {
            background: #fff;
            color: #adb5bd;
        }
        .bp-cell.bp-current {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .bp-cell.bp-overlap {
            background: #fef3c7;
            color: #92400e;
        }
        .bp-cell.bp-selected {
            outline: 2px solid #2563eb;
            outline-offset: -2px;
            z-index: 1;
        }
        .bp-cell-num {
            position: absolute;
            top: 1px;
            left: 2px;
            font-size: 0.55rem;
            font-weight: 700;
            color: #6b7280;
            line-height: 1;
        }
        .bp-cell.bp-current .bp-cell-num { color: #1d4ed8; }
        .board-preview-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.6rem;
            font-size: 0.75rem;
            color: #6c757d;
        }
        .bp-legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .bp-legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            border: 1px solid #dee2e6;
        }
        .board-preview-info {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #495057;
            background: #f8f9fa;
            border-radius: 4px;
            padding: 0.4rem 0.6rem;
        }
        @media (max-width: 992px) {
            .entry-form-layout { flex-direction: column-reverse; }
            .entry-form-right {
                position: static;
                width: 100%;
            }
            .board-preview-grid { max-width: 100%; overflow-x: auto; }
            .bp-cell { width: 28px; height: 28px; font-size: 0.7rem; }
            .bp-cell-num { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <div class="admin-breadcrumb">
            <a href="/web/admin/word-puzzles">퍼즐 목록</a> &gt;
            <a th:href="@{/web/admin/word-puzzles/{id}/entries(id=${puzzleId})}">단서 목록</a> &gt;
            <span th:text="${entry != null} ? '수정' : '등록'">등록</span>
        </div>
        <h2 th:text="${entry != null} ? '단서 수정' : '단서 등록'">단서 등록</h2>

        <div class="entry-form-layout">
            <!-- 왼쪽: 입력 폼 -->
            <div class="entry-form-left">
                <div class="admin-form mobile-actions">
                    <!-- 사전 검색 -->
                    <div class="form-group">
                        <label for="dictSearchInput">사전 검색</label>
                        <div class="d-flex gap-2">
                            <input type="text" id="dictSearchInput" placeholder="용어 검색" class="form-control form-control-sm" style="flex:1">
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="dictSearchBtn">검색</button>
                        </div>
                        <div id="dictResults" style="margin-top:8px; max-height:200px; overflow-y:auto; border:1px solid #ddd; border-radius:4px; display:none;"></div>
                        <input type="hidden" id="dictionaryId" th:value="${entry?.dictionary?.id}">
                        <div id="selectedDict" style="margin-top:4px; font-size:0.9rem; color:#555;">
                            <span th:if="${entry != null}" th:text="'선택: [' + ${entry.dictionary.id} + '] ' + ${entry.dictionary.term}"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="answerText">정답 텍스트</label>
                        <input type="text" id="answerText" th:value="${entry?.answerText}" required>
                    </div>
                    <div class="form-group">
                        <label for="clueNumber">단서 번호</label>
                        <input type="number" id="clueNumber" th:value="${entry?.clueNumber}" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="directionCode">방향</label>
                        <select id="directionCode">
                            <option value="ACROSS" th:selected="${entry != null and entry.directionCode.name() == 'ACROSS'}">가로</option>
                            <option value="DOWN" th:selected="${entry != null and entry.directionCode.name() == 'DOWN'}">세로</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startRow">시작 행 (0-based)</label>
                        <input type="number" id="startRow" th:value="${entry?.startRow}" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="startCol">시작 열 (0-based)</label>
                        <input type="number" id="startCol" th:value="${entry?.startCol}" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="clueTypeCode">단서 유형</label>
                        <select id="clueTypeCode">
                            <option value="DEFINITION" th:selected="${entry != null and entry.clueTypeCode.name() == 'DEFINITION'}">정의형</option>
                            <option value="VERSE" th:selected="${entry != null and entry.clueTypeCode.name() == 'VERSE'}">구절형</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="clueText">단서 텍스트</label>
                        <textarea id="clueText" th:text="${entry?.clueText}"></textarea>
                    </div>
                    <div class="admin-form-actions mobile-actions">
                        <button type="button" class="btn btn-primary btn-sm" id="saveBtn">저장</button>
                        <a th:href="@{/web/admin/word-puzzles/{id}/entries(id=${puzzleId})}" class="btn btn-outline-secondary btn-sm">취소</a>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 보드 프리뷰 -->
            <div class="entry-form-right">
                <div class="board-preview-card">
                    <div class="board-preview-title">보드 프리뷰</div>
                    <div id="boardPreview" class="board-preview-grid"></div>
                    <div class="board-preview-legend">
                        <div class="bp-legend-item"><span class="bp-legend-swatch" style="background:#dbeafe;border-color:#93c5fd"></span> 현재 단서</div>
                        <div class="bp-legend-item"><span class="bp-legend-swatch" style="background:#fff"></span> 기존 단서</div>
                        <div class="bp-legend-item"><span class="bp-legend-swatch" style="background:#fef3c7;border-color:#fcd34d"></span> 겹침</div>
                        <div class="bp-legend-item"><span class="bp-legend-swatch" style="background:#212529"></span> 빈 칸</div>
                    </div>
                    <div id="boardPreviewInfo" class="board-preview-info d-none"></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:inline="javascript">
    window.puzzleId = /*[[${puzzleId}]]*/ null;
    window.editId = /*[[${entry?.id}]]*/ null;
</script>
<script type="module">
    import {fetchAdmin, initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();

    // ── Board Preview State ──
    let boardWidth = 0, boardHeight = 0;
    let existingEntries = [];

    const previewGrid = document.getElementById("boardPreview");
    const previewInfo = document.getElementById("boardPreviewInfo");

    async function loadBoardData() {
        try {
            const puzzle = await fetchAdmin(`/api/v1/admin/word-puzzles/${puzzleId}`);
            boardWidth = puzzle.boardWidth;
            boardHeight = puzzle.boardHeight;

            const entryPage = await fetchAdmin(`/api/v1/admin/word-puzzles/${puzzleId}/entries?size=200`);
            existingEntries = entryPage.content.filter(e => !editId || e.id !== editId);
            renderPreview();
        } catch (e) {
            previewGrid.textContent = '보드 정보를 불러올 수 없습니다.';
        }
    }

    function getCurrentEntry() {
        const answer = document.getElementById("answerText").value || '';
        const direction = document.getElementById("directionCode").value;
        const startRow = parseInt(document.getElementById("startRow").value);
        const startCol = parseInt(document.getElementById("startCol").value);
        const clueNum = parseInt(document.getElementById("clueNumber").value);
        if (isNaN(startRow) || isNaN(startCol) || !answer) return null;
        return { answerText: answer, directionCode: direction, startRow, startCol, clueNumber: clueNum || 0 };
    }

    function renderPreview() {
        if (!boardWidth || !boardHeight) return;
        previewGrid.style.gridTemplateColumns = `repeat(${boardWidth}, 1fr)`;
        previewGrid.innerHTML = '';

        // Build cell data: { letter, clueNumber, type: 'existing'|'current'|'overlap' }
        const cellData = {};

        // 기존 entries
        existingEntries.forEach(e => {
            for (let i = 0; i < e.answerText.length; i++) {
                const r = e.directionCode === 'ACROSS' ? e.startRow : e.startRow + i;
                const c = e.directionCode === 'ACROSS' ? e.startCol + i : e.startCol;
                const key = `${r},${c}`;
                if (!cellData[key]) cellData[key] = { letter: '', clueNum: null, type: 'existing' };
                cellData[key].letter = e.answerText[i];
                if (i === 0 && !cellData[key].clueNum) cellData[key].clueNum = e.clueNumber;
            }
        });

        // 현재 입력 중인 entry
        const cur = getCurrentEntry();
        let outOfBounds = false;
        if (cur) {
            for (let i = 0; i < cur.answerText.length; i++) {
                const r = cur.directionCode === 'ACROSS' ? cur.startRow : cur.startRow + i;
                const c = cur.directionCode === 'ACROSS' ? cur.startCol + i : cur.startCol;
                if (r < 0 || r >= boardHeight || c < 0 || c >= boardWidth) { outOfBounds = true; continue; }
                const key = `${r},${c}`;
                const isExisting = !!cellData[key];
                cellData[key] = cellData[key] || { letter: '', clueNum: null, type: 'current' };
                cellData[key].letter = cur.answerText[i];
                cellData[key].type = isExisting ? 'overlap' : 'current';
                if (i === 0) cellData[key].clueNum = cur.clueNumber;
            }
        }

        // Render grid
        for (let r = 0; r < boardHeight; r++) {
            for (let c = 0; c < boardWidth; c++) {
                const key = `${r},${c}`;
                const el = document.createElement('div');
                el.className = 'bp-cell';
                const data = cellData[key];
                if (data) {
                    el.classList.add(data.type === 'current' ? 'bp-current' : data.type === 'overlap' ? 'bp-overlap' : 'bp-active');
                    el.textContent = data.letter;
                    if (data.clueNum) {
                        const numEl = document.createElement('span');
                        numEl.className = 'bp-cell-num';
                        numEl.textContent = data.clueNum;
                        el.appendChild(numEl);
                    }
                }
                // Highlight start cell of current entry
                if (cur && r === cur.startRow && c === cur.startCol) {
                    el.classList.add('bp-selected');
                }
                previewGrid.appendChild(el);
            }
        }

        // Info message
        if (cur && outOfBounds) {
            previewInfo.textContent = '경고: 단어가 보드 범위를 벗어납니다!';
            previewInfo.className = 'board-preview-info text-danger';
        } else if (cur) {
            const endR = cur.directionCode === 'ACROSS' ? cur.startRow : cur.startRow + cur.answerText.length - 1;
            const endC = cur.directionCode === 'ACROSS' ? cur.startCol + cur.answerText.length - 1 : cur.startCol;
            previewInfo.textContent = `위치: (${cur.startRow},${cur.startCol}) → (${endR},${endC}) | ${cur.directionCode === 'ACROSS' ? '가로' : '세로'} ${cur.answerText.length}칸`;
            previewInfo.className = 'board-preview-info';
        } else {
            previewInfo.className = 'board-preview-info d-none';
        }
    }

    // 실시간 프리뷰 업데이트
    ["answerText", "directionCode", "startRow", "startCol", "clueNumber"].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener("input", renderPreview);
        el.addEventListener("change", renderPreview);
    });

    loadBoardData();

    // ── 사전 검색 ──
    const searchInput = document.getElementById("dictSearchInput");
    const searchBtn = document.getElementById("dictSearchBtn");
    const resultsDiv = document.getElementById("dictResults");
    const dictIdInput = document.getElementById("dictionaryId");
    const selectedDiv = document.getElementById("selectedDict");

    const doSearch = async () => {
        const term = searchInput.value.trim();
        if (!term) return;
        try {
            const res = await fetchAdmin(`/api/v1/admin/word-puzzles/dictionaries?term=${encodeURIComponent(term)}&size=10`);
            if (res.content.length === 0) {
                resultsDiv.innerHTML = '<div style="padding:8px;color:#999">결과 없음</div>';
            } else {
                resultsDiv.innerHTML = '';
                res.content.forEach(d => {
                    const row = document.createElement('div');
                    row.className = 'dict-item';
                    row.dataset.id = d.id;
                    row.dataset.term = d.term;
                    row.style.cssText = 'padding:6px 10px;cursor:pointer;border-bottom:1px solid #eee';
                    const strong = document.createElement('strong');
                    strong.textContent = `[${d.id}] ${d.term}`;
                    const span = document.createElement('span');
                    span.style.cssText = 'color:#888;font-size:0.85rem';
                    span.textContent = d.description ? ' — ' + d.description.substring(0, 60) : '';
                    row.appendChild(strong);
                    row.appendChild(span);
                    row.addEventListener('click', () => {
                        dictIdInput.value = d.id;
                        selectedDiv.textContent = `선택: [${d.id}] ${d.term}`;
                        resultsDiv.style.display = 'none';
                    });
                    resultsDiv.appendChild(row);
                });
            }
            resultsDiv.style.display = 'block';
        } catch (e) {
            alert(e.message);
        }
    };
    searchBtn.addEventListener("click", doSearch);
    searchInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); doSearch(); } });
    document.addEventListener("click", (e) => {
        if (!resultsDiv.contains(e.target) && e.target !== searchInput && e.target !== searchBtn) {
            resultsDiv.style.display = 'none';
        }
    });

    // ── 저장 ──
    document.getElementById("saveBtn").addEventListener("click", async () => {
        const dictionaryId = parseInt(dictIdInput.value);
        if (!dictionaryId) { alert("사전 용어를 선택해주세요."); return; }
        const body = {
            dictionaryId,
            answerText: document.getElementById("answerText").value,
            directionCode: document.getElementById("directionCode").value,
            startRow: parseInt(document.getElementById("startRow").value),
            startCol: parseInt(document.getElementById("startCol").value),
            clueNumber: parseInt(document.getElementById("clueNumber").value),
            clueTypeCode: document.getElementById("clueTypeCode").value,
            clueText: document.getElementById("clueText").value,
        };
        try {
            if (editId) {
                await fetchAdmin(`/api/v1/admin/word-puzzles/${puzzleId}/entries/${editId}`, {method: "PUT", body: JSON.stringify(body)});
            } else {
                await fetchAdmin(`/api/v1/admin/word-puzzles/${puzzleId}/entries`, {method: "POST", body: JSON.stringify(body)});
            }
            location.href = `/web/admin/word-puzzles/${puzzleId}/entries`;
        } catch (e) {
            alert(e.message);
        }
    });
</script>
</body>
</html>
