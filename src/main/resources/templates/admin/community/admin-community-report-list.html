<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>커뮤니티 신고 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="admin-sidebar-overlay" data-admin-sidebar-close></div>
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="admin-sidebar-toggle" type="button" aria-label="메뉴 열기" data-admin-sidebar-toggle>
                <span></span>
            </button>
            <span class="admin-topbar-title">관리자</span>
        </div>
        <h2>커뮤니티 신고 관리</h2>
        <div class="admin-toolbar">
            <form method="get" action="/web/admin/community/reports" class="d-flex gap-2 flex-wrap">
                <select name="targetType" class="form-select form-select-sm admin-search-input" style="max-width: 180px;">
                    <option value="">전체 대상</option>
                    <option th:each="t : ${T(com.elseeker.community.domain.vo.TargetType).values()}"
                            th:value="${t}" th:text="${t}" th:selected="${targetType == t}"></option>
                </select>
                <button type="submit" class="btn btn-outline-secondary btn-sm admin-search-button">필터</button>
            </form>
        </div>
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>대상</th>
                    <th>대상 ID</th>
                    <th>사유</th>
                    <th>신고자</th>
                    <th>신고일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${page.content}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.targetType}"></td>
                    <td>
                        <a th:if="${r.targetType.name() == 'POST'}"
                           th:href="@{/web/admin/community/posts/{id}(id=${r.targetId})}"
                           th:text="${r.targetId}"></a>
                        <a th:if="${r.targetType.name() == 'COMMENT'}"
                           th:href="@{/web/admin/community/comments(commentId=${r.targetId})}"
                           th:text="${r.targetId}"></a>
                        <span th:if="${r.targetType.name() != 'POST' and r.targetType.name() != 'COMMENT'}"
                              th:text="${r.targetId}"></span>
                    </td>
                    <td th:text="${r.reason}"></td>
                    <td th:text="${r.reporterNickname ?: '알 수 없음'}"></td>
                    <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(page.content)}">
                    <td colspan="6" class="text-center text-muted">데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="admin-card-list">
            <div class="admin-card" th:each="r : ${page.content}">
                <div class="admin-card-title" th:text="${r.reason}">사유</div>
                <div class="admin-card-row">
                    <span class="admin-card-label">ID</span>
                    <span class="admin-card-value" th:text="${r.id}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">대상</span>
                    <span class="admin-card-value" th:text="${r.targetType}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">대상 ID</span>
                    <span class="admin-card-value">
                        <a th:if="${r.targetType.name() == 'POST'}"
                           th:href="@{/web/admin/community/posts/{id}(id=${r.targetId})}"
                           th:text="${r.targetId}"></a>
                        <a th:if="${r.targetType.name() == 'COMMENT'}"
                           th:href="@{/web/admin/community/comments(commentId=${r.targetId})}"
                           th:text="${r.targetId}"></a>
                        <span th:if="${r.targetType.name() != 'POST' and r.targetType.name() != 'COMMENT'}"
                              th:text="${r.targetId}"></span>
                    </span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">신고자</span>
                    <span class="admin-card-value" th:text="${r.reporterNickname ?: '알 수 없음'}"></span>
                </div>
                <div class="admin-card-row">
                    <span class="admin-card-label">신고일</span>
                    <span class="admin-card-value" th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
            </div>
            <div class="admin-card text-center text-muted" th:if="${#lists.isEmpty(page.content)}">데이터가 없습니다.</div>
        </div>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}"
                   th:href="@{/web/admin/community/reports(page=${i},size=${page.size},targetType=${targetType})}"
                   th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script type="module">
    import {initAdminSidebarToggle} from "/js/admin/admin-common.js";
    initAdminSidebarToggle();
</script>
</body>
</html>
