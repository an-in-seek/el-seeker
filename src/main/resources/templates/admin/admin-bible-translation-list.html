<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>번역본 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <main class="admin-content">
        <h2>번역본 관리</h2>
        <div class="admin-toolbar">
            <div></div>
            <a href="/web/admin/bible/translations/new" class="btn btn-primary btn-sm">등록</a>
        </div>
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>타입</th>
                <th>이름</th>
                <th>순서</th>
                <th>언어</th>
                <th>작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${page.content}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.translationType}"></td>
                <td th:text="${t.name}"></td>
                <td th:text="${t.translationOrder}"></td>
                <td th:text="${t.languageCode}"></td>
                <td class="admin-actions">
                    <a th:href="@{/web/admin/bible/translations/{tid}/books(tid=${t.id})}" class="btn btn-outline-info btn-sm">책 목록</a>
                    <a th:href="@{/web/admin/bible/translations/{id}/edit(id=${t.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                    <button class="btn btn-outline-danger btn-sm" th:data-id="${t.id}" th:data-name="${t.name}" onclick="deleteTranslation(this)">삭제</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(page.content)}">
                <td colspan="6" class="text-center text-muted">데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}" th:href="@{/web/admin/bible/translations(page=${i},size=${page.size})}" th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script type="module">
    import {handleDelete} from "/js/admin/admin-common.js";
    window.deleteTranslation = (btn) => {
        handleDelete(`/api/v1/admin/bible/translations/${btn.dataset.id}`, btn.dataset.name);
    };
</script>
</body>
</html>
