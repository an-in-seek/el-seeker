<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>절 관리 | ElSeeker</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/admin-sidebar :: sidebar}"></aside>
    <main class="admin-content">
        <div class="admin-breadcrumb">
            <a href="/web/admin/bible/translations">번역본 목록</a> &gt;
            <a th:href="@{/web/admin/bible/books/{bid}/chapters(bid=${chapter.bookId})}">장 목록</a> &gt;
            <span th:text="${chapter.chapterNumber + '장'}">장</span> &gt; 절 목록
        </div>
        <h2>절 관리 — <span th:text="${chapter.chapterNumber}"></span>장</h2>
        <div class="admin-toolbar">
            <div></div>
            <a th:href="@{/web/admin/bible/chapters/{cid}/verses/new(cid=${chapterId})}" class="btn btn-primary btn-sm">등록</a>
        </div>
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>절 번호</th>
                <th>본문</th>
                <th>작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${page.content}">
                <td th:text="${v.id}"></td>
                <td th:text="${v.verseNumber}"></td>
                <td th:text="${#strings.abbreviate(v.text, 100)}"></td>
                <td class="admin-actions">
                    <a th:href="@{/web/admin/bible/chapters/{cid}/verses/{id}/edit(cid=${chapterId},id=${v.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                    <button class="btn btn-outline-danger btn-sm" th:data-id="${v.id}" th:data-name="${v.verseNumber + '절'}" th:data-cid="${chapterId}" onclick="deleteVerse(this)">삭제</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(page.content)}">
                <td colspan="4" class="text-center text-muted">데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        <div class="admin-pagination" th:if="${page.totalPages > 1}">
            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:if="${i != page.number}" th:href="@{/web/admin/bible/chapters/{cid}/verses(cid=${chapterId},page=${i},size=${page.size})}" th:text="${i + 1}"></a>
                <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
            </th:block>
        </div>
    </main>
</div>
<script type="module">
    import {handleDelete} from "/js/admin/admin-common.js";
    window.deleteVerse = (btn) => {
        handleDelete(`/api/v1/admin/bible/chapters/${btn.dataset.cid}/verses/${btn.dataset.id}`, btn.dataset.name);
    };
</script>
</body>
</html>
