<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible | 성경', true, null)}"></head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container content-wrapper">
    <section class="home-hero" aria-labelledby="homeHeroTitle">
        <div class="home-hero-content">
            <p class="home-hero-eyebrow">성경을 이해하기 위한 첫걸음</p>
            <h2 id="homeHeroTitle" class="home-hero-title">성경 읽기를 시작해보세요.</h2>
            <p class="home-hero-lead">
                다양한 성경 번역본을 선택하고, 장과 절을 자연스럽게 이동하며 성경을 읽을 수 있습니다.
                찾고싶은 구절이 있다면 단어 검색으로 빠르게 찾아보세요.
            </p>
        </div>
    </section>
    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link" href="/web/bible/translation">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">📖</div>
                        <h2 class="h5 fw-bold">
                            성경
                            <small class="d-block text-muted fw-normal">Bible</small>
                        </h2>
                        <p class="text-muted small mb-0">성경 번역본과 본문을 살펴봅니다.</p>

                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link" href="/web/study">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">📚</div>
                        <h2 class="h5 fw-bold">
                            학습
                            <small class="d-block text-muted fw-normal">Study</small>
                        </h2>
                        <p class="text-muted small mb-0">성경을 이해하고 배우는 공간입니다.</p>

                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link coming-soon" href="/web/community">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">🤝</div>
                        <div class="d-flex flex-column align-items-center gap-1">
                            <span class="badge text-bg-warning text-uppercase small">준비중</span>
                            <h2 class="h5 fw-bold mb-0">
                                커뮤니티
                                <small class="d-block text-muted fw-normal">Community</small>
                            </h2>
                        </div>
                        <p class="text-muted small mb-0">성경에 대한 질문과 나눔으로 함께합니다.</p>

                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link coming-soon" href="/web/game">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">🎮</div>
                        <div class="d-flex flex-column align-items-center gap-1">
                            <span class="badge text-bg-warning text-uppercase small">준비중</span>
                            <h2 class="h5 fw-bold mb-0">
                                게임
                                <small class="d-block text-muted fw-normal">Games</small>
                            </h2>
                        </div>
                        <p class="text-muted small mb-0">재미있는 게임을 통해 성경을 배웁니다.</p>

                    </div>
                </div>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const comingSoonLinks = document.querySelectorAll(".coming-soon");
        comingSoonLinks.forEach((link) => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
            });
        });

        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "The Bible";
            pageTitleLabel.classList.remove("d-none");
        }
    });
</script>
</body>
</html>
