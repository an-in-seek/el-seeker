<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible | 성경', true, '/css/hero.css?v=2.1,/css/card.css?v=2.1,/css/home.css?v=2.1')}"></head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container content-wrapper">
    <section class="home-hero page-hero" aria-labelledby="homeHeroTitle">
        <div class="home-hero-content page-hero-content">
            <p class="home-hero-eyebrow page-hero-eyebrow">성경을 이해하기 위한 첫걸음</p>
            <h2 id="homeHeroTitle" class="home-hero-title page-hero-title">성경 읽기를 시작해보세요</h2>
            <p class="home-hero-lead page-hero-lead">성경 읽기와 공부를 한번에 🤗</p>
        </div>
    </section>
    <div class="row g-3 home-menu-grid">
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/bible/translation">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div title="성경 번역본과 본문을 살펴봅니다."
                         class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">📖</div>
                        <h3 class="h5 fw-bold">
                            성경
                            <small class="d-block text-muted fw-normal">Bible</small>
                        </h3>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/study">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div title="성경을 이해하고 배우는 공간입니다."
                         class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">📚</div>
                        <h3 class="h5 fw-bold">
                            학습
                            <small class="d-block text-muted fw-normal">Study</small>
                        </h3>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/game">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div title="재미있는 게임을 통해 성경을 배웁니다."
                         class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">🎮</div>
                        <h3 class="h5 fw-bold">
                            게임
                            <small class="d-block text-muted fw-normal">Games</small>
                        </h3>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift coming-soon" href="/web/community">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">🤝</div>
                        <div title="성경에 대한 질문과 나눔으로 함께합니다."
                             class="d-flex flex-column align-items-center gap-1">
                            <span class="badge text-bg-warning text-uppercase small">준비중</span>
                            <h3 class="h5 fw-bold mb-0">
                                커뮤니티
                                <small class="d-block text-muted fw-normal">Community</small>
                            </h3>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="/js/storage-util.js?v=2.1"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const lastRead = LastReadStore.get();
        if (lastRead) {
            const verseUrl = new URL("/web/bible/verse", window.location.origin);
            verseUrl.searchParams.set("translationId", lastRead.translationId);
            verseUrl.searchParams.set("bookOrder", lastRead.bookOrder);
            verseUrl.searchParams.set("chapterNumber", lastRead.chapterNumber);
            window.location.replace(`${verseUrl.pathname}${verseUrl.search}`);
            return;
        }
        const comingSoonLinks = document.querySelectorAll(".coming-soon");
        comingSoonLinks.forEach((link) => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
            });
        });
        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "The Bible";
            pageTitleLabel.classList.remove("d-none");
        }
    });
</script>
</body>
</html>
