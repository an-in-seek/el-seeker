<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('홈 | ElSeeker', true, '/css/hero.css?v=2.2,/css/card.css?v=2.2,/css/home.css?v=2.9')}"
      th:with="pageDescription='성경 읽기, 학습, 게임, 커뮤니티를 한 곳에서 이용할 수 있는 ElSeeker 온라인 성경 플랫폼입니다.'"></head>
<body class="has-fixed-nav">
<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='ElSeeker', pageTitleVisible=true"></header>

<main class="container content-wrapper">
    <section class="home-hero" aria-labelledby="homeHeroTitle" aria-roledescription="carousel" aria-label="히어로 배너">
        <div class="home-hero-track" id="heroTrack">
            <div class="home-hero-slide" style="background-image: url('/images/thebible1.png')" role="group" aria-roledescription="slide" aria-label="슬라이드 1"></div>
            <div class="home-hero-slide" style="background-image: url('/images/thebible2.png')" role="group" aria-roledescription="slide" aria-label="슬라이드 2"></div>
        </div>
        <div class="home-hero-overlay"></div>
        <div class="home-hero-content">
            <h2 id="homeHeroTitle" class="home-hero-title">하나님의 말씀</h2>
            <p class="home-hero-sub">예수께서 이르시되 이 성경이 곧 내게 대하여 증언하는 것이니라. (요한복음 5:39)</p>
            <a href="/web/bible/translation" class="home-hero-cta">
                성경 읽기 시작 <span class="cta-arrow" aria-hidden="true">&rsaquo;</span>
            </a>
        </div>
        <div class="home-hero-indicators" role="tablist" aria-label="슬라이드 선택">
            <button class="home-hero-dot active" data-slide="0" role="tab" aria-selected="true" aria-label="슬라이드 1"></button>
            <button class="home-hero-dot" data-slide="1" role="tab" aria-selected="false" aria-label="슬라이드 2"></button>
        </div>
    </section>
    <div class="row g-3 home-menu-grid">
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/bible/translation">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div title="성경 번역본과 본문을 살펴봅니다."
                         class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">📖</div>
                        <h3 class="h5 fw-bold">
                            성경
                            <small class="d-block text-muted fw-normal">Bible</small>
                        </h3>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/study">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div title="성경을 이해하고 배우는 공간입니다."
                         class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">📚</div>
                        <h3 class="h5 fw-bold">
                            학습
                            <small class="d-block text-muted fw-normal">Study</small>
                        </h3>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/game">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div title="재미있는 게임을 통해 성경을 배웁니다."
                         class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">🎮</div>
                        <h3 class="h5 fw-bold">
                            게임
                            <small class="d-block text-muted fw-normal">Games</small>
                        </h3>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/community">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div class="card-body text-center d-flex flex-column justify-content-center align-items-center">
                        <div class="fs-2 mb-2">💬</div>
                        <div title="성경에 대한 질문과 나눔으로 함께합니다." class="d-flex flex-column align-items-center gap-1">
                            <h3 class="h5 fw-bold mb-0">
                                커뮤니티
                                <small class="d-block text-muted fw-normal">Community</small>
                            </h3>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Random Bible Verse Section -->
    <div class="row justify-content-center mt-4 mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <h3 class="h5 fw-bold text-secondary mb-3">오늘의 랜덤 성경 구절</h3>
                    <figure class="mb-4" id="dailyVerseLink" role="link" tabindex="0" aria-label="해당 성경 구절로 이동">
                        <blockquote class="blockquote">
                            <p class="mb-3 fs-6 fst-italic" id="dailyVerseText">
                                <!-- Verse Text will be loaded here -->
                                로딩 중...
                            </p>
                        </blockquote>
                        <figcaption class="mt-2 text-dark fw-bold" id="dailyVerseReference">
                            <!-- Reference will be loaded here -->
                        </figcaption>
                    </figure>

                    <div class="mt-4 pt-3 border-top">
                        <p class="text-muted small mb-0">
                            ⚠️ 자의적 해석을 지양하고, 반드시 해당 구절의 앞뒤 문맥을 함께 확인해주세요.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="module" src="/js/index.js?v=2.3"></script>
</body>

</html>
