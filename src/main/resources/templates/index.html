<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('온라인 성경 읽기 · 학습 · 퀴즈 | ElSeeker', true, '/css/hero.css?v=2.2,/css/card.css?v=2.2,/css/home.css?v=3.4')}"
      th:with="pageDescription='성경 읽기, 학습, 게임, 커뮤니티를 한 곳에서 이용할 수 있는 ElSeeker 온라인 성경 플랫폼입니다.',
               pageKeywords='온라인 성경,성경 읽기,성경 학습,성경 퀴즈,성경 검색,개역한글,성경 게임,ElSeeker'"></head>
<body class="has-fixed-nav">
<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='ElSeeker', pageTitleVisible=true"></header>

<main class="container content-wrapper">
    <section class="home-hero" aria-labelledby="homeHeroTitle" aria-roledescription="carousel" aria-label="히어로 배너">
        <div class="home-hero-track" id="heroTrack">
            <div class="home-hero-slide" style="background-image: url('/images/thebible1.png')" role="group" aria-roledescription="slide" aria-label="슬라이드 1"></div>
            <div class="home-hero-slide" style="background-image: url('/images/thebible2.png')" role="group" aria-roledescription="slide" aria-label="슬라이드 2"></div>
        </div>
        <div class="home-hero-overlay"></div>
        <div class="home-hero-content">
            <h2 id="homeHeroTitle" class="home-hero-title">하나님의 말씀</h2>
            <p class="home-hero-sub">예수께서 이르시되 이 성경이 곧 내게 대하여 증언하는 것이니라. (요한복음 5:39)</p>
            <a href="/web/bible/translation" class="home-hero-cta">
                성경 읽기 시작 <span class="cta-arrow" aria-hidden="true">&rsaquo;</span>
            </a>
        </div>
        <div class="home-hero-indicators" role="tablist" aria-label="슬라이드 선택">
            <button class="home-hero-dot active" data-slide="0" role="tab" aria-selected="true" aria-label="슬라이드 1"></button>
            <button class="home-hero-dot" data-slide="1" role="tab" aria-selected="false" aria-label="슬라이드 2"></button>
        </div>
    </section>
    <div class="row g-3 home-menu-grid">
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/bible/translation">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div class="card-body text-start text-md-center d-flex flex-row flex-md-column justify-content-start justify-content-md-center align-items-center">
                        <div class="fs-2 me-3 me-md-0 mb-md-2">📖</div>
                        <div>
                            <h3 class="h5 fw-bold mb-0">
                                성경
                                <small class="d-inline d-md-block text-muted fw-normal">Bible</small>
                            </h3>
                            <p class="small text-muted mb-0 mt-1 d-md-none">성경 번역본과 본문을 살펴봅니다.</p>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/study">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div class="card-body text-start text-md-center d-flex flex-row flex-md-column justify-content-start justify-content-md-center align-items-center">
                        <div class="fs-2 me-3 me-md-0 mb-md-2">📚</div>
                        <div>
                            <h3 class="h5 fw-bold mb-0">
                                학습
                                <small class="d-inline d-md-block text-muted fw-normal">Study</small>
                            </h3>
                            <p class="small text-muted mb-0 mt-1 d-md-none">성경을 이해하고 배우는 공간입니다.</p>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/game">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div class="card-body text-start text-md-center d-flex flex-row flex-md-column justify-content-start justify-content-md-center align-items-center">
                        <div class="fs-2 me-3 me-md-0 mb-md-2">🎮</div>
                        <div>
                            <h3 class="h5 fw-bold mb-0">
                                게임
                                <small class="d-inline d-md-block text-muted fw-normal">Games</small>
                            </h3>
                            <p class="small text-muted mb-0 mt-1 d-md-none">재미있는 게임을 통해 성경을 배웁니다.</p>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none menu-card-link card-lift" href="/web/community">
                <div class="card h-100 shadow-sm border-0 home-menu-card">
                    <div class="card-body text-start text-md-center d-flex flex-row flex-md-column justify-content-start justify-content-md-center align-items-center">
                        <div class="fs-2 me-3 me-md-0 mb-md-2">💬</div>
                        <div>
                            <h3 class="h5 fw-bold mb-0">
                                커뮤니티
                                <small class="d-inline d-md-block text-muted fw-normal">Community</small>
                            </h3>
                            <p class="small text-muted mb-0 mt-1 d-md-none">성경에 대한 질문과 나눔으로 함께합니다.</p>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 3D 우주 배경 섹션 -->
    <section class="universe-section" id="universeSection" aria-label="창세기 1장 1절">
        <canvas id="universeCanvas" aria-hidden="true"></canvas>
        <div class="universe-content">
            <p class="universe-verse universe-fade">태초에 하나님이<br>천지를 창조하시니라</p>
            <a href="/web/study/creation" class="universe-cta universe-fade">
                7일 창조 이야기 체험하기 <span aria-hidden="true">&rarr;</span>
            </a>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module" src="/js/index.js?v=2.6"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>

</html>
