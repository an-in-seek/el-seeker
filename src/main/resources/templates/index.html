<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('TheBible | 성경 검색', true, null)}"></head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">TheBible</h1>
        <p class="lead mb-1">말씀과 배움, 그리고 함께하는 공간으로 안내합니다.</p>
        <p class="text-muted">원하는 메뉴를 선택해 시작해보세요.</p>
    </div>
    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none home-menu-link" href="/web/bible/translation">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">📖</div>
                        <h2 class="h5 fw-bold">
                            성경
                            <small class="d-block text-muted fw-normal">Bible</small>
                        </h2>
                        <p class="text-muted small mb-0">성경 번역본과 본문을 살펴봅니다.</p>

                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none home-menu-link coming-soon" href="/web/learn">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">📚</div>
                        <h2 class="h5 fw-bold">
                            학습
                            <small class="d-block text-muted fw-normal">Study</small>
                        </h2>
                        <p class="text-muted small mb-0">성경을 이해하고 배우는 공간입니다.</p>

                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none home-menu-link coming-soon" href="/web/community">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">🤝</div>
                        <h2 class="h5 fw-bold">
                            커뮤니티
                            <small class="d-block text-muted fw-normal">Community</small>
                        </h2>
                        <p class="text-muted small mb-0">성경에 대한 질문과 나눔으로 함께합니다.</p>

                    </div>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <a class="text-decoration-none home-menu-link coming-soon" href="/web/game">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="fs-2 mb-2">🎮</div>
                        <h2 class="h5 fw-bold">
                            게임
                            <small class="d-block text-muted fw-normal">Games</small>
                        </h2>
                        <p class="text-muted small mb-0">재미있는 게임을 통해 성경을 배웁니다.</p>

                    </div>
                </div>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const comingSoonLinks = document.querySelectorAll(".coming-soon");
        comingSoonLinks.forEach((link) => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
                alert("현재 준비중입니다.");
            });
        });

        const pageTitleLabel = document.getElementById("pageTitleLabel");
        if (pageTitleLabel) {
            pageTitleLabel.textContent = "TheBible";
            pageTitleLabel.classList.remove("d-none");
        }

        // const translationId = TranslationStore.getCurrentTranslationId();
        // const translationType = TranslationStore.getCurrentTranslationType();
        // if (translationId && translationType) {
        //     window.location.href = "/web/bible/book";
        // }
    });
</script>
</body>
</html>
