<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('Error', false, '/css/error.css')}"></head>
<body>
<div class="error-container">
  <div class="error-code" th:text="${status}"></div>
  <p class="error-message" th:text="${message}"></p>
  <a href="/" class="btn-home">홈으로 돌아가기</a>
</div>
</body>
</html>
