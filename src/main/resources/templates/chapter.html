<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('TheBible - Bible Chapters | 성경 장 목록', true, null)}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper pt-3">

    <!-- 책 개요 -->
    <a id="bookDescription"
       class="book-description text-decoration-none"
       href="#"
       aria-label="책 상세 보기"
       title="책 개요를 보려면 클릭하세요">
        <div class="book-description-row">
            <div class="book-description-text">
                📘 <span id="bookDescriptionSummary"></span>
            </div>
            <div class="book-description-icon">➡️</div>
        </div>
    </a>

    <!-- 장 선택 그리드 -->
    <div id="chapterList" class="chapter-grid"></div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
    <div class="nav-container">
        <!-- 이전 책 버튼 -->
        <button id="prevBookBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                aria-label="이전 책으로 이동">
            <span aria-hidden="true">⬅</span>
        </button>

        <!-- 책 선택 (링크) -->
        <a id="bookSelectLink"
           href="#"
           class="btn btn-lg btn-primary"
           aria-label="책 선택">
            <span aria-hidden="true">📖</span>
            <span id="bookSelectLinkLabel" class="ms-2"></span>
        </a>

        <!-- 다음 책 버튼 -->
        <button id="nextBookBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                aria-label="다음 책으로 이동">
            <span aria-hidden="true">➡</span>
        </button>
    </div>
</div>

<script src="/js/storage-util.js?v6"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const navDOM = {
            translationLink: document.getElementById("topNavTranslationLink"),
            searchLink: document.getElementById("topNavSearchLink"),
            translationTypeLabel: document.getElementById("translationTypeLabel"),
            bookLabel: document.getElementById("bookLabel"),
        };
        if (navDOM.translationLink) {
            navDOM.translationLink.classList.remove("d-none");
            navDOM.translationLink.addEventListener("click", () => {
                TranslationStore.saveTranslationReturnPath("/web/bible/chapter");
            });
        }
        if (navDOM.searchLink) {
            navDOM.searchLink.classList.remove("d-none");
        }
        if (navDOM.bookLabel) {
            navDOM.bookLabel.classList.remove("d-none");
        }

        const translationId = TranslationStore.getCurrentTranslationId();
        const translationType = TranslationStore.getCurrentTranslationType();
        if (!translationId || !translationType) {
            window.location.href = "/web/bible/translation";
            return;
        }

        const bookOrder = BookStore.getCurrentBookOrder();
        const bookName = BookStore.getBookName(translationId, bookOrder);
        if (!bookOrder || !bookName) {
            window.location.href = "/web/bible/book";
            return;
        }

        const DOM = {
            translationTypeLabel: navDOM.translationTypeLabel,
            bookLabel: navDOM.bookLabel,
            bookDescription: document.getElementById("bookDescription"),
            bookDescriptionSummary: document.getElementById("bookDescriptionSummary"),
            chapterList: document.getElementById("chapterList"),
            prevBtn: document.getElementById("prevBookBtn"),
            bookSelectLink: document.getElementById("bookSelectLink"),
            bookSelectLinkLabel: document.getElementById("bookSelectLinkLabel"),
            nextBtn: document.getElementById("nextBookBtn"),
        }

        if (DOM.translationTypeLabel) {
            DOM.translationTypeLabel.textContent = translationType;
        }
        if (DOM.bookLabel) {
            DOM.bookLabel.textContent = bookName;
            DOM.bookLabel.href = "/web/bible/book";
        }
        DOM.bookSelectLinkLabel.textContent = bookName;
        DOM.bookSelectLink.href = "/web/bible/book";
        DOM.bookDescription.href = "/web/bible/book/description";

        const books = BookStore.getListForTranslation(translationId);
        if (!books || books.length === 0) {
            return;
        }
        const currentIndex = books.findIndex(book => book.bookOrder === bookOrder);
        DOM.prevBtn.disabled = currentIndex <= 0;
        DOM.nextBtn.disabled = currentIndex >= books.length - 1;

        DOM.prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) {
                const prevBook = books[currentIndex - 1];
                BookStore.saveCurrentBook(prevBook);
                window.location.reload();
            }
        });

        DOM.nextBtn.addEventListener("click", () => {
            if (currentIndex < books.length - 1) {
                const nextBook = books[currentIndex + 1];
                BookStore.saveCurrentBook(nextBook);
                window.location.reload();
            }
        });

        // 📌 sessionStorage에서 데이터 확인 후 즉시 렌더링 (API 요청 최소화)
        function renderFromSessionStorage() {
            const bookData = BookStore.getDetail(translationId, bookOrder);
            if (bookData) {
                renderChapters(bookData);
                return true;
            }
            return false;
        }

        // 📌 화면 업데이트 함수 (sessionStorage & API 호출 공통)
        function renderChapters(data) {
            DOM.bookSelectLinkLabel.textContent = data.book.bookName;
            DOM.bookDescriptionSummary.textContent = data.book.descriptionSummary;
            DOM.chapterList.innerHTML = "";
            data.book.chapters.forEach(chapter => {
                const tile = document.createElement("button");
                tile.type = "button";
                tile.className = "chapter-tile";
                tile.textContent = chapter.chapterNumber;
                tile.addEventListener("click", () => {
                    ChapterStore.saveNumber(chapter.chapterNumber);
                    window.location.href = "/web/bible/verse";
                });
                DOM.chapterList.appendChild(tile);
            });
            BookStore.saveDetail(translationId, bookOrder, data);
            window.scrollTo({top: 0, behavior: "smooth"});
        }

        // 📌 API에서 데이터 가져오기 (sessionStorage에 없을 경우)
        async function fetchChaptersFromAPI() {
            try {
                const response = await fetch(`/api/bibles/translations/${translationId}/books/${bookOrder}/chapters`);
                if (!response.ok) {
                    throw new Error("데이터를 불러오는 중 오류가 발생했습니다.");
                }
                const data = await response.json();
                renderChapters(data);
            } catch (error) {
                alert(error.message);
            }
        }

        // 📌 최초 데이터 로드 (sessionStorage 우선, 없으면 API 호출)
        if (!renderFromSessionStorage()) {
            await fetchChaptersFromAPI();
        }
    });
</script>
</body>
</html>
