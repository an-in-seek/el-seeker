<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 장 목록 - 책별 장 선택 | ElSeeker', true, '/css/bible/chapter-list.css?v=2.9')}"
      th:with="pageDescription='선택한 성경 책의 장 목록과 책 개요를 빠르게 둘러볼 수 있습니다.',
               pageKeywords='성경 장,성경 읽기,성경 본문,성경책 개요'"></head>

<body class="has-fixed-nav has-dual-bottom-nav">

<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='성경 장 목록', pageTitleVisible=true"></header>
<main class="container content-wrapper mb-80">
    <!-- 책 개요 -->
    <div class="book-info-section">
        <a id="bookDescription"
           class="book-description text-decoration-none"
           href="#"
           aria-label="책 상세 보기"
           title="책 개요를 보려면 클릭하세요">
            <div class="book-description-row">
                <div class="book-description-text">
                    📘 <span id="bookDescriptionSummary"></span>
                </div>
                <div class="book-description-icon">➡️</div>
            </div>
        </a>
        <div class="book-action-buttons">
            <a id="overviewVideoBtn"
               class="book-action-btn"
               href="#"
               aria-label="개요 영상 보기">
                <span class="book-action-btn-icon" aria-hidden="true"><img src="/images/icon/youtube.svg" width="20" height="20" alt="YouTube Icon" loading="lazy" decoding="async"></span>
                <span class="book-action-btn-label">개요</span>
            </a>
            <a id="listenBibleBtn"
               class="book-action-btn"
               href="#"
               aria-label="성경 듣기">
                <span class="book-action-btn-icon" aria-hidden="true">🎧</span>
                <span class="book-action-btn-label">듣기</span>
            </a>
            <a id="gameBtn"
               class="book-action-btn"
               href="/web/game/bible-ox-quiz/map"
               aria-label="O/X 퀴즈 게임">
                <span class="book-action-btn-icon" aria-hidden="true">🎮</span>
                <span class="book-action-btn-label">퀴즈</span>
            </a>
            <button id="bookMemoBtn"
                    class="book-action-btn"
                    type="button"
                    aria-label="책 메모">
                <span id="bookMemoIcon" class="book-action-btn-icon" aria-hidden="true">📝</span>
                <span class="book-action-btn-label">메모</span>
            </button>
        </div>
    </div>
    <!-- 장 선택 그리드 -->
    <div id="chapterList" class="chapter-grid"></div>
</main>

<!-- 책 메모 오버레이 -->
<div id="bookMemoOverlay" class="book-memo-overlay d-none" aria-hidden="true">
    <div class="book-memo-panel" role="dialog" aria-labelledby="bookMemoPanelTitle">
        <div class="book-memo-panel-header">
            <h5 id="bookMemoPanelTitle" class="mb-0">책 메모</h5>
            <button type="button" class="btn-close" id="bookMemoCloseBtn" aria-label="닫기"></button>
        </div>
        <div class="book-memo-panel-body">
            <textarea id="bookMemoInput" class="form-control" rows="6"
                      placeholder="이 책에 대한 메모를 입력하세요..." aria-label="책 메모 입력"></textarea>
        </div>
        <div class="book-memo-panel-footer">
            <button type="button" class="btn btn-outline-danger d-none" id="bookMemoDeleteBtn">삭제</button>
            <button type="button" class="btn btn-primary" id="bookMemoSaveBtn">저장</button>
        </div>
    </div>
</div>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
    <div class="nav-container">
        <!-- 이전 책 버튼 -->
        <button id="prevBookBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                aria-label="이전 책으로 이동">
            <span aria-hidden="true">⬅</span>
        </button>

        <!-- 책 선택 (링크) -->
        <a id="bookSelectLink"
           href="#"
           class="btn btn-lg btn-primary"
           aria-label="책 선택">
            <span aria-hidden="true">📖</span>
            <span id="bookSelectLinkLabel" class="ms-2"></span>
        </a>

        <!-- 다음 책 버튼 -->
        <button id="nextBookBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                aria-label="다음 책으로 이동">
            <span aria-hidden="true">➡</span>
        </button>
    </div>
</div>

<script type="module" src="/js/bible/chapter-list.js?v=2.8"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>
</html>
