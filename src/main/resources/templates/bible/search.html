<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head th:replace="~{fragments/head :: head('성경 구절 검색 - 키워드로 빠르게 찾기 | ElSeeker', true, '/css/search.css?v=2.9,/css/popular-search.css?v=1.2')}"
      th:with="pageDescription='성경 본문을 키워드로 검색해 원하는 구절을 빠르게 찾을 수 있습니다.',
               pageKeywords='성경 검색,성경 구절 찾기,성경 키워드 검색,성경 본문 검색,말씀 찾기'"></head>

<body class="has-fixed-nav has-dual-bottom-nav">

<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='성경 검색', pageTitleVisible=true"></header>

<main class="container search-page content-wrapper">
    <div class="search-controls">
        <form id="searchForm" role="search" class="mb-2">
            <div class="input-group">
                <input type="search" id="keywordInput" class="form-control" placeholder="검색할 단어를 입력하세요"
                       th:value="${keyword}" autocomplete="off" inputmode="search">
                <button id="clearBtn" type="button" class="btn btn-outline-secondary">지우기</button>
                <button id="searchBtn" type="submit" class="btn btn-outline-primary">🔍</button>
            </div>
        </form>
        <div id="bookFilterContainer" class="book-filter-container d-none">
            <select id="bookFilterSelect" class="form-select book-filter-select">
                <option value="">전체</option>
            </select>
        </div>
        <div id="resultCount" class="search-result-meta text-muted small" role="status" aria-live="polite"></div>
        <div id="searchEmptyState" class="text-muted small d-none"></div>
    </div>

    <section id="bibleKeywordRankingSection" class="mt-3 d-none" aria-labelledby="bibleKeywordRankingTitle">
        <article class="popular-search-card">
            <header class="popular-search-card-header">
                <h2 id="bibleKeywordRankingTitle" class="popular-search-title">인기 검색어</h2>
                <button type="button" class="popular-search-more"
                        data-ranking-more="bible"
                        aria-label="성경 구절 인기 검색어 전체 보기">더보기
                </button>
            </header>
            <ol id="bibleKeywordRankingList" class="popular-search-list"></ol>
        </article>
    </section>

    <div th:replace="~{fragments/popular-search-dialog :: popularSearchDialog}"></div>

    <div id="searchLoading" class="search-loading d-none" role="status" aria-live="polite">
        <div class="spinner-container">
            <div class="custom-spinner"></div>
            <p class="mt-3 text-muted fw-medium" id="searchLoadingMessage">검색 중...</p>
        </div>
    </div>

    <div id="searchResultList" class="search-result-list mt-3 d-none search-results-scroll">
    </div>
</main>

<button id="scrollToTopBtn" class="scroll-to-top-btn" type="button" aria-label="맨 위로 이동">
    ↑
</button>

<script type="module" src="/js/bible/search.js?v=2.8"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>

</html>
