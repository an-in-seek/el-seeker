<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 66권 목록 - 구약·신약 전체 | ElSeeker', true, '/css/bible/book-list.css?v=2.6')}"
      th:with="pageDescription='구약 39권과 신약 27권, 성경 66권을 한눈에 살펴보고 원하는 책을 선택해 읽을 수 있습니다.',
               pageKeywords='성경 66권,구약성경,신약성경,성경 목록,성경책 이름,창세기,마태복음'"></head>
<body class="has-fixed-nav has-dual-bottom-nav">

<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='성경책 목록', pageTitleVisible=true"></header>

<main class="container content-wrapper">
    <div class="book-search-wrapper">
        <div class="book-search-input-group">
            <svg class="book-search-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
            </svg>
            <input type="search" id="bookSearchInput" class="book-search-input"
                   placeholder="책 이름 검색 (예: 창세기, 마태)" autocomplete="off" inputmode="search">
            <button type="button" id="bookSearchClear" class="book-search-clear d-none" aria-label="검색어 지우기">
                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
                </svg>
            </button>
        </div>
        <div id="bookSearchEmpty" class="book-search-empty d-none">검색 결과가 없습니다.</div>
    </div>
    <div class="book-sections">
        <section class="book-section" aria-labelledby="oldTestamentTitle">
            <button type="button" class="book-section-header" id="oldTestamentToggle"
                    aria-expanded="true" aria-controls="oldTestamentList">
                <div class="book-section-header-left">
                    <svg class="book-section-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
                    </svg>
                    <h2 id="oldTestamentTitle" class="book-section-title">구약</h2>
                </div>
                <span id="oldTestamentCount" class="book-section-count"></span>
            </button>
            <div id="oldTestamentList" class="book-grid book-section-body"></div>
        </section>
        <section class="book-section" aria-labelledby="newTestamentTitle">
            <button type="button" class="book-section-header" id="newTestamentToggle"
                    aria-expanded="true" aria-controls="newTestamentList">
                <div class="book-section-header-left">
                    <svg class="book-section-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
                    </svg>
                    <h2 id="newTestamentTitle" class="book-section-title">신약</h2>
                </div>
                <span id="newTestamentCount" class="book-section-count"></span>
            </button>
            <div id="newTestamentList" class="book-grid book-section-body"></div>
        </section>
    </div>
</main>

<script type="module" src="/js/bible/book-list.js?v=2.4"></script>
<div th:replace="~{fragments/section-nav :: section-nav}"></div>
</body>
</html>
