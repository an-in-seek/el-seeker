<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('성경 구절 목록 | ElSeeker', true, '/css/bible/verse-list.css?v=2.3')}"
      th:with="pageDescription='선택한 장의 성경 구절을 읽고 공유하거나 복사, 메모할 수 있습니다.'"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"
        th:with="pageTitle='성경 구절 목록', pageTitleVisible=true"></header>

<main class="container content-wrapper mb-80">
    <table class="table table-sm verse-table">
        <tbody id="verseTableBody"></tbody>
    </table>
    <div class="text-center">
        <button id="markReadBtn"
                class="btn btn-outline-success mark-read-btn"
                type="button"
                aria-label="이 장 읽음 완료">
            <span id="markReadIcon" aria-hidden="true">&#x2713;</span>
            <span class="ms-2">읽음</span>
        </button>
    </div>
</main>

<div id="verseFab" class="verse-fab d-none" aria-label="선택 구절 메뉴">
    <button type="button" class="verse-fab-toggle" data-fab-toggle aria-label="선택 메뉴 열기" aria-expanded="false">
        <svg class="verse-fab-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
    <div class="verse-fab-menu" data-fab-menu role="menu" aria-hidden="true">
        <button type="button" class="verse-fab-item" data-action="share" role="menuitem" aria-label="공유">
            <span class="verse-fab-item-icon" aria-hidden="true">🔗</span>
            <span class="verse-fab-item-label">공유</span>
        </button>
        <button type="button" class="verse-fab-item" data-action="copy" role="menuitem" aria-label="복사">
            <span class="verse-fab-item-icon" aria-hidden="true">📋</span>
            <span class="verse-fab-item-label">복사</span>
        </button>
        <button type="button" class="verse-fab-item" data-action="memo" role="menuitem" aria-label="메모">
            <span class="verse-fab-item-icon" aria-hidden="true">📝</span>
            <span class="verse-fab-item-label">메모</span>
        </button>
        <div class="verse-fab-submenu is-open" data-fab-highlight aria-hidden="false">
            <button type="button" class="verse-fab-color verse-fab-color-yellow" data-highlight="yellow" aria-label="노랑 형광펜"></button>
            <button type="button" class="verse-fab-color verse-fab-color-green" data-highlight="green" aria-label="초록 형광펜"></button>
            <button type="button" class="verse-fab-color verse-fab-color-pink" data-highlight="pink" aria-label="핑크 형광펜"></button>
        </div>
    </div>
</div>

<!-- 하단 네비게이션 -->
<div class="fixed-bottom-nav">
    <div class="nav-container">
        <!-- 이전 장 버튼 -->
        <button id="prevChapterBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                disabled
                aria-label="이전 장으로 이동">
            <!-- 이모지는 스크린리더에서 읽히지 않도록 aria-hidden 사용 -->
            <span aria-hidden="true">⬅</span>
            <span class="d-none d-md-inline ms-2">이전</span>
        </button>

        <!-- 장 선택 (페이지 이동) -->
        <a id="chapterSelectLink"
           href="/web/bible/chapter"
           class="btn btn-lg btn-primary"
           aria-label="장 선택">
            <span aria-hidden="true">📖</span>
            <span id="chapterSelectLinkLabel" class="ms-2"></span>
        </a>

        <!-- 다음 장 버튼 -->
        <button id="nextChapterBtn"
                class="btn btn-lg btn-outline-primary prev-next"
                type="button"
                disabled
                aria-label="다음 장으로 이동">
            <span class="d-none d-md-inline me-2">다음</span>
            <span aria-hidden="true">➡</span>
        </button>
    </div>
</div>

<script type="module" src="/js/bible/verse-list.js?v=2.2"></script>
</body>
</html>
