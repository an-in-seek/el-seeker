<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: head('The Bible - Bible Translations | 성경 번역본', true, null)}"></head>
<body class="has-fixed-nav">

<header th:replace="~{fragments/header :: header}"></header>

<main class="container content-wrapper">
    <section class="text-center mb-4">
        <p class="text-muted mb-1">👇 아래에서 원하시는 성경 번역본을 선택하세요.</p>
    </section>
    <div id="translationSections" class="translation-sections" aria-label="성경 번역본 목록"></div>
    <div class="list-group" id="translationList">
        <button type="button"
                class="list-group-item list-group-item-action text-start"
                th:each="translation : ${translations}"
                th:data-translation-id="${translation.translationId}"
                th:data-translation-name="${translation.translationName}"
                th:data-translation-type="${translation.translationType}"
                th:data-translation-language="${translation.translationLanguage}">
            <div class="fw-semibold" th:text="${translation.translationName}"></div>
            <div class="small text-muted" th:text="${translation.translationType}"></div>
        </button>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="/js/storage-util.js?v=1.0"></script>
<script src="/js/translation-list.js?v=1.0"></script>
</body>
</html>
